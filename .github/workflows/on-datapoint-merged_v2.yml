name: On Datapoint Merged (v2)
run-name: "[dataset] Post-merge PR #${{ inputs.pr_number }} (key=${{ inputs.run_key }})"

on:
  workflow_dispatch:
    inputs:
      organization:
        description: 'GitHub organization (dataset repo owner)'
        required: true
        type: string
        default: 'dpaia'
      repository:
        description: 'Dataset repository name'
        required: true
        type: string
        default: 'dataset'
      pr_number:
        description: 'Merged dataset PR number'
        required: true
        type: string
      run_key:
        description: 'Unique run correlation key (UUID)'
        required: false
        type: string
        default: 'manual'
      dataset_project_number:
        description: 'Dataset Metadata project number override (leave empty to use config)'
        required: false
        type: string
        default: ''

jobs:
  post-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v5

      - name: Load eval-projects config
        id: config
        shell: bash
        run: |
          CONFIG=$(cat .github/config/eval-projects.json)
          echo "eval_project_map=$(echo "$CONFIG" | jq -c '.eval_projects')" >> $GITHUB_OUTPUT
          echo "dataset_project=$(echo "$CONFIG" | jq -r '.dataset_metadata_project')" >> $GITHUB_OUTPUT
          echo "organization=$(echo "$CONFIG" | jq -r '.organization')" >> $GITHUB_OUTPUT

      - name: Read merged PR metadata
        id: metadata
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          DATASET_REPO: "${{ inputs.organization }}/${{ inputs.repository }}"
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$DATASET_REPO" --json body -q '.body')

          # Parse structured metadata from HTML comment
          INSTANCE_ID=$(echo "$PR_BODY" | grep -oP 'instance_id:\s*\K\S+' || echo "")
          EVAL_TYPE=$(echo "$PR_BODY" | grep -oP 'eval_type:\s*\K\S+' || echo "")
          SOURCE_REPO=$(echo "$PR_BODY" | grep -oP 'source_repo:\s*\K\S+' || echo "")
          SOURCE_PR=$(echo "$PR_BODY" | grep -oP 'source_pr:\s*\K\S+' || echo "")
          SOURCE_COMMIT=$(echo "$PR_BODY" | grep -oP 'source_commit:\s*\K\S+' || echo "")

          if [ -z "$INSTANCE_ID" ] || [ -z "$EVAL_TYPE" ]; then
            echo "Error: could not parse metadata from PR body" >&2
            echo "PR body:" >&2
            echo "$PR_BODY" >&2
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "eval_type=$EVAL_TYPE" >> $GITHUB_OUTPUT
          echo "source_repo=$SOURCE_REPO" >> $GITHUB_OUTPUT
          echo "source_pr=$SOURCE_PR" >> $GITHUB_OUTPUT
          echo "source_commit=$SOURCE_COMMIT" >> $GITHUB_OUTPUT

          # Build permalink to datapoint on main
          if [ -n "$SOURCE_REPO" ]; then
            DATA_PERMALINK="https://github.com/${DATASET_REPO}/blob/main/${EVAL_TYPE}/${SOURCE_REPO}/${INSTANCE_ID}.json"
          else
            # Fallback for legacy datapoints without source_repo metadata
            DATA_PERMALINK="https://github.com/${DATASET_REPO}/blob/main/${EVAL_TYPE}/${INSTANCE_ID}.json"
          fi
          echo "data_permalink=$DATA_PERMALINK" >> $GITHUB_OUTPUT

      - name: Resolve eval-type project number
        id: eval-project
        shell: bash
        run: |
          EVAL_MAP='${{ steps.config.outputs.eval_project_map }}'
          EVAL_TYPE='${{ steps.metadata.outputs.eval_type }}'
          PROJECT_NUM=$(echo "$EVAL_MAP" | jq -r --arg et "$EVAL_TYPE" '.[$et] // empty')
          echo "project_number=$PROJECT_NUM" >> $GITHUB_OUTPUT

      - name: Parse source PR URL
        id: source-pr
        if: steps.metadata.outputs.source_pr != ''
        uses: ./.github/actions/parse-pr-url
        with:
          pr_url: ${{ steps.metadata.outputs.source_pr }}

      - name: Get source PR node ID
        id: source-node
        if: steps.source-pr.outputs.number != ''
        uses: ./.github/actions/get-pr-node-id
        with:
          organization: ${{ steps.source-pr.outputs.owner }}
          repository: ${{ steps.source-pr.outputs.repo }}
          pr_number: ${{ steps.source-pr.outputs.number }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get Dataset Metadata project ID
        id: project-id
        if: steps.source-node.outputs.node_id != ''
        uses: ./.github/actions/get-project-id
        with:
          organization: ${{ inputs.organization }}
          project_number: ${{ inputs.dataset_project_number || steps.config.outputs.dataset_project }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Find source PR in Dataset Metadata project
        id: find-item
        if: steps.source-node.outputs.node_id != ''
        uses: ./.github/actions/add-issue-to-project
        with:
          project_id: ${{ steps.project-id.outputs.project_id }}
          issue_node_id: ${{ steps.source-node.outputs.node_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Update Data field with permalink
        if: steps.find-item.outputs.item_id != ''
        uses: ./.github/actions/update-project-field
        with:
          organization: ${{ inputs.organization }}
          project_number: ${{ inputs.dataset_project_number || steps.config.outputs.dataset_project }}
          item_id: ${{ steps.find-item.outputs.item_id }}
          field_name: 'Data'
          value: ${{ steps.metadata.outputs.data_permalink }}
          value_type: text
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Set Dataset Metadata status to Done
        if: steps.find-item.outputs.item_id != ''
        uses: ./.github/actions/set-project-status
        with:
          organization: ${{ inputs.organization }}
          project_number: ${{ inputs.dataset_project_number || steps.config.outputs.dataset_project }}
          item_id: ${{ steps.find-item.outputs.item_id }}
          value: 'Done'
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get Eval Type project ID
        id: eval-project-id
        if: steps.source-node.outputs.node_id != '' && steps.eval-project.outputs.project_number != ''
        uses: ./.github/actions/get-project-id
        with:
          organization: ${{ inputs.organization }}
          project_number: ${{ steps.eval-project.outputs.project_number }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Find source PR in Eval Type project
        id: find-eval-item
        if: steps.source-node.outputs.node_id != '' && steps.eval-project.outputs.project_number != ''
        uses: ./.github/actions/add-issue-to-project
        with:
          project_id: ${{ steps.eval-project-id.outputs.project_id }}
          issue_node_id: ${{ steps.source-node.outputs.node_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Set Eval Type project status to Done
        if: steps.find-eval-item.outputs.item_id != ''
        uses: ./.github/actions/set-project-status
        with:
          organization: ${{ inputs.organization }}
          project_number: ${{ steps.eval-project.outputs.project_number }}
          item_id: ${{ steps.find-eval-item.outputs.item_id }}
          value: 'Done'
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Close source PR
        if: steps.source-pr.outputs.number != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          gh pr close "${{ steps.source-pr.outputs.number }}" \
            --repo "${{ steps.source-pr.outputs.owner }}/${{ steps.source-pr.outputs.repo }}" \
            --comment "Datapoint pipeline complete. Closing source PR (not merging)."

      - name: Summary
        if: always()
        run: |
          echo "# Post-Merge Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Instance:** ${{ steps.metadata.outputs.instance_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Source PR:** ${{ steps.metadata.outputs.source_pr }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Data permalink:** ${{ steps.metadata.outputs.data_permalink }}" >> $GITHUB_STEP_SUMMARY
