[project]
name = "ee_bench_generator"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[project.entry-points."ee_bench_generator.providers"]
# Providers register here

[project.entry-points."ee_bench_generator.generators"]
# Generators register here

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ee_bench_generator"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
