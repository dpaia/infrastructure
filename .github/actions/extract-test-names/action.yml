name: 'Extract Test Names'
description: 'Extracts FAIL_TO_PASS and PASS_TO_PASS test names from commit messages and PR descriptions'
inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
  issue-number:
    description: 'Issue number to extract test names from'
    required: false
    default: 'unknown'
  repository:
    description: 'Repository name'
    required: false
    default: ${{ github.repository }}
  organization:
    description: 'Organization name'
    required: false
    default: ${{ github.repository_owner }}

outputs:
  fail_to_pass:
    description: 'Comma-separated list of fail to pass test names'
    value: ${{ steps.extract-fields.outputs.fail_to_pass  }}
  pass_to_pass:
    description: 'Comma-separated list of pass to pass test names'
    value: ${{ steps.extract-fields.outputs.pass_to_pass  }}
  test_args:
    description: 'Test arguments extracted from comments with FAIL_TO_PASS or PASS_TO_PASS'
    value: ${{ steps.extract-fields.outputs.test_args }}
  test_sdk_version:
    description: 'SDK version extracted from comments with FAIL_TO_PASS or PASS_TO_PASS'
    value: ${{ steps.extract-fields.outputs.test_sdk_version }}
  comment_id:
    description: 'ID of the comment where FAIL_TO_PASS or PASS_TO_PASS was manually described'
    value: ${{ steps.extract-fields.outputs.comment_id }}

runs:
  using: "composite"
  steps:
    - name: Extract FAIL_TO_PASS and PASS_TO_PASS
      id: extract-fields
      shell: bash
      env:
        ISSUE_NUMBER: ${{ inputs.issue-number }}
        REPOSITORY: ${{ inputs.repository }}
        ORGANIZATION: ${{ inputs.organization }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        chmod +x .github/python/utils/extract_test_fields.py
        # Run the script and let it output directly to GITHUB_OUTPUT
        .github/python/utils/extract_test_fields.py >> $GITHUB_OUTPUT