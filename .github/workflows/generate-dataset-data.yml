name: Generate dataset data for issues
run-name: "[${{ github.event_name == 'schedule' && 'java' || inputs.generator }}] Generate Dataset Data: ${{ github.event_name == 'schedule' && '-label:Epic label:Verified' || inputs.search_query }}"

on:
  workflow_dispatch:
    inputs:
      organization:
        description: 'GitHub organization name'
        required: true
        type: string
        default: 'jetbrains-eval-lab'
      topic:
        description: 'Repositories topic'
        required: false
        type: string
        default: 'Java'
      generator:
        description: 'Profile'
        required: true
        default: 'java'
        type: choice
        options:
          - java
      search_query:
        description: >
          GitHub issue search
          (example: '-label:Epic label:Security assignee:@me is:open')
        required: true
        default: '-label:Epic label:Verified'
        type: string
      update:
        description: "Update mode"
        type: choice
        options:
          - create-new
          - update-outdated
          - force-update
        default: "create-new"
      auto_merge:
        description: 'Automatically merge data updates'
        required: false
        type: boolean
        default: false

  schedule:
    # Run overnight at 2:00 AM UTC
    - cron: '0 2 * * *'

jobs:
  set-defaults:
    runs-on: ubuntu-latest
    outputs:
      organization: ${{ steps.set-defaults.outputs.organization }}
      topic: ${{ steps.set-defaults.outputs.topic }}
      generator: ${{ steps.set-defaults.outputs.generator }}
      search_query: ${{ steps.set-defaults.outputs.search_query }}
      update: ${{ steps.set-defaults.outputs.update }}
      auto_merge: ${{ steps.set-defaults.outputs.auto_merge }}
    steps:
      - id: set-defaults
        run: |
          # Set default values for scheduled runs
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "organization=jetbrains-eval-lab" >> $GITHUB_OUTPUT
            echo "topic=Java" >> $GITHUB_OUTPUT
            echo "generator=java" >> $GITHUB_OUTPUT
            echo "search_query=-label:Epic label:Verified" >> $GITHUB_OUTPUT
            echo "update=create-new" >> $GITHUB_OUTPUT
            echo "auto_merge=false" >> $GITHUB_OUTPUT
          else
            echo "organization=${{ inputs.organization }}" >> $GITHUB_OUTPUT
            echo "topic=${{ inputs.topic }}" >> $GITHUB_OUTPUT
            echo "generator=${{ inputs.generator }}" >> $GITHUB_OUTPUT
            echo "search_query=${{ inputs.search_query }}" >> $GITHUB_OUTPUT
            echo "update=${{ inputs.update }}" >> $GITHUB_OUTPUT
            echo "auto_merge=${{ inputs.auto_merge }}" >> $GITHUB_OUTPUT
          fi

  get-project-data:
    needs: set-defaults
    runs-on: ubuntu-latest
    outputs:
      project_id: ${{ steps.get-project-id.outputs.project_id }}
      commit_field_id: ${{ steps.get-commit-field-id.outputs.field_id }}
      data_field_id: ${{ steps.get-data-field-id.outputs.field_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Get project ID
        id: get-project-id
        uses: ./.github/actions/get-project-id
        with:
          organization: ${{ github.repository_owner }}
          project_number: 3
          github_token: ${{ secrets.PROJECT_TOKEN }}
          
      - name: Get commit field ID
        id: get-commit-field-id
        uses: ./.github/actions/get-project-field-id
        with:
          project_id: ${{ steps.get-project-id.outputs.project_id }}
          field_name: "Commit"
          github_token: ${{ secrets.PROJECT_TOKEN }}
          
      - name: Get data field ID
        id: get-data-field-id
        uses: ./.github/actions/get-project-field-id
        with:
          project_id: ${{ steps.get-project-id.outputs.project_id }}
          field_name: "Data"
          github_token: ${{ secrets.PROJECT_TOKEN }}

  find-issues:
    needs: [get-project-data, set-defaults]
    runs-on: ubuntu-latest
    outputs:
      issue-matrix: ${{ steps.find-issues.outputs.issue-matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Find issues by query
        id: find-issues
        uses: ./.github/actions/find-issues
        with:
          search_query: "project:${{ needs.set-defaults.outputs.organization }}/2 is:issue topic:${{ needs.set-defaults.outputs.topic }} ${{ needs.set-defaults.outputs.search_query }}"
          github_token: ${{ secrets.PROJECT_TOKEN }}

  create-new-data:
    needs: [ find-issues, get-project-data, set-defaults ]
    if: needs.set-defaults.outputs.update == 'create-new'
    runs-on: ubuntu-latest
    outputs:
      commits-match: ${{ steps.set-matrix-output.outputs.commits-match-matrix }}
      pull_requests: ${{ toJSON(steps.process-issue-data.outputs) }}
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Get GitHub issue ID
        id: get-issue-node-id
        uses: ./.github/actions/get-issue-node-id
        with:
          repository: ${{ matrix.issue.repo_name }}
          organization: ${{ matrix.issue.org_name }}
          issue_number: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get status field value
        id: get-status-value
        uses: ./.github/actions/get-project-field-value
        with:
          project_id: ${{ needs.get-project-data.outputs.project_id }}
          issue_node_id: ${{ steps.get-issue-node-id.outputs.issue_node_id }}
          field_name: "Status"
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Compare status
        id: compare-status
        env:
          STATUS_FIELD_VALUE: ${{ steps.get-status-value.outputs.field_value }}
        run: |          
          echo "Field value: $STATUS_FIELD_VALUE"
          if [ -z "STATUS_FIELD_VALUE" ] || [ "STATUS_FIELD_VALUE" = "null" ] || [ "STATUS_FIELD_VALUE" != "Done" ]; then
            echo "Status is not Done"
            echo "match=false" >> $GITHUB_OUTPUT
          else
            echo "Already processed. Skipping..."
            echo "match=true" >> $GITHUB_OUTPUT
          fi

      - name: Process Issue Data
        id: process-issue-data
        uses: ./.github/actions/process-issue-data
        with:
          generator: ${{ needs.set-defaults.outputs.generator }}
          organization: ${{ matrix.issue.org_name }}
          repository: ${{ matrix.issue.repo_name }}
          issue_id: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}
          dataset_repo: ${{ vars.DATASET_REPO }}
          auto_merge: 'false'
          condition: ${{ steps.compare-status.outputs.match == 'false' }}

  update-outdated-data:
    needs: [find-issues, get-project-data, set-defaults]
    if: needs.set-defaults.outputs.update == 'update-outdated'
    runs-on: ubuntu-latest
    outputs:
      commits-match: ${{ steps.set-matrix-output.outputs.commits-match-matrix }}
      pull_requests: ${{ toJSON(steps.process-issue-data.outputs) }}
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Get GitHub issue ID
        id: get-issue-node-id
        uses: ./.github/actions/get-issue-node-id
        with:
          repository: ${{ matrix.issue.repo_name }}
          organization: ${{ matrix.issue.org_name }}
          issue_number: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get Commit field value
        id: get-commit-value
        uses: ./.github/actions/get-project-field-value
        with:
          project_id: ${{ needs.get-project-data.outputs.project_id }}
          issue_node_id: ${{ steps.get-issue-node-id.outputs.issue_node_id }}
          field_name: "Commit"
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get latest commit
        id: get-commits
        uses: ./.github/actions/get-commits
        with:
          organization: ${{ matrix.issue.org_name }}
          repository: ${{ matrix.issue.repo_name }}
          issue_id: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Compare commits
        id: compare-commits
        env:
          COMMIT_FIELD_VALUE: ${{ steps.get-commit-value.outputs.field_value }}
          LATEST_COMMIT: ${{ steps.get-commits.outputs.commit_hash }}
        run: |
          echo "Commit field value: $COMMIT_FIELD_VALUE"
          echo "Latest commit: $LATEST_COMMIT"

          if [ -z "$COMMIT_FIELD_VALUE" ] || [ "$COMMIT_FIELD_VALUE" = "null" ] || [ "$COMMIT_FIELD_VALUE" != "$LATEST_COMMIT" ]; then
            echo "Commits don't match or Commit field is empty"
            echo "match=false" >> $GITHUB_OUTPUT
          else
            echo "Commits match"
            echo "match=true" >> $GITHUB_OUTPUT
          fi

      - name: Process Issue Data
        id: process-issue-data
        uses: ./.github/actions/process-issue-data
        with:
          generator: ${{ needs.set-defaults.outputs.generator }}
          organization: ${{ matrix.issue.org_name }}
          repository: ${{ matrix.issue.repo_name }}
          issue_id: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}
          dataset_repo: ${{ vars.DATASET_REPO }}
          auto_merge: 'false'
          condition: ${{ steps.compare-commits.outputs.match == 'false' }}

  # This job runs after all matrix jobs are complete to collect PR URLs
  collect-prs:
    needs: [create-new-data, update-outdated-data, update-issue-swe-data]
    if: always()  # Always run this job to collect PRs, regardless of auto_merge setting
    runs-on: ubuntu-latest
    outputs:
      pr_list: ${{ steps.extract-prs.outputs.pr_list }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          
      # Create a directory for downloaded artifacts
      - name: Create artifacts directory
        run: mkdir -p downloaded_artifacts
          
      # Download all artifacts from update-outdated-data job
      - name: Download update-outdated-data artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts
          
      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find downloaded_artifacts -type f | sort
          
      - name: Extract PR URLs
        id: extract-prs
        run: |
          echo "Collecting PR URLs from all executed jobs"

          # Create a temporary file to store PR URLs
          touch pr_list.txt
          
          echo "Processing artifacts from all matrix jobs"
          
          # Find all PR artifact files and extract URLs
          find downloaded_artifacts -name "pr_*.txt" -type f | while read pr_file; do
            echo "Processing PR file: $pr_file"
            PR_URL=$(cat "$pr_file")
            if [ -n "$PR_URL" ]; then
              echo "Found PR URL: $PR_URL"
              echo "$PR_URL" >> pr_list.txt
            fi
          done            

          # Remove any duplicates and empty lines
          sort -u pr_list.txt | grep -v '^$' > pr_list_unique.txt
          mv pr_list_unique.txt pr_list.txt

          # Show what we found
          echo "Found these PRs:"
          cat pr_list.txt

          # Check if we found any PRs
          if [ ! -s pr_list.txt ]; then
            echo "No PRs found in any job outputs or artifacts"
            PR_LIST=""
          else
            # Create a comma-separated list of PR URLs
            PR_LIST=$(cat pr_list.txt | tr '\n' ',' | sed 's/,$//')
            echo "PR List: $PR_LIST"
          fi

          # Output the list of PRs (even if empty)
          echo "pr_list=$PR_LIST" >> $GITHUB_OUTPUT
          echo "PR collection complete"

  update-issue-swe-data:
    needs: [find-issues, set-defaults]
    if: needs.set-defaults.outputs.update == 'force-update'
    runs-on: ubuntu-latest
    outputs:
      pull_requests: ${{ toJSON(steps.process-issue-data.outputs) }}
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Process Issue Data
        id: process-issue-data
        uses: ./.github/actions/process-issue-data
        with:
          generator: ${{ needs.set-defaults.outputs.generator }}
          organization: ${{ matrix.issue.org_name }}
          repository: ${{ matrix.issue.repo_name }}
          issue_id: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}
          dataset_repo: ${{ vars.DATASET_REPO }}
          auto_merge: 'false'

  merge-pull-requests:
    needs: [collect-prs, set-defaults]
    if: needs.set-defaults.outputs.auto_merge == 'true' && always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Merge Pull Requests
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PR_LIST: ${{ needs.collect-prs.outputs.pr_list }}
        run: |
          echo "Merging pull requests..."
          echo "Auto merge value: ${{ needs.set-defaults.outputs.auto_merge }}"

          echo "DEBUG: PR List: $PR_LIST"

          # Check if we have PRs to merge
          if [ -z "$PR_LIST" ]; then
            echo "No pull requests to merge."
            exit 0
          fi

          # Convert comma-separated list back to newline-separated list
          echo "$PR_LIST" | tr ',' '\n' > pr_urls.txt

          echo "Found the following pull requests to merge:"
          cat pr_urls.txt

          # Merge each PR one by one
          while read pr_url; do
            if [ -n "$pr_url" ]; then
              echo "Merging pull request: $pr_url"
              gh pr merge "$pr_url" --rebase --delete-branch || echo "Failed to merge PR: $pr_url"

              # Wait a bit between merges to avoid rate limiting
              sleep 2
            fi
          done < pr_urls.txt
          
          echo "All pull requests have been merged."