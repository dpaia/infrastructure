name: 'Download Content'
description: 'Downloads content from a GitHub URL'
author: 'JetBrains'

inputs:
  data_value:
    description: 'The value containing the URL'
    required: true
  org_name:
    description: 'The organization name'
    required: true
  repo_name:
    description: 'The repository name'
    required: true
  issue_id:
    description: 'The issue ID'
    required: true

outputs:
  content_processed:
    description: 'Whether the content was successfully processed'
    value: ${{ steps.download-content.outputs.content_processed }}

runs:
  using: 'composite'
  steps:
    - name: Download content
      id: download-content
      shell: bash
      env:
        DATA_VALUE: ${{ inputs.data_value }}
        ORG_NAME: ${{ inputs.org_name }}
        REPO_NAME: ${{ inputs.repo_name }}
        ISSUE_ID: ${{ inputs.issue_id }}
      run: |              
        # Extract links directly from DATA_VALUE
        echo "DATA VALUE: $DATA_VALUE"
        
        if [ -n "$DATA_VALUE" ] && [ "$DATA_VALUE" != "null" ]; then          
          if [[ "$DATA_VALUE" == https://github.com/*/blob/* ]]; then
            GITHUB_URL="$DATA_VALUE"
            echo "Found GitHub repository URL: $GITHUB_URL"
            
            # Parse GitHub URL to extract owner, repo, branch, and path
            # Format: https://github.com/{owner}/{repo}/blob/{branch}/{path}
            URL_PATH=${GITHUB_URL#https://github.com/}
            OWNER=$(echo $URL_PATH | cut -d'/' -f1)
            REPO=$(echo $URL_PATH | cut -d'/' -f2)
            BRANCH=$(echo $URL_PATH | cut -d'/' -f4)
            FILE_PATH=$(echo $URL_PATH | cut -d'/' -f5-)
            
            echo "Owner: $OWNER"
            echo "Repo: $REPO"
            echo "Branch: $BRANCH"
            echo "File path: $FILE_PATH"
            
            # Create directory for content
            mkdir -p ./_content
            
            # Use GitHub API to fetch file content
            echo "Fetching file content using GitHub API..."
            if ! gh api repos/$OWNER/$REPO/contents/$FILE_PATH?ref=$BRANCH \
              --jq '.content' 2>/dev/null | base64 -d > "./_content/${ORG_NAME}_${REPO_NAME}_${ISSUE_ID}.json"; then
              echo "Error: Failed to fetch file content from GitHub API"
              echo "This could be due to:"
              echo "- The file does not exist at the specified path"
              echo "- The repository is private and requires authentication"
              echo "- GitHub API rate limits"
              echo "content_processed=false" >> $GITHUB_OUTPUT
              exit 1
            fi
        
            # Set output
            echo "content_processed=true" >> $GITHUB_OUTPUT
          else
            echo "No valid GitHub URL found in DATA_VALUE"
            echo "content_processed=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "No valid URL found for issue #$ISSUE_ID"
          echo "content_processed=false" >> $GITHUB_OUTPUT
        fi