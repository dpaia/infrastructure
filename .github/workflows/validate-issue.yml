name: Validate issue for DPAI Benchmark
run-name: "[${{ github.event.inputs.organization }}/${{ github.event.inputs.repository }}][${{ github.event.inputs.generator }}] Validate issue #${{ github.event.inputs.issue_id }}"

on:
  workflow_dispatch:
    inputs:
      generator:
        description: 'Profile'
        required: true
        default: 'java'
        type: choice
        options:
          - java
      organization:
        description: 'GitHub organization name'
        required: true
        default: 'dpaia'
        type: string
      repository:
        description: 'Repository name (repo)'
        required: true
        type: string
      issue_id:
        description: 'Issue number'
        required: true
        type: string

jobs:
  validate-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup ee-dataset CLI
      - name: Setup ee-dataset CLI
        uses: ./.github/actions/setup-ee-dataset

      # Generate dataset instance using ee-dataset CLI
      - name: Generate dataset instance
        id: generate-data
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ORGANIZATION: ${{ github.event.inputs.organization }}
          REPOSITORY: ${{ github.event.inputs.repository }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_id }}
          VERSION: '1'
        run: |
          echo "Generating dataset instance for $ORGANIZATION/$REPOSITORY#$ISSUE_NUMBER..."

          TARGET_REPO="${ORGANIZATION}/${REPOSITORY}"
          SAFE_REPO_NAME=$(echo "$TARGET_REPO" | tr '/' '_')
          INSTANCE_FILE="generated_instance_${SAFE_REPO_NAME}_${ISSUE_NUMBER}.json"

          # Generate the instance using ee-dataset CLI
          ee-dataset --config specs/dpaia-issue.yaml generate \
            --set ORGANIZATION="$ORGANIZATION" \
            --set REPOSITORY="$REPOSITORY" \
            --set ISSUE_NUMBER="$ISSUE_NUMBER" \
            --set VERSION="$VERSION" \
            --out "$INSTANCE_FILE" \
            --format json || {
              echo "ee-dataset generation failed"
              echo "has_data=false" >> $GITHUB_OUTPUT
              exit 0
            }

          # Check if file was created
          if [ -f "$INSTANCE_FILE" ] && [ -s "$INSTANCE_FILE" ]; then
            JSON_SIZE=$(wc -c < "$INSTANCE_FILE")
            echo "Generated instance JSON file: $INSTANCE_FILE (${JSON_SIZE} bytes)"
            echo "instance_file=$INSTANCE_FILE" >> $GITHUB_OUTPUT
            echo "json_size=$JSON_SIZE" >> $GITHUB_OUTPUT
            echo "has_data=true" >> $GITHUB_OUTPUT

            # Extract test fields for validation
            FAIL_TO_PASS=$(jq -r '.FAIL_TO_PASS // "[]"' "$INSTANCE_FILE")
            PASS_TO_PASS=$(jq -r '.PASS_TO_PASS // "[]"' "$INSTANCE_FILE")
            echo "fail_to_pass=$FAIL_TO_PASS" >> $GITHUB_OUTPUT
            echo "pass_to_pass=$PASS_TO_PASS" >> $GITHUB_OUTPUT
          else
            echo "Failed to generate instance JSON file"
            echo "has_data=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if test fields are empty
        id: check-test-fields
        shell: bash
        env:
          FAIL_TO_PASS: ${{ steps.generate-data.outputs.fail_to_pass }}
          PASS_TO_PASS: ${{ steps.generate-data.outputs.pass_to_pass }}
          HAS_DATA: ${{ steps.generate-data.outputs.has_data }}
        run: |
          if [ "$HAS_DATA" != "true" ]; then
            echo "No data generated"
            echo "empty_test_fields=true" >> $GITHUB_OUTPUT
          elif [ "$FAIL_TO_PASS" == "[]" ] && [ "$PASS_TO_PASS" == "[]" ]; then
            echo "Both FAIL_TO_PASS and PASS_TO_PASS are empty. Skipping data generation."
            echo "empty_test_fields=true" >> $GITHUB_OUTPUT
          else
            echo "Test fields are not empty. Proceeding with data generation."
            echo "empty_test_fields=false" >> $GITHUB_OUTPUT
          fi

      - name: Get target repository Java configuration
        id: get-java-config
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          TARGET_REPO: ${{ github.event.inputs.organization }}/${{ github.event.inputs.repository }}
        run: |
          echo "Checking Java configuration for target repository: $TARGET_REPO"

          # Get JAVA_VERSION
          TARGET_JAVA_VERSION=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$TARGET_REPO/actions/variables/JAVA_VERSION" \
            | jq -r '.value // empty' 2>/dev/null)

          # Get JAVA_DISTRIBUTION
          TARGET_JAVA_DISTRIBUTION=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$TARGET_REPO/actions/variables/JAVA_DISTRIBUTION" \
            | jq -r '.value // empty' 2>/dev/null)

          # Set Java version
          if [[ -n "$TARGET_JAVA_VERSION" && "$TARGET_JAVA_VERSION" != "null" && "$TARGET_JAVA_VERSION" != "empty" ]]; then
            echo "Found JAVA_VERSION in target repository: $TARGET_JAVA_VERSION"
            echo "java_version=$TARGET_JAVA_VERSION" >> $GITHUB_OUTPUT
          else
            echo "No JAVA_VERSION found in target repository, using default: 24"
            echo "java_version=24" >> $GITHUB_OUTPUT
          fi

          # Set Java distribution
          if [[ -n "$TARGET_JAVA_DISTRIBUTION" && "$TARGET_JAVA_DISTRIBUTION" != "null" && "$TARGET_JAVA_DISTRIBUTION" != "empty" ]]; then
            echo "Found JAVA_DISTRIBUTION in target repository: $TARGET_JAVA_DISTRIBUTION"
            echo "java_distribution=$TARGET_JAVA_DISTRIBUTION" >> $GITHUB_OUTPUT
          else
            echo "No JAVA_DISTRIBUTION found in target repository, using default: temurin"
            echo "java_distribution=temurin" >> $GITHUB_OUTPUT
          fi

      - name: Print target repository Java configuration
        run: |
          echo "Target repository Java configuration:"
          echo "  Java version: ${{ steps.get-java-config.outputs.java_version }}"
          echo "  Java distribution: ${{ steps.get-java-config.outputs.java_distribution }}"
          echo "Java will be configured in Docker containers during verification"

      - name: Make script executable
        run: chmod +x ./.github/scripts/verify_dataset.sh

      - name: Run verification
        id: run-verification
        shell: bash
        env:
          EMPTY_TEST_FIELDS: ${{ steps.check-test-fields.outputs.empty_test_fields }}
          JAVA_VERSION: ${{ steps.get-java-config.outputs.java_version }}
          INSTANCE_FILE: ${{ steps.generate-data.outputs.instance_file }}
          HAS_DATA: ${{ steps.generate-data.outputs.has_data }}
          JSON_SIZE: ${{ steps.generate-data.outputs.json_size }}
        run: |
          set +e

          if [[ "$EMPTY_TEST_FIELDS" == "true" ]]; then
            echo "::error::Failed: Both FAIL_TO_PASS and PASS_TO_PASS are empty. Nothing to validate."
            printf '{"result":"failed","message":"Both FAIL_TO_PASS and PASS_TO_PASS are empty. Nothing to validate."}' > verification-result.json
          elif [[ "$HAS_DATA" != "true" || ! -f "$INSTANCE_FILE" ]]; then
            echo "::error::Failed: No instance JSON generated or file not found."
            printf '{"result":"failed","message":"No instance JSON generated or file not found."}' > verification-result.json
          else
            echo "Using file-based approach with: $INSTANCE_FILE (${JSON_SIZE} bytes)"
            # Stream verification script output in real-time and save logs
            stdbuf -oL -eL bash ./.github/scripts/verify_dataset.sh --file="$INSTANCE_FILE" --generator="${{ github.event.inputs.generator }}" 2>&1 | tee verify_output.txt
          fi

          # Read verification result JSON
          if [[ -f verification-result.json ]]; then
            RAW_RESULT=$(jq -r '.result' verification-result.json 2>/dev/null)
            RAW_MESSAGE=$(jq -r '.message // empty' verification-result.json 2>/dev/null)
          else
            RAW_RESULT="failed"
            RAW_MESSAGE="Verification result file not found"
            echo "::error::Verification result file not found (verification-result.json)"
          fi

          # Map to workflow outputs
          if [[ "$RAW_RESULT" == "ok" ]]; then
            echo "result=success" >> $GITHUB_OUTPUT
            if [[ -z "$RAW_MESSAGE" ]]; then RAW_MESSAGE="Validation passed"; fi
            echo "message=$RAW_MESSAGE" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            if [[ -z "$RAW_MESSAGE" ]]; then RAW_MESSAGE="Unknown failure"; fi
            echo "message=$RAW_MESSAGE" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload verification-result.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-result
          path: verification-result.json
          if-no-files-found: warn
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "# Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "Result: ${{ steps.run-verification.outputs.result }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.run-verification.outputs.message }}" != "" ]; then
            echo "${{ steps.run-verification.outputs.message }}" >> $GITHUB_STEP_SUMMARY
          fi
