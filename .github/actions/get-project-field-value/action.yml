name: 'Get Project Field Value'
description: 'Gets a field value for an issue in a GitHub Project V2'
author: 'JetBrains'

inputs:
  project_id:
    description: 'The ID of the GitHub Project'
    required: true
  issue_node_id:
    description: 'The GraphQL node ID of the issue'
    required: true
  field_name:
    description: 'The name of the field to get the value for'
    required: true
  github_token:
    description: 'GitHub token for API access'
    required: true

outputs:
  field_value:
    description: 'The value of the specified field for the issue'
    value: ${{ steps.get-field-value.outputs.field_value }}

runs:
  using: 'composite'
  steps:
    - name: Get field ID
      id: get-field-id
      uses: ./.github/actions/get-project-field-id
      with:
        project_id: ${{ inputs.project_id }}
        field_name: ${{ inputs.field_name }}
        github_token: ${{ inputs.github_token }}
        
    - name: Get field value
      id: get-field-value
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        PROJECT_ID: ${{ inputs.project_id }}
        ISSUE_NODE_ID: ${{ inputs.issue_node_id }}
        FIELD_NAME: ${{ inputs.field_name }}
        FIELD_ID: ${{ steps.get-field-id.outputs.field_id }}
      run: |
        echo "Getting field value for field '$FIELD_NAME' (ID: $FIELD_ID) for issue with node ID '$ISSUE_NODE_ID'"
        
        if [ -z "$FIELD_ID" ]; then
          echo "Error: Field '$FIELD_NAME' not found in project"
          exit 1
        fi
        
        # Get project item for this issue using the issue_node_id filter
        ITEM_QUERY=$(gh api graphql -f query='
        query($project:ID!, $issueId:ID!, $fieldId:ID!) {
          node(id: $project) {
            ... on ProjectV2 {
              items(first: 1, filter: {content: {id: {eq: $issueId}}}) {
                nodes {
                  id
                  fieldValues(first: 1, filter: {field: {id: {eq: $fieldId}}}) {
                    nodes {
                      ... on ProjectV2ItemFieldTextValue {
                        field {
                          ... on ProjectV2FieldCommon {
                            id
                            name
                          }
                        }
                        text
                      }
                      ... on ProjectV2ItemFieldSingleSelectValue {
                        field {
                          ... on ProjectV2FieldCommon {
                            id
                            name
                          }
                        }
                        name
                        optionId
                      }
                      ... on ProjectV2ItemFieldDateValue {
                        field {
                          ... on ProjectV2FieldCommon {
                            id
                            name
                          }
                        }
                        date
                      }
                      ... on ProjectV2ItemFieldNumberValue {
                        field {
                          ... on ProjectV2FieldCommon {
                            id
                            name
                          }
                        }
                        number
                      }
                    }
                  }
                }
              }
            }
          }
        }' -f project=$PROJECT_ID -f issueId=$ISSUE_NODE_ID -f fieldId=$FIELD_ID)
        
        # Extract the item data
        ITEM_DATA=$(echo "$ITEM_QUERY" | jq -c '.data.node.items.nodes[0] // ""')
        
        FIELD_VALUE=""
        if [ -n "$ITEM_DATA" ] && [ "$ITEM_DATA" != "null" ]; then
          echo "Found project item for issue"
          
          # Determine field type and extract value (now directly from the first node since we're filtering by field ID)
          FIELD_TYPE=$(echo "$ITEM_DATA" | jq -r '.fieldValues.nodes[0] | keys[0]')
          
          if [ "$FIELD_TYPE" = "text" ]; then
            # Text field
            FIELD_VALUE=$(echo "$ITEM_DATA" | jq -r '.fieldValues.nodes[0].text')
            echo "$FIELD_NAME (text field) value: $FIELD_VALUE"
          elif [ "$FIELD_TYPE" = "name" ]; then
            # Single select field
            FIELD_VALUE=$(echo "$ITEM_DATA" | jq -r '.fieldValues.nodes[0].name')
            OPTION_ID=$(echo "$ITEM_DATA" | jq -r '.fieldValues.nodes[0].optionId')
            echo "$FIELD_NAME (single select field) value: $FIELD_VALUE (optionId: $OPTION_ID)"
          elif [ "$FIELD_TYPE" = "date" ]; then
            # Date field
            FIELD_VALUE=$(echo "$ITEM_DATA" | jq -r '.fieldValues.nodes[0].date')
            echo "$FIELD_NAME (date field) value: $FIELD_VALUE"
          elif [ "$FIELD_TYPE" = "number" ]; then
            # Number field
            FIELD_VALUE=$(echo "$ITEM_DATA" | jq -r '.fieldValues.nodes[0].number')
            echo "$FIELD_NAME (number field) value: $FIELD_VALUE"
          else
            echo "Field '$FIELD_NAME' found but has unsupported type: $FIELD_TYPE"
            # Return empty string for unsupported types
            FIELD_VALUE=""
          fi
          
          if [ -z "$FIELD_VALUE" ] || [ "$FIELD_VALUE" = "null" ]; then
            echo "Field '$FIELD_NAME' not found or has no value"
            FIELD_VALUE=""
          fi
        else
          echo "Issue with node ID '$ISSUE_NODE_ID' not found in project '$PROJECT_ID'"
        fi
        
        # Debug output for troubleshooting
        echo "Field value details:"
        echo "$ITEM_DATA" | jq -r '.fieldValues.nodes[0] | "Field: \(.field.name), Type: \(keys[0]), Value: \(.[keys[0]])"' || echo "No field value found or jq error"
        
        # Set output
        echo "field_value=$FIELD_VALUE" >> $GITHUB_OUTPUT