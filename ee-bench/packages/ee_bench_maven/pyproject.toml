[project]
name = "ee_bench_maven"
version = "0.1.0"
description = "Maven build-system provider for ee_bench - computes is_maven and enriches test names"
requires-python = ">=3.11"
dependencies = [
    "ee_bench_generator",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[project.entry-points."ee_bench_generator.providers"]
maven = "ee_bench_maven:MavenProvider"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ee_bench_maven"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
