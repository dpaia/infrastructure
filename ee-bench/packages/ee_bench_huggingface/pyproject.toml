[project]
name = "ee_bench_huggingface"
version = "0.1.0"
description = "HuggingFace dataset provider for ee_bench"
requires-python = ">=3.11"
dependencies = [
    "ee_bench_generator",
    "datasets>=2.20",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[project.entry-points."ee_bench_generator.providers"]
huggingface_dataset = "ee_bench_huggingface:HuggingFaceDatasetProvider"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ee_bench_huggingface"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
