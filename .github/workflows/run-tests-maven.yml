name: Run Tests

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to set up'
        required: false
        type: string
        default: '24'
      distribution:
        description: 'Java distribution to use'
        required: false
        type: string
        default: 'temurin'
      pom-file:
        description: 'Path to the pom.xml file'
        required: false
        type: string
        default: 'pom.xml'
      issue-number:
        description: 'Issue number to extract test names from'
        required: false
        type: string
        default: ''
    secrets:
      github-token:
        description: 'GitHub token for API access'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      issues: write        # so we can create & edit comments
      contents: read

    steps:
      # ──────────── 1. checkout ────────────
      - uses: actions/checkout@v4

      # ──────────── 2. extract FAIL_TO_PASS / PASS_TO_PASS ────────────
      - name: Extract test names
        id: extract_tests
        uses: ./.github/actions/extract-test-names
        with:
          organization: ${{ github.repository_owner }}
          repository: ${{ github.repository }}
          github-token: ${{ secrets.github-token }}
          issue-number: ${{ inputs.issue-number || github.event.pull_request.number || github.event.issue.number || 'unknown' }}

      # ──────────── 3. check if FAIL_TO_PASS or PASS_TO_PASS found ────────────
      - name: Check if FAIL_TO_PASS or PASS_TO_PASS found
        if: ${{ steps.extract_tests.outputs.fail_to_pass == '' && steps.extract_tests.outputs.pass_to_pass == '' }}
        run: |
          echo "::error::FAIL_TO_PASS or PASS_TO_PASS not found in commit messages or issue commits, please add FAIL_TO_PASS or PASS_TO_PASS to issue comment"
          exit 1

      # ──────────── 4. post placeholder comment (EARLY) ────────────
      - name: Create placeholder issue comment
        id: create_comment
        uses: ./.github/actions/placeholder-comment
        with:
          github-token: ${{ secrets.github-token }}
          fail-to-pass: ${{ steps.extract_tests.outputs.fail_to_pass }}
          pass-to-pass: ${{ steps.extract_tests.outputs.pass_to_pass }}

      # ──────────── 5. Java / Maven setup and run tests ────────────
      - name: Run Maven tests
        uses: ./.github/actions/run-maven-tests
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.distribution }}
          tests: ${{ steps.extract_tests.outputs.tests }}
          pom-file: ${{ inputs.pom-file }}

      # ──────────── 6. update the same comment (FINAL) ────────────
      - name: Update issue comment with final status
        if: always()
        uses: ./.github/actions/update-issue-comment
        with:
          github-token: ${{ secrets.github-token }}
          comment-id: ${{ steps.create_comment.outputs.comment_id }}
          job-status: ${{ job.status }}
          fail-to-pass: ${{ steps.extract_tests.outputs.fail_to_pass }}
          pass-to-pass: ${{ steps.extract_tests.outputs.pass_to_pass }}
