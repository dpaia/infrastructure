# Export EE-bench codegen datapoint from a single GitHub issue
# Usage: ee-dataset --config specs/ee-bench-codegen-issue.yaml \
#   -S ORGANIZATION=apache -S REPOSITORY=kafka -S ISSUE_NUMBER=12345 generate
# Override version: -S VERSION=2.0

providers:
  - name: github
    type: github_issues
    role: primary
    options:
      fetch_commits: true
      parse_comments: true

  - name: sections
    type: markdown_sections
    item_mapping:
      text: "{{ providers.github.description }}"
    options:
      sections:
        problem_statement: "## Problem Statement"
        hints_text: "## Hints"
        requirements: "## Requirements"
        interface: "## Interface"

  - name: metadata
    type: metadata
    item_mapping:
      text: "{{ providers.github.description }}"
    options:
      fields: "auto"

  - name: patch_splitter
    type: patch_splitter
    item_mapping:
      patch: "{{ providers.github.patch }}"

  - name: maven
    type: maven
    item_mapping:
      test_patch: "{{ fields.test_patch }}"
      FAIL_TO_PASS: "{{ fields.FAIL_TO_PASS }}"
      PASS_TO_PASS: "{{ fields.PASS_TO_PASS }}"

  - name: gradle
    type: gradle
    item_mapping:
      test_patch: "{{ fields.test_patch }}"
      FAIL_TO_PASS: "{{ fields.FAIL_TO_PASS }}"
      PASS_TO_PASS: "{{ fields.PASS_TO_PASS }}"

generator:
  name: ee_bench_codegen
  options:
    version: "{{ VERSION | default('1.0') }}"
    tags:
      exclude:
        - "ee-bench-*"
        - Epic
        - Review
        - Invalid
        - Wontfix
        - Verified
        - Bugfix
        - Documentation

selection:
  resource: issues
  filters:
    repo: "{{ ORGANIZATION }}/{{ REPOSITORY }}"
    issue_numbers: [{{ ISSUE_NUMBER }}]

output:
  format: json
