[project]
name = "ee_bench_github"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "ee_bench_generator",
    "requests>=2.28",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "responses>=0.25",
]

[project.entry-points."ee_bench_generator.providers"]
github_issues = "ee_bench_github:GitHubIssuesProvider"
github_pull_requests = "ee_bench_github:GitHubPullRequestsProvider"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ee_bench_github"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
