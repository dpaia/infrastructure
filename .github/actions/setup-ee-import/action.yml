name: 'Setup ee-dataset CLI'
description: 'Installs Python and the ee-dataset CLI from pre-built wheel'
author: 'JetBrains'

inputs:
  python_version:
    description: 'Python version to use'
    required: false
    default: '3.11'

outputs:
  venv_path:
    description: 'Path to the virtual environment containing ee-dataset'
    value: ${{ steps.install.outputs.venv_path }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install ee-dataset CLI
      id: install
      shell: bash
      run: |
        python -m venv "${RUNNER_TEMP}/ee-bench-venv"
        VENV_PATH="${RUNNER_TEMP}/ee-bench-venv"
        source "$VENV_PATH/bin/activate"
        pip install --upgrade pip
        pip install ${{ github.workspace }}/.github/tools/ee_bench-*.whl
        echo "venv_path=$VENV_PATH" >> $GITHUB_OUTPUT
        echo "$VENV_PATH/bin" >> $GITHUB_PATH

    - name: Verify ee-dataset is available
      shell: bash
      run: |
        ee-dataset --help > /dev/null 2>&1 || { echo "Error: ee-dataset CLI not found on PATH"; exit 1; }
        echo "ee-dataset CLI installed successfully"
