name: Validate Datapoint (v2)
run-name: "[dataset] Validate PR #${{ inputs.pr_number }} (key=${{ inputs.run_key }})"

on:
  workflow_dispatch:
    inputs:
      organization:
        description: 'GitHub organization (dataset repo owner)'
        required: true
        type: string
        default: 'dpaia'
      repository:
        description: 'Dataset repository name'
        required: true
        type: string
        default: 'dataset'
      pr_number:
        description: 'Dataset PR number to validate'
        required: true
        type: string
      eval_type:
        description: 'Evaluation type (e.g., codegen, debugging)'
        required: true
        type: string
      run_key:
        description: 'Unique run correlation key (UUID)'
        required: false
        type: string
        default: 'manual'
      source_organization:
        description: 'Source PR owner organization (for Dataset Metadata lookup on failure)'
        required: false
        type: string
        default: ''
      source_repository:
        description: 'Source PR repository name'
        required: false
        type: string
        default: ''
      source_pr_number:
        description: 'Source PR number'
        required: false
        type: string
        default: ''
      dataset_project_number:
        description: 'Dataset Metadata project number (for status update on failure)'
        required: false
        type: string
        default: ''

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v5

      - name: Check rate limit
        uses: ./.github/actions/check-rate-limit
        with:
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Checkout dataset PR
        uses: actions/checkout@v5
        with:
          repository: "${{ inputs.organization }}/${{ inputs.repository }}"
          token: ${{ secrets.PROJECT_TOKEN }}
          path: dataset-checkout
          ref: "refs/pull/${{ inputs.pr_number }}/head"

      - name: Detect changed instance directory
        id: detect
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          DATASET_REPO: "${{ inputs.organization }}/${{ inputs.repository }}"
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          # Get list of changed files in the PR
          CHANGED_FILES=$(gh pr diff "$PR_NUMBER" --repo "$DATASET_REPO" --name-only)

          # Find instance directories (look for datapoint.json in changed paths)
          INSTANCE_DIRS=$(echo "$CHANGED_FILES" | sed 's|/[^/]*$||' | sort -u | while read dir; do
            if [ -f "dataset-checkout/$dir/datapoint.json" ]; then
              echo "$dir"
            fi
          done)

          if [ -z "$INSTANCE_DIRS" ]; then
            echo "Error: no instance directory with datapoint.json found in PR changes" >&2
            exit 1
          fi

          # Use the first (should be only) instance directory
          INSTANCE_DIR=$(echo "$INSTANCE_DIRS" | head -1)
          INSTANCE_ID=$(jq -r '.instance_id' "dataset-checkout/$INSTANCE_DIR/datapoint.json")

          echo "instance_dir=dataset-checkout/$INSTANCE_DIR" >> $GITHUB_OUTPUT
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Detected instance: $INSTANCE_ID at $INSTANCE_DIR"

      - name: Run validation
        id: validate
        uses: ./.github/actions/run-validation
        with:
          instance_dir: ${{ steps.detect.outputs.instance_dir }}
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          EE_BENCH_ARTIFACTS_DIR: ${{ runner.temp }}/eval-artifacts

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: "validation-${{ steps.detect.outputs.instance_id }}"
          path: ${{ steps.validate.outputs.log_path }}
          if-no-files-found: warn
          retention-days: 7

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: "eval-artifacts-${{ steps.detect.outputs.instance_id }}"
          path: ${{ runner.temp }}/eval-artifacts
          if-no-files-found: ignore
          retention-days: 7

      - name: Comment on dataset PR
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          RESULT: ${{ steps.validate.outputs.result }}
          INSTANCE_ID: ${{ steps.detect.outputs.instance_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$RESULT" = "success" ]; then
            ICON="✅"
            MSG="Datapoint validation **passed**."
          else
            ICON="❌"
            MSG="Datapoint validation **failed**."
          fi

          COMMENT_BODY="${ICON} ${MSG}

          **Instance:** \`${INSTANCE_ID}\`
          **Details:** [Workflow run](${RUN_URL})"

          gh pr comment "${{ inputs.pr_number }}" \
            --repo "${{ inputs.organization }}/${{ inputs.repository }}" \
            --body "$COMMENT_BODY" || true

      # --- Auto-merge on validation success ---
      - name: Auto-merge dataset PR
        if: steps.validate.outputs.result == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          DATASET_REPO: "${{ inputs.organization }}/${{ inputs.repository }}"
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          echo "Waiting for mergeability check..."
          MAX_RETRIES=3
          RETRY=0
          MERGEABLE=""

          while [ $RETRY -lt $MAX_RETRIES ]; do
            MERGEABLE=$(gh pr view "$PR_NUMBER" --repo "$DATASET_REPO" --json mergeable --jq '.mergeable')
            if [ "$MERGEABLE" = "MERGEABLE" ] || [ "$MERGEABLE" = "CONFLICTING" ]; then
              break
            fi
            RETRY=$((RETRY + 1))
            echo "Mergeability is '$MERGEABLE', retrying ($RETRY/$MAX_RETRIES)..."
            sleep $((RETRY * 3))
          done

          if [ "$MERGEABLE" = "CONFLICTING" ]; then
            echo "::error::PR #$PR_NUMBER has merge conflicts — cannot auto-merge"
            gh pr comment "$PR_NUMBER" --repo "$DATASET_REPO" \
              --body "❌ Auto-merge failed (merge-conflict). Manual intervention required." || true
            exit 1
          fi

          if [ "$MERGEABLE" != "MERGEABLE" ]; then
            echo "::warning::PR #$PR_NUMBER mergeability is '$MERGEABLE' after $MAX_RETRIES retries — deferring to sweep"
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --repo "$DATASET_REPO" --squash --delete-branch
          echo "Successfully merged and cleaned up PR #$PR_NUMBER"

      # --- Dataset Metadata: set Status=Invalid on validation failure ---
      - name: Find source PR in Dataset Metadata project
        id: find-source-pr
        if: steps.validate.outputs.result != 'success' && inputs.dataset_project_number != '' && inputs.source_pr_number != ''
        uses: ./.github/actions/find-pr-in-project
        with:
          organization: ${{ inputs.source_organization }}
          repository: ${{ inputs.source_repository }}
          pr_number: ${{ inputs.source_pr_number }}
          project_number: ${{ inputs.dataset_project_number }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Set Dataset Metadata Status to Invalid
        if: steps.validate.outputs.result != 'success' && inputs.dataset_project_number != '' && steps.find-source-pr.outputs.item_id != ''
        uses: ./.github/actions/set-project-status
        with:
          organization: ${{ inputs.source_organization }}
          project_number: ${{ inputs.dataset_project_number }}
          item_id: ${{ steps.find-source-pr.outputs.item_id }}
          value: Invalid
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "# Datapoint Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Dataset PR:** ${{ inputs.organization }}/${{ inputs.repository }}#${{ inputs.pr_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Instance:** ${{ steps.detect.outputs.instance_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Eval type:** ${{ inputs.eval_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Result:** ${{ steps.validate.outputs.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run key:** ${{ inputs.run_key }}" >> $GITHUB_STEP_SUMMARY
