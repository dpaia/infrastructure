name: 'Run Maven Tests'
description: 'Sets up Java and Maven with caching, then compiles the project and runs Maven tests'

inputs:
  java-version:
    description: 'Java version to set up'
    required: false
    default: '8'
  distribution:
    description: 'Java distribution to use'
    required: false
    default: 'temurin'
  cache:
    description: 'Cache type to use'
    required: false
    default: 'maven'
  tests:
    description: 'Comma-separated list of tests to run (if empty, all tests will be run)'
    required: false
    default: ''
  pom-file:
    description: 'Path to the pom.xml file'
    required: false
    default: 'pom.xml'

runs:
  using: 'composite'
  steps:
    # Setup Java and Maven
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.distribution }}
        cache: ${{ inputs.cache }}
    
    # Compile project
    - name: Compile project
      shell: bash
      run: mvn -B compile --file ${{ inputs.pom-file }}

    - name: Run selected tests
      if: ${{ inputs.tests != '' }}
      shell: bash
      run: mvn -B -Dtest="${{ inputs.tests }}" test

    - name: Run all tests
      if: ${{ inputs.tests == '' }}
      shell: bash
      run: mvn -B test --file ${{ inputs.pom-file }}