[project]
name = "ee_bench_metadata"
version = "0.1.0"
description = "Metadata enrichment provider for ee_bench - extracts metadata from embedded HTML comment blocks"
requires-python = ">=3.11"
dependencies = [
    "ee_bench_generator",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[project.entry-points."ee_bench_generator.providers"]
metadata = "ee_bench_metadata:MetadataProvider"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ee_bench_metadata"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
