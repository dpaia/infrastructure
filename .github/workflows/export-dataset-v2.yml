name: Export Dataset (v2)
run-name: "Export ${{ inputs.eval_type }} (${{ inputs.format }}) | query: ${{ inputs.search_query || 'all' }} | repo: ${{ inputs.dataset_repo }}"

on:
  workflow_dispatch:
    inputs:
      eval_type:
        description: 'Eval type directory in dpaia/dataset (codegen, debugging, or "all")'
        required: true
        type: string
        default: 'codegen'
      search_query:
        description: 'GitHub search query for project board items (e.g. label:"Language: C#"). Empty = all from filesystem.'
        required: false
        type: string
        default: ''
      format:
        description: 'Output format'
        required: true
        type: choice
        options:
          - folders
          - jsonl
        default: 'folders'
      output_name:
        description: 'Output artifact name (leave empty for auto-generated "dataset-YYYY-MM-DD")'
        required: false
        type: string
        default: ''
      organization:
        description: 'GitHub organization'
        required: false
        type: string
        default: 'dpaia'
      dataset_repo:
        description: 'Dataset repository name'
        required: false
        type: string
        default: 'dataset'

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v5

      - name: Resolve output name
        id: params
        shell: bash
        run: |
          NAME="${{ inputs.output_name }}"
          if [[ -z "$NAME" ]]; then
            NAME="dataset-$(date -u +%Y-%m-%d)"
          fi
          echo "output_name=$NAME" >> $GITHUB_OUTPUT
          echo "Resolved output name: $NAME"

      - name: Checkout dataset repo
        uses: actions/checkout@v5
        with:
          repository: "${{ inputs.organization }}/${{ inputs.dataset_repo }}"
          token: ${{ secrets.PROJECT_TOKEN }}
          path: dataset-checkout

      - name: Get dataset repo commit
        id: dataset-ref
        shell: bash
        run: |
          DATASET_SHA=$(git -C dataset-checkout rev-parse HEAD)
          echo "sha=$DATASET_SHA" >> $GITHUB_OUTPUT
          echo "Dataset repo at: $DATASET_SHA"

      - name: Resolve instance list
        id: resolve
        shell: bash
        env:
          EVAL_TYPE: ${{ inputs.eval_type }}
          SEARCH_QUERY: ${{ inputs.search_query }}
          ORG: ${{ inputs.organization }}
          PROJECT_NUMBER: "13"
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          IDS_FILE="${RUNNER_TEMP}/instance-ids.txt"

          if [[ -n "$SEARCH_QUERY" ]]; then
            echo "Searching project board $ORG/$PROJECT_NUMBER with query: $SEARCH_QUERY"

            # Search project board items and extract repo names
            REPOS_FILE="${RUNNER_TEMP}/matched-repos.txt"
            gh api --paginate -X GET search/issues \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -f q="project:${ORG}/${PROJECT_NUMBER} ${SEARCH_QUERY}" \
              -f per_page="100" \
              -q '.items[] | .repository_url | split("/") | .[-1]' \
              | sort -u > "$REPOS_FILE"

            REPO_COUNT=$(wc -l < "$REPOS_FILE" | tr -d ' ')
            echo "Found $REPO_COUNT unique repos from board search"
            cat "$REPOS_FILE"

            # Find all instance IDs under matched repo directories in the dataset checkout
            while IFS= read -r repo; do
              [[ -z "$repo" ]] && continue
              if [[ "$EVAL_TYPE" == "all" ]]; then
                SEARCH_DIRS=$(find dataset-checkout -maxdepth 2 -type d -iname "$repo" 2>/dev/null)
              else
                SEARCH_DIRS=$(find "dataset-checkout/${EVAL_TYPE}" -maxdepth 1 -type d -iname "$repo" 2>/dev/null)
              fi
              for dir in $SEARCH_DIRS; do
                find "$dir" -name "datapoint.json" -exec dirname {} \; \
                  | xargs -I{} basename {} >> "$IDS_FILE"
              done
            done < "$REPOS_FILE"

            # Deduplicate
            if [[ -f "$IDS_FILE" ]]; then
              sort -u "$IDS_FILE" -o "$IDS_FILE"
            fi

            RAW_COUNT=$(wc -l < "$IDS_FILE" 2>/dev/null | tr -d ' ' || echo 0)
            echo "Found $RAW_COUNT instance IDs from matched repos"
          else
            echo "Collecting all instances from filesystem"
            if [[ "$EVAL_TYPE" == "all" ]]; then
              find dataset-checkout -name "datapoint.json" -exec dirname {} \; \
                | xargs -I{} basename {} \
                | sort -u > "$IDS_FILE"
            else
              find "dataset-checkout/${EVAL_TYPE}" -name "datapoint.json" -exec dirname {} \; \
                | xargs -I{} basename {} \
                | sort -u > "$IDS_FILE"
            fi
            FS_COUNT=$(wc -l < "$IDS_FILE" 2>/dev/null | tr -d ' ' || echo 0)
            echo "Found $FS_COUNT instance IDs from filesystem"
          fi

          TOTAL=$(wc -l < "$IDS_FILE" 2>/dev/null | tr -d ' ' || echo 0)
          echo "count=$TOTAL" >> $GITHUB_OUTPUT
          echo "ids_file=$IDS_FILE" >> $GITHUB_OUTPUT
          echo "Total instance IDs to export: $TOTAL"

      - name: Export datapoints
        id: export
        shell: bash
        env:
          FORMAT: ${{ inputs.format }}
          EVAL_TYPE: ${{ inputs.eval_type }}
          OUTPUT_NAME: ${{ steps.params.outputs.output_name }}
          IDS_FILE: ${{ steps.resolve.outputs.ids_file }}
        run: |
          OUTPUT_DIR="${RUNNER_TEMP}/export-output/${OUTPUT_NAME}"
          mkdir -p "$OUTPUT_DIR"

          EXPORTED=0
          SKIPPED=0

          while IFS= read -r INSTANCE_ID; do
            [[ -z "$INSTANCE_ID" ]] && continue

            # Locate the instance directory (search under eval_type/<repo>/<instance_id>)
            if [[ "$EVAL_TYPE" == "all" ]]; then
              INSTANCE_SRC=$(find dataset-checkout -type d -name "$INSTANCE_ID" | head -1)
            else
              INSTANCE_SRC=$(find "dataset-checkout/${EVAL_TYPE}" -type d -name "$INSTANCE_ID" | head -1)
            fi

            if [[ -z "$INSTANCE_SRC" ]] || [[ ! -d "$INSTANCE_SRC" ]]; then
              echo "Warning: skipping '$INSTANCE_ID' - directory not found in dataset repo"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            if [[ "$FORMAT" == "jsonl" ]]; then
              if [[ -f "$INSTANCE_SRC/datapoint.json" ]]; then
                jq -c '.' "$INSTANCE_SRC/datapoint.json" >> "$OUTPUT_DIR/${OUTPUT_NAME}.jsonl"
                echo "$INSTANCE_ID" >> "${RUNNER_TEMP}/exported-ids.txt"
                EXPORTED=$((EXPORTED + 1))
              else
                echo "Warning: skipping '$INSTANCE_ID' - no datapoint.json"
                SKIPPED=$((SKIPPED + 1))
              fi
            elif [[ "$FORMAT" == "folders" ]]; then
              cp -r "$INSTANCE_SRC" "$OUTPUT_DIR/$INSTANCE_ID"
              echo "$INSTANCE_ID" >> "${RUNNER_TEMP}/exported-ids.txt"
              EXPORTED=$((EXPORTED + 1))
            fi
          done < "$IDS_FILE"

          echo "Exported $EXPORTED datapoints, skipped $SKIPPED"
          echo "count=$EXPORTED" >> $GITHUB_OUTPUT

      - name: Generate manifest
        shell: bash
        env:
          OUTPUT_NAME: ${{ steps.params.outputs.output_name }}
          EVAL_TYPE: ${{ inputs.eval_type }}
          FORMAT: ${{ inputs.format }}
          SEARCH_QUERY: ${{ inputs.search_query }}
          DATASET_SHA: ${{ steps.dataset-ref.outputs.sha }}
          EXPORTED_COUNT: ${{ steps.export.outputs.count }}
        run: |
          OUTPUT_DIR="${RUNNER_TEMP}/export-output/${OUTPUT_NAME}"
          EXPORTED_IDS_FILE="${RUNNER_TEMP}/exported-ids.txt"

          # Build instance_ids array
          if [ -f "$EXPORTED_IDS_FILE" ]; then
            INSTANCE_IDS_JSON=$(jq -R -s 'split("\n") | map(select(. != ""))' "$EXPORTED_IDS_FILE")
          else
            INSTANCE_IDS_JSON="[]"
          fi

          jq -n \
            --arg eval_type "$EVAL_TYPE" \
            --arg format "$FORMAT" \
            --arg search_query "$SEARCH_QUERY" \
            --arg dataset_repo_ref "main" \
            --arg dataset_repo_commit "$DATASET_SHA" \
            --arg exported_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson datapoint_count "${EXPORTED_COUNT:-0}" \
            --argjson instance_ids "$INSTANCE_IDS_JSON" \
            '{
              eval_type: $eval_type,
              format: $format,
              search_query: $search_query,
              dataset_repo_ref: $dataset_repo_ref,
              dataset_repo_commit: $dataset_repo_commit,
              exported_at: $exported_at,
              datapoint_count: $datapoint_count,
              instance_ids: $instance_ids
            }' > "$OUTPUT_DIR/manifest.json"

          echo "Manifest written to $OUTPUT_DIR/manifest.json"
          jq '.' "$OUTPUT_DIR/manifest.json"

      - name: Upload export artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.params.outputs.output_name }}
          path: "${{ runner.temp }}/export-output/${{ steps.params.outputs.output_name }}"
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "# Export Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Eval type:** ${{ inputs.eval_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Format:** ${{ inputs.format }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Datapoints exported:** ${{ steps.export.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dataset commit:** ${{ steps.dataset-ref.outputs.sha }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ inputs.search_query }}" ]; then
            echo "- **Search filter:** ${{ inputs.search_query }}" >> $GITHUB_STEP_SUMMARY
          fi
