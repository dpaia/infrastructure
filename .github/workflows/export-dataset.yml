name: Export SWE Dataset
run-name: "[${{inputs.generator}}] Export SWE Dataset: ${{ inputs.search_query }} -> ${{ inputs.output_file }}"

on:
  workflow_dispatch:
    inputs:
      generator:
        description: 'Profile'
        required: true
        default: 'java'
        type: choice
        options:
          - java
      search_query:
        description: >
          GitHub issue search
          (example: '-label:Epic label:Security assignee:@me is:open')
        required: true
      output_file:
        description: "Export file name"
        default: "dataset.json"
      update:
        description: "Update mode for existing data"
        type: choice
        options:
          - none
          - update
          - force-update
        default: "none"

jobs:
  get-project-data:
    runs-on: ubuntu-latest
    outputs:
      project_id: ${{ steps.get-project-data.outputs.project_id }}
      commit_field_id: ${{ steps.get-project-data.outputs.commit_field_id }}
      data_field_id: ${{ steps.get-project-data.outputs.data_field_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Get project data
        id: get-project-data
        uses: ./.github/actions/get-project-data
        with:
          organization: ${{ github.repository_owner }}
          project_number: 3
          github_token: ${{ secrets.PROJECT_TOKEN }}
          fetch_status_field: 'false'

  find-issues:
    needs: get-project-data
    runs-on: ubuntu-latest
    outputs:
      issue-matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get -y install jq

      - name: Find issues by query
        id: find-issues
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ORG:  ${{ github.repository_owner }}
          QRAW: ${{ inputs.search_query }}
        shell: bash
        run: |
          ME="${{ github.actor }}"
          QFIXED=$(echo "$QRAW" | sed "s/@me/$ME/g")
          QUERY="project:$ORG/2 is:issue $QFIXED"

          echo "🔎 GitHub search query: $QUERY"

          PAGE=100
          
          # Get issue IDs and repository info for the matrix
          gh api --paginate -X GET search/issues \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -f q="$QUERY" -f per_page="$PAGE" -f advanced_search=true |
          jq -c '.items[] | {issue_id: .number | tostring, repo_name: .repository_url | split("/") | .[-1], org_name: .repository_url | split("/") | .[-2]}' |
          jq -s '.' > issue_ids.json
          
          echo "Found $(jq length issue_ids.json) issues"

      - name: Set matrix output
        id: set-matrix
        run: |
          # Ensure the JSON is properly formatted for GitHub Actions output
          MATRIX_JSON=$(jq -c '.' issue_ids.json)
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  collect-exists-data:
    needs: [find-issues]
    if: inputs.update == 'none'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Get GitHub issue ID
        id: get-issue-node-id
        uses: ./.github/actions/get-issue-node-id
        with:
          repository: ${{ matrix.issue.repo_name }}
          organization: ${{ matrix.issue.org_name }}
          issue_number: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

  update-outdated-data:
    needs: [find-issues, get-project-data]
    if: inputs.update == 'update'
    runs-on: ubuntu-latest
    outputs:
      commits-match: ${{ steps.set-matrix-output.outputs.commits-match-matrix }}
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Get GitHub issue ID
        id: get-issue-node-id
        uses: ./.github/actions/get-issue-node-id
        with:
          repository: ${{ matrix.issue.repo_name }}
          organization: ${{ matrix.issue.org_name }}
          issue_number: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get Commit field value
        id: get-commit-value
        uses: ./.github/actions/get-project-field-value
        with:
          project_id: ${{ needs.get-project-data.outputs.project_id }}
          issue_node_id: ${{ steps.get-issue-node-id.outputs.issue_node_id }}
          field_name: "Commit"
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get latest commit
        id: get-latest-commit
        uses: ./.github/actions/get-latest-commit
        with:
          organization: ${{ matrix.issue.org_name }}
          repository: ${{ matrix.issue.repo_name }}
          issue_id: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Compare commits
        id: compare-commits
        env:
          COMMIT_FIELD_VALUE: ${{ steps.get-commit-value.outputs.field_value }}
          LATEST_COMMIT: ${{ steps.get-latest-commit.outputs.commit_hash }}
        run: |
          echo "Commit field value: $COMMIT_FIELD_VALUE"
          echo "Latest commit: $LATEST_COMMIT"

          if [ -z "$COMMIT_FIELD_VALUE" ] || [ "$COMMIT_FIELD_VALUE" = "null" ] || [ "$COMMIT_FIELD_VALUE" != "$LATEST_COMMIT" ]; then
            echo "Commits don't match or Commit field is empty"
            echo "match=false" >> $GITHUB_OUTPUT
          else
            echo "Commits match"
            echo "match=true" >> $GITHUB_OUTPUT
          fi

      - name: Update Issue SWE Data
        if: steps.compare-commits.outputs.match == 'false'
        uses: ./.github/actions/update-issue-swe-data
        with:
          generator: ${{inputs.generator}}
          organization: ${{ matrix.issue.org_name }}
          repository: ${{ matrix.issue.repo_name }}
          issue_id: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}
          dataset_repo: ${{ secrets.DATASET_REPO }}
          update_status: 'false'

  update-issue-swe-data:
    needs: [find-issues]
    if: inputs.update == 'force-update'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Update Issue SWE Data
        uses: ./.github/actions/update-issue-swe-data
        with:
          generator: ${{inputs.generator}}
          organization: ${{ matrix.issue.org_name }}
          repository: ${{ matrix.issue.repo_name }}
          issue_id: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}
          dataset_repo: ${{ secrets.DATASET_REPO }}
          update_status: 'false'

  get-data-field:
    needs: [get-project-data, find-issues, collect-exists-data, update-outdated-data, update-issue-swe-data]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      has_content: ${{ steps.check_data_links.outputs.has_content }}
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Get GitHub issue ID
        id: get-issue-node-id
        uses: ./.github/actions/get-issue-node-id
        with:
          repository: ${{ matrix.issue.repo_name }}
          organization: ${{ matrix.issue.org_name }}
          issue_number: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get Data field value
        id: get-data-value
        uses: ./.github/actions/get-project-field-value
        with:
          project_id: ${{ needs.get-project-data.outputs.project_id }}
          issue_node_id: ${{ steps.get-issue-node-id.outputs.issue_node_id }}
          field_name: "Data"
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Check for links
        id: check_data_links
        env:
          DATA_VALUE: ${{ steps.get-data-value.outputs.field_value }}
        run: |
          # Check if DATA_VALUE is null, empty, or doesn't exist
          if [ -z "$DATA_VALUE" ] || [ "$DATA_VALUE" = "null" ]; then
            echo "DATA_VALUE is empty or null, no links found"
            echo "has_content=false" >> $GITHUB_OUTPUT
          else
            # Check if DATA_VALUE contains any links
            LINKS=$(echo "$DATA_VALUE" | grep -o 'https://gist\.github\.com/[a-zA-Z0-9/]*')
            if [ -n "$LINKS" ]; then
              echo "Links found in DATA_VALUE"
              echo "has_content=true" >> $GITHUB_OUTPUT
            else
              echo "No links found in DATA_VALUE"
              echo "has_content=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Download content
        if: steps.check_data_links.outputs.has_content == 'true'
        id: download-content
        uses: ./.github/actions/download-content
        with:
          data_value: ${{ steps.get-data-value.outputs.field_value }}
          org_name: ${{ matrix.issue.org_name }}
          repo_name: ${{ matrix.issue.repo_name }}
          issue_id: ${{ matrix.issue.issue_id }}

      - name: Upload processed content
        if: steps.check_data_links.outputs.has_content == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: data-${{ matrix.issue.org_name }}-${{ matrix.issue.repo_name }}-${{ matrix.issue.issue_id }}
          path: ./_content/${{ matrix.issue.org_name }}_${{ matrix.issue.repo_name }}_${{ matrix.issue.issue_id }}.json
          retention-days: 1


  aggregate-results:
    needs: get-data-field
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all content
        uses: actions/download-artifact@v4
        with:
          pattern: data-*-*-*
          path: ./_content
          merge-multiple: true

      - name: Install jq
        run: sudo apt-get update && sudo apt-get -y install jq

      - name: Combine issue data
        env:
          OUT: ${{ inputs.output_file }}
        run: |
          # Create directory for output file if it doesn't exist
          mkdir -p $(dirname "$OUT")
          mkdir -p ./_content

          # Find all JSON files recursively in the _content directory
          echo "Searching for JSON files in ./_content directory..."
          JSON_FILES=$(find ./_content -type f -name "*.json" 2>/dev/null | sort)
          
          if [ -z "$JSON_FILES" ]; then
            echo "Warning: No JSON files found in ./_content directory"
            echo "[]" > "$OUT"
            echo "Created empty JSON array in $OUT"
          else
            echo "Found $(echo "$JSON_FILES" | wc -l) JSON files"
            # Combine all individual JSON files into one JSON array
            cat $JSON_FILES | jq -s '.' > "$OUT"
            echo "Combined $(jq length "$OUT") issues into $OUT"
          fi
      
      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_file }}
          path: ${{ inputs.output_file }}
