name: 'Create Datapoint PR'
description: 'Creates or updates a PR in the dataset repository with generated datapoint files and structured metadata'
author: 'JetBrains'

inputs:
  instance_id:
    description: 'Unique instance identifier (e.g., dpaia__spring-boot-microshop-42)'
    required: true
  eval_type:
    description: 'Evaluation type (e.g., codegen, debugging)'
    required: true
  source_pr_url:
    description: 'URL of the source PR that generated this datapoint'
    required: true
  source_commit:
    description: 'Head SHA of the source PR at generation time'
    required: true
  datapoint_path:
    description: 'Local path to the generated datapoint directory (must contain datapoint.json and subdirectories)'
    required: true
  source_repo_name:
    description: 'Source repository name, used as subdirectory under eval_type (e.g., spectre.console)'
    required: true
  flat_json_path:
    description: 'Local path to the flat JSON file (all files inlined). Copied as <eval_type>/<repo>/<instance_id>.json'
    required: false
    default: ''
  dataset_repo:
    description: 'Dataset repository (owner/name)'
    required: false
    default: 'dpaia/dataset'
  github_token:
    description: 'GitHub token with contents:write and pull_requests:write on the dataset repo'
    required: true

outputs:
  pr_number:
    description: 'PR number in the dataset repository'
    value: ${{ steps.create-pr.outputs.pr_number }}
  pr_url:
    description: 'URL of the dataset PR'
    value: ${{ steps.create-pr.outputs.pr_url }}
  branch_name:
    description: 'Branch name created in the dataset repo'
    value: ${{ steps.create-pr.outputs.branch_name }}

runs:
  using: 'composite'
  steps:
    - name: Create or update datapoint PR
      id: create-pr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        INSTANCE_ID: ${{ inputs.instance_id }}
        EVAL_TYPE: ${{ inputs.eval_type }}
        SOURCE_REPO_NAME: ${{ inputs.source_repo_name }}
        SOURCE_PR_URL: ${{ inputs.source_pr_url }}
        SOURCE_COMMIT: ${{ inputs.source_commit }}
        DATAPOINT_PATH: ${{ inputs.datapoint_path }}
        FLAT_JSON_PATH: ${{ inputs.flat_json_path }}
        DATASET_REPO: ${{ inputs.dataset_repo }}
      run: |
        set -euo pipefail

        BRANCH_NAME="datapoint/${EVAL_TYPE}/${INSTANCE_ID}"
        DATASET_DIR="${RUNNER_TEMP}/dataset-checkout"
        GENERATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

        echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

        # Validate datapoint path
        if [ ! -d "$DATAPOINT_PATH" ]; then
          echo "Error: datapoint path '$DATAPOINT_PATH' does not exist" >&2
          exit 1
        fi
        if [ ! -f "$DATAPOINT_PATH/datapoint.json" ]; then
          echo "Error: datapoint.json not found in '$DATAPOINT_PATH'" >&2
          exit 1
        fi

        # Clone dataset repo
        rm -rf "$DATASET_DIR"
        git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${DATASET_REPO}.git" "$DATASET_DIR"
        cd "$DATASET_DIR"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # Check if branch already exists on remote
        BRANCH_EXISTS="false"
        if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
          BRANCH_EXISTS="true"
          echo "Branch '$BRANCH_NAME' exists, will update"
          git fetch origin "$BRANCH_NAME:$BRANCH_NAME"
          git checkout "$BRANCH_NAME"
        else
          echo "Creating new branch '$BRANCH_NAME'"
          git checkout -b "$BRANCH_NAME"
        fi

        # Copy datapoint files into the target directory (structured folder)
        TARGET_DIR="${EVAL_TYPE}/${SOURCE_REPO_NAME}/${INSTANCE_ID}"
        rm -rf "$TARGET_DIR"
        mkdir -p "$TARGET_DIR"
        cp -r "$DATAPOINT_PATH"/* "$TARGET_DIR/"

        # Copy flat JSON (all files inlined) as sibling file
        FLAT_JSON_TARGET="${EVAL_TYPE}/${SOURCE_REPO_NAME}/${INSTANCE_ID}.json"
        if [ -n "$FLAT_JSON_PATH" ] && [ -f "$FLAT_JSON_PATH" ]; then
          cp "$FLAT_JSON_PATH" "$FLAT_JSON_TARGET"
          echo "Copied flat JSON to $FLAT_JSON_TARGET"
        else
          echo "No flat JSON provided or not found, skipping"
        fi

        # Stage and commit
        git add "$TARGET_DIR"
        if [ -f "$FLAT_JSON_TARGET" ]; then
          git add "$FLAT_JSON_TARGET"
        fi
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Add datapoint ${INSTANCE_ID} (eval_type=${EVAL_TYPE})"
        fi

        # Push (force for updates to existing branch)
        if [ "$BRANCH_EXISTS" = "true" ]; then
          git push --force origin "$BRANCH_NAME"
        else
          git push -u origin "$BRANCH_NAME"
        fi

        # Fetch source PR metadata for title and description
        # Extract owner/repo and PR number from SOURCE_PR_URL
        SOURCE_REPO=$(echo "$SOURCE_PR_URL" | grep -oP 'github\.com/\K[^/]+/[^/]+')
        SOURCE_PR_NUM=$(echo "$SOURCE_PR_URL" | grep -oE '[0-9]+$')
        SOURCE_REPO_NAME=$(echo "$SOURCE_REPO" | cut -d/ -f2)

        SOURCE_PR_TITLE=""
        SOURCE_PR_BODY=""
        if [ -n "$SOURCE_REPO" ] && [ -n "$SOURCE_PR_NUM" ]; then
          PR_JSON=$(gh pr view "$SOURCE_PR_NUM" --repo "$SOURCE_REPO" --json title,body 2>/dev/null || echo '{}')
          SOURCE_PR_TITLE=$(echo "$PR_JSON" | jq -r '.title // empty')
          SOURCE_PR_BODY=$(echo "$PR_JSON" | jq -r '.body // empty')
        fi

        # Strip FAIL_TO_PASS / PASS_TO_PASS lines from source PR body
        if [ -n "$SOURCE_PR_BODY" ]; then
          SOURCE_PR_BODY=$(echo "$SOURCE_PR_BODY" | grep -vE '^\s*(FAIL_TO_PASS|PASS_TO_PASS)\s*:' || true)
        fi

        # Dataset PR title: [repo] Source PR title (matching v1 pattern)
        # Take only the first line and truncate to keep title reasonable
        if [ -n "$SOURCE_PR_TITLE" ]; then
          SOURCE_PR_TITLE_LINE=$(echo "$SOURCE_PR_TITLE" | head -1 | cut -c1-120)
          DATASET_PR_TITLE="[${SOURCE_REPO_NAME}] ${SOURCE_PR_TITLE_LINE}"
        else
          DATASET_PR_TITLE="[${SOURCE_REPO_NAME}] ${INSTANCE_ID}"
        fi

        # Build PR body matching v1 pattern:
        # <PR title> #<number>\n\n<description>\n\nPull Request: ...\nCommit: ...\n\nGenerated by ...
        PR_BODY_FILE="${RUNNER_TEMP}/pr-body.md"
        {
          echo "${SOURCE_PR_TITLE_LINE:-$INSTANCE_ID} #${SOURCE_PR_NUM}"
          echo ""
          if [ -n "$SOURCE_PR_BODY" ]; then
            echo "$SOURCE_PR_BODY"
            echo ""
          fi
          echo "Pull Request: ${SOURCE_PR_URL}"
          echo "Commit: https://github.com/${SOURCE_REPO}/commit/${SOURCE_COMMIT}"
          echo ""
          echo "Generated by GitHub Action on ${GENERATED_AT}"
          echo ""
          echo "<!-- metadata"
          echo "instance_id: ${INSTANCE_ID}"
          echo "eval_type: ${EVAL_TYPE}"
          echo "source_repo: ${SOURCE_REPO_NAME}"
          echo "source_pr: ${SOURCE_PR_URL}"
          echo "source_commit: ${SOURCE_COMMIT}"
          echo "generated_at: ${GENERATED_AT}"
          echo "-->"
        } > "$PR_BODY_FILE"

        # Check for existing PR
        EXISTING_PR=$(gh pr list --repo "$DATASET_REPO" --head "$BRANCH_NAME" --state open --json number -q '.[0].number' 2>/dev/null || echo "")

        if [ -n "$EXISTING_PR" ]; then
          echo "Updating existing PR #$EXISTING_PR"
          gh pr edit "$EXISTING_PR" --repo "$DATASET_REPO" --title "$DATASET_PR_TITLE" --body-file "$PR_BODY_FILE"
          PR_URL=$(gh pr view "$EXISTING_PR" --repo "$DATASET_REPO" --json url -q '.url')
          echo "pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
        else
          echo "Creating new PR"
          PR_URL=$(gh pr create --repo "$DATASET_REPO" \
            --head "$BRANCH_NAME" \
            --base "main" \
            --title "$DATASET_PR_TITLE" \
            --body-file "$PR_BODY_FILE")
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
        fi

        echo "Datapoint PR ready: $PR_URL"
