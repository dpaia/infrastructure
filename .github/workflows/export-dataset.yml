name: Export SWE Dataset
run-name: "Export SWE Dataset: ${{ inputs.search_query }} -> ${{ inputs.output_file }}"

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: >
          GitHub issue search
          (example: '-label:Epic label:Security assignee:@me is:open')
        required: true
      output_file:
        description: "Export file name"
        default: "dataset.json"
      update:
        description: "Update mode for existing data"
        type: choice
        options:
          - none
          - create
          - force-update
        default: "none"

jobs:
  find-issues:
    runs-on: ubuntu-latest
    outputs:
      issue-matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get -y install jq

      - name: Find issues by query
        id: find-issues
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ORG:  ${{ github.repository_owner }}
          QRAW: ${{ inputs.search_query }}
        shell: bash
        run: |
          ME="${{ github.actor }}"
          QFIXED=$(echo "$QRAW" | sed "s/@me/$ME/g")
          QUERY="(project:$ORG/2 OR project:$ORG/3) is:issue $QFIXED"

          echo "🔎 GitHub search query: $QUERY"

          PAGE=100
          
          # Get issue IDs and repository info for the matrix
          gh api --paginate -X GET search/issues \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -f q="$QUERY" -f per_page="$PAGE" -f advanced_search=true |
          jq -c '.items[] | {issue_id: .number | tostring, repo_name: .repository_url | split("/") | .[-1], org_name: .repository_url | split("/") | .[-2]}' |
          jq -s '.' > issue_ids.json
          
          echo "Found $(jq length issue_ids.json) issues"
          
      - name: Set matrix output
        id: set-matrix
        run: |
          # Ensure the JSON is properly formatted for GitHub Actions output
          MATRIX_JSON=$(jq -c '.' issue_ids.json)
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  process-issues:
    needs: find-issues
    runs-on: ubuntu-latest
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - name: Get issue data
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_ID: ${{ matrix.issue.issue_id }}
          REPO_NAME: ${{ matrix.issue.repo_name }}
          ORG_NAME: ${{ matrix.issue.org_name }}
        run: |
          mkdir -p ./issue_data
          
          # Get detailed data for this specific issue
          gh api -X GET repos/$ORG_NAME/$REPO_NAME/issues/$ISSUE_ID |
          jq -c '{id: .number, title: .title, repo: $REPO_NAME, org: $ORG_NAME}' --arg REPO_NAME "$REPO_NAME" --arg ORG_NAME "$ORG_NAME" > ./issue_data/issue_${ORG_NAME}_${REPO_NAME}_${ISSUE_ID}.json
          
          echo "Processed issue #$ISSUE_ID from $ORG_NAME/$REPO_NAME"
      
      - name: Upload individual issue data
        uses: actions/upload-artifact@v4
        with:
          name: issue-${{ matrix.issue.org_name }}-${{ matrix.issue.repo_name }}-${{ matrix.issue.issue_id }}-data
          path: ./issue_data/issue_${{ matrix.issue.org_name }}_${{ matrix.issue.repo_name }}_${{ matrix.issue.issue_id }}.json
          retention-days: 1

  aggregate-results:
    needs: process-issues
    runs-on: ubuntu-latest
    steps:
      - name: Download all issue data
        uses: actions/download-artifact@v4
        with:
          pattern: issue-*-*-*-data
          path: ./all_issues
          merge-multiple: true
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get -y install jq
      
      - name: Combine issue data
        env:
          OUT: ${{ inputs.output_file }}
        run: |
          # Combine all individual issue files into one JSON array
          find ./all_issues -name "*.json" -exec cat {} \; | jq -s '.' > "$OUT"
          echo "Combined $(jq length "$OUT") issues into $OUT"
      
      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-tasks
          path: ${{ inputs.output_file }}
