name: 'Run Export Script'
description: 'Resolves and runs an export script to generate a datapoint from a source PR'

inputs:
  organization:
    description: 'GitHub organization name'
    required: true
  repository:
    description: 'Repository name'
    required: true
  pr_number:
    description: 'Pull request number'
    required: true
  eval_type:
    description: 'Evaluation type (e.g., codegen, debugging)'
    required: true
  export_script:
    description: 'Export script path relative to .github/scripts/, without .py extension (optional, defaults to export/<eval_type>/export_unified)'
    required: false
    default: ''
  github_token:
    description: 'GitHub token for API access'
    required: true

outputs:
  instance_id:
    description: 'Generated instance ID'
    value: ${{ steps.generate.outputs.instance_id }}
  instance_dir:
    description: 'Path to the generated instance directory'
    value: ${{ steps.generate.outputs.instance_dir }}
  flat_json:
    description: 'Path to the flat JSON file (if generated)'
    value: ${{ steps.generate.outputs.flat_json }}

runs:
  using: 'composite'
  steps:
    - name: Generate datapoint
      id: generate
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        ORGANIZATION: ${{ inputs.organization }}
        REPOSITORY: ${{ inputs.repository }}
        PR_NUMBER: ${{ inputs.pr_number }}
        EVAL_TYPE: ${{ inputs.eval_type }}
        EXPORT_SCRIPT_PATH: ${{ inputs.export_script }}
      run: |
        OUTPUT_DIR="${RUNNER_TEMP}/datapoint-output"
        mkdir -p "$OUTPUT_DIR"

        # Use provided path or fall back to convention: export/<eval_type>/export_unified
        if [ -n "$EXPORT_SCRIPT_PATH" ]; then
          EXPORT_SCRIPT=".github/scripts/${EXPORT_SCRIPT_PATH}.py"
        else
          EXPORT_SCRIPT=".github/scripts/export/${EVAL_TYPE}/export_unified.py"
        fi
        if [ ! -f "$EXPORT_SCRIPT" ]; then
          echo "Error: export script not found at '${EXPORT_SCRIPT}'" >&2
          exit 1
        fi

        python3 "$EXPORT_SCRIPT" \
          --set REPO="${ORGANIZATION}/${REPOSITORY}" \
          --set PR_NUMBER="${PR_NUMBER}" \
          --set VERSION="1.0" \
          --set OUTPUT_DIR="$OUTPUT_DIR"

        INSTANCE_DIR=$(find "$OUTPUT_DIR" -name "datapoint.json" -exec dirname {} \; | head -1)
        if [ -z "$INSTANCE_DIR" ]; then
          echo "Error: no datapoint.json found in output" >&2
          exit 1
        fi

        INSTANCE_ID=$(jq -r '.instance_id' "$INSTANCE_DIR/datapoint.json")
        echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
        echo "instance_dir=$INSTANCE_DIR" >> $GITHUB_OUTPUT

        # Locate flat JSON (all files inlined)
        FLAT_JSON="$OUTPUT_DIR/${INSTANCE_ID}.json"
        if [ -f "$FLAT_JSON" ]; then
          echo "flat_json=$FLAT_JSON" >> $GITHUB_OUTPUT
          echo "Flat JSON: $FLAT_JSON"
        else
          echo "Warning: flat JSON not found at $FLAT_JSON"
        fi
