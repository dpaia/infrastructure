name: Generate SWE Dataset Data
run-name: "[${{inputs.generator}}] Generate SWE Dataset Data: ${{ inputs.search_query }}"

on:
  workflow_dispatch:
    inputs:
      organization:
        description: 'GitHub organization name'
        required: true
        type: string
        default: 'jetbrains-eval-lab'
      generator:
        description: 'Profile'
        required: true
        default: 'java'
        type: choice
        options:
          - java
      search_query:
        description: >
          GitHub issue search
          (example: '-label:Epic label:Security assignee:@me is:open')
        required: true
        default: '-label:Epic label:Verified'
        type: string
      update:
        description: "Update mode for existing data"
        type: choice
        options:
          - update
          - force-update
        default: "update"
      auto_merge:
        description: 'Automatically merge data updates'
        required: false
        type: boolean
        default: false

jobs:
  get-project-data:
    runs-on: ubuntu-latest
    outputs:
      project_id: ${{ steps.get-project-data.outputs.project_id }}
      commit_field_id: ${{ steps.get-project-data.outputs.commit_field_id }}
      data_field_id: ${{ steps.get-project-data.outputs.data_field_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Get project data
        id: get-project-data
        uses: ./.github/actions/get-project-data
        with:
          organization: ${{ github.repository_owner }}
          project_number: 3
          github_token: ${{ secrets.PROJECT_TOKEN }}
          fetch_status_field: 'false'

  find-issues:
    needs: get-project-data
    runs-on: ubuntu-latest
    outputs:
      issue-matrix: ${{ steps.find-issues.outputs.issue-matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Find issues by query
        id: find-issues
        uses: ./.github/actions/find-issues
        with:
          search_query: "project:${{ inputs.organization }}/2 is:issue ${{ inputs.search_query }}"
          github_token: ${{ secrets.PROJECT_TOKEN }}

  update-outdated-data:
    needs: [find-issues, get-project-data]
    if: inputs.update == 'update'
    runs-on: ubuntu-latest
    outputs:
      commits-match: ${{ steps.set-matrix-output.outputs.commits-match-matrix }}
      pull_requests: ${{ toJSON(steps.collect-prs.outputs) }}
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Get GitHub issue ID
        id: get-issue-node-id
        uses: ./.github/actions/get-issue-node-id
        with:
          repository: ${{ matrix.issue.repo_name }}
          organization: ${{ matrix.issue.org_name }}
          issue_number: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get Commit field value
        id: get-commit-value
        uses: ./.github/actions/get-project-field-value
        with:
          project_id: ${{ needs.get-project-data.outputs.project_id }}
          issue_node_id: ${{ steps.get-issue-node-id.outputs.issue_node_id }}
          field_name: "Commit"
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get latest commit
        id: get-latest-commit
        uses: ./.github/actions/get-latest-commit
        with:
          organization: ${{ matrix.issue.org_name }}
          repository: ${{ matrix.issue.repo_name }}
          issue_id: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Compare commits
        id: compare-commits
        env:
          COMMIT_FIELD_VALUE: ${{ steps.get-commit-value.outputs.field_value }}
          LATEST_COMMIT: ${{ steps.get-latest-commit.outputs.commit_hash }}
        run: |
          echo "Commit field value: $COMMIT_FIELD_VALUE"
          echo "Latest commit: $LATEST_COMMIT"

          if [ -z "$COMMIT_FIELD_VALUE" ] || [ "$COMMIT_FIELD_VALUE" = "null" ] || [ "$COMMIT_FIELD_VALUE" != "$LATEST_COMMIT" ]; then
            echo "Commits don't match or Commit field is empty"
            echo "match=false" >> $GITHUB_OUTPUT
          else
            echo "Commits match"
            echo "match=true" >> $GITHUB_OUTPUT
          fi

      - name: Update Issue SWE Data
        if: steps.compare-commits.outputs.match == 'false'
        id: update-swe-data
        uses: ./.github/actions/update-issue-swe-data
        with:
          generator: ${{inputs.generator}}
          organization: ${{ matrix.issue.org_name }}
          repository: ${{ matrix.issue.repo_name }}
          issue_id: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}
          dataset_repo: ${{ vars.DATASET_REPO }}
          auto_merge: false
          
      - name: Collect PR URLs
        id: collect-prs
        if: steps.compare-commits.outputs.match == 'false' && steps.update-swe-data.outputs.pull_request_url != ''
        run: |
          echo "pr_${{ matrix.issue.issue_id }}=${{ steps.update-swe-data.outputs.pull_request_url }}" >> $GITHUB_OUTPUT

  # This job runs after all matrix jobs are complete to collect PR URLs
  collect-prs:
    needs: [update-outdated-data, update-issue-swe-data]
    if: inputs.auto_merge && always()
    runs-on: ubuntu-latest
    outputs:
      pr_list: ${{ steps.extract-prs.outputs.pr_list }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract PR URLs
        id: extract-prs
        run: |
          echo "Collecting PR URLs based on update mode: ${{ inputs.update }}"

          # Create a temporary file to store PR URLs
          touch pr_list.txt

          # Extract PR URLs based on which job actually ran
          if [ "${{ inputs.update }}" = "update" ]; then
            echo "Using PR data from update-outdated-data job"

            # Extract each PR URL from the outputs object
            OUTPUT_JSON='${{ toJSON(needs.update-outdated-data.outputs) }}'
            echo "$OUTPUT_JSON" > temp_output.json

            # Extract PR URLs using grep and pattern matching instead of jq
            grep -o 'https://github.com/[^"]*' temp_output.json > pr_list.txt || true

          else
            echo "Using PR data from update-issue-swe-data job"

            # Extract each PR URL from the outputs object
            OUTPUT_JSON='${{ toJSON(needs.update-issue-swe-data.outputs) }}'
            echo "$OUTPUT_JSON" > temp_output.json

            # Extract PR URLs using grep and pattern matching instead of jq
            grep -o 'https://github.com/[^"]*' temp_output.json > pr_list.txt || true
          fi

          # Create a comma-separated list of PR URLs
          PR_LIST=$(cat pr_list.txt | tr '\n' ',' | sed 's/,$//')

          echo "Found PRs: $PR_LIST"

          # Output the list of PRs
          echo "pr_list=$PR_LIST" >> $GITHUB_OUTPUT
          echo "PR collection complete"

  update-issue-swe-data:
    needs: [find-issues]
    if: inputs.update == 'force-update'
    runs-on: ubuntu-latest
    outputs:
      pull_requests: ${{ toJSON(steps.collect-prs.outputs) }}
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Update Issue SWE Data
        id: update-swe-data
        uses: ./.github/actions/update-issue-swe-data
        with:
          generator: ${{inputs.generator}}
          organization: ${{ matrix.issue.org_name }}
          repository: ${{ matrix.issue.repo_name }}
          issue_id: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}
          dataset_repo: ${{ vars.DATASET_REPO }}
          auto_merge: false
          
      - name: Collect PR URLs
        id: collect-prs
        if: steps.update-swe-data.outputs.pull_request_url != ''
        run: |
          echo "pr_${{ matrix.issue.issue_id }}=${{ steps.update-swe-data.outputs.pull_request_url }}" >> $GITHUB_OUTPUT

  merge-pull-requests:
    needs: [collect-prs]
    if: inputs.auto_merge && always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Merge Pull Requests
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PR_LIST: ${{ needs.collect-prs.outputs.pr_list }}
        run: |
          echo "Merging pull requests..."
          echo "Auto merge value: ${{ inputs.auto_merge }}"

          echo "DEBUG: PR List: $PR_LIST"

          # Check if we have PRs to merge
          if [ -z "$PR_LIST" ]; then
            echo "No pull requests to merge."
            exit 0
          fi

          # Convert comma-separated list back to newline-separated list
          echo "$PR_LIST" | tr ',' '\n' > pr_urls.txt

          echo "Found the following pull requests to merge:"
          cat pr_urls.txt

          # Merge each PR one by one
          while read pr_url; do
            if [ -n "$pr_url" ]; then
              echo "Merging pull request: $pr_url"
              gh pr merge "$pr_url" --rebase --delete-branch || echo "Failed to merge PR: $pr_url"

              # Wait a bit between merges to avoid rate limiting
              sleep 2
            fi
          done < pr_urls.txt
          
          echo "All pull requests have been merged."