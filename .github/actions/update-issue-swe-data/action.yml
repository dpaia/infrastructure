name: 'Update Issue SWE Data'
description: 'Updates Software Engineering data for a GitHub issue'
author: 'JetBrains'

inputs:
  generator:
    description: 'Profile for data generation'
    required: true
    default: 'java'
  organization:
    description: 'GitHub organization name'
    required: true
  repository:
    description: 'Repository name'
    required: true
  issue_id:
    description: 'Issue number'
    required: true
  github_token:
    description: 'GitHub token for API access'
    required: true
  dataset_repo:
    description: 'Repository for storing dataset files'
    required: true
  update_status:
    description: 'Whether to update the Status field in the project'
    required: false
    default: 'true'
  auto_merge:
    description: 'Automatically merge the pull request'
    required: false
    default: 'false'

outputs:
  file_url:
    description: 'The URL of the created or updated file in the repository'
    value: ${{ steps.create-dataset-file.outputs.file_url }}
  has_error:
    description: 'Whether there was an error during the process'
    value: ${{ steps.check-error.outputs.has_error }}
  pull_request_url:
    description: 'The URL of the created pull request'
    value: ${{ steps.create-dataset-file.outputs.pull_request_url }}

runs:
  using: 'composite'
  steps:
    - name: Get latest commit
      id: get-commits
      uses: ./.github/actions/get-commits
      with:
        organization: ${{ inputs.organization }}
        repository: ${{ inputs.repository }}
        issue_id: ${{ inputs.issue_id }}
        github_token: ${{ inputs.github_token }}
        
    - name: Check if commits were found
      id: check-commits
      shell: bash
      env:
        COMMITS: ${{ steps.get-commits.outputs.commits }}
        COMMIT_HASH: ${{ steps.get-commits.outputs.commit_hash }}
      run: |
        if [ -z "$COMMIT_HASH" ] || [ "$COMMITS" == "[]" ]; then
          echo "No commits found for issue #${{ inputs.issue_id }}"
          exit 1
        else
          echo "Commits found for issue #${{ inputs.issue_id }}"
        fi

    - name: Fetch GitHub issue ID
      id: fetch-issue-id
      uses: ./.github/actions/get-issue-node-id
      with:
        repository: ${{ inputs.repository }}
        organization: ${{ inputs.organization }}
        issue_number: ${{ inputs.issue_id }}
        github_token: ${{ inputs.github_token }}

    - name: Get project ID
      id: get-project-id
      uses: ./.github/actions/get-project-id
      with:
        organization: ${{ inputs.organization }}
        project_number: 3
        github_token: ${{ inputs.github_token }}
        
    - name: Get commit field ID
      id: get-commit-field-id
      uses: ./.github/actions/get-project-field-id
      with:
        project_id: ${{ steps.get-project-id.outputs.project_id }}
        field_name: "Commit"
        github_token: ${{ inputs.github_token }}
        
    - name: Get data field ID
      id: get-data-field-id
      uses: ./.github/actions/get-project-field-id
      with:
        project_id: ${{ steps.get-project-id.outputs.project_id }}
        field_name: "Data"
        github_token: ${{ inputs.github_token }}
        
    - name: Get status field ID
      id: get-status-field-id
      if: inputs.update_status == 'true'
      uses: ./.github/actions/get-project-field-id
      with:
        project_id: ${{ steps.get-project-id.outputs.project_id }}
        field_name: "Status"
        github_token: ${{ inputs.github_token }}

    - name: Add Issue to Project
      id: add-to-project
      uses: ./.github/actions/add-issue-to-project
      with:
        project_id: ${{ steps.get-project-id.outputs.project_id }}
        issue_node_id: ${{ steps.fetch-issue-id.outputs.issue_node_id }}
        github_token: ${{ inputs.github_token }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Extract FAIL_TO_PASS and PASS_TO_PASS
      id: extract-fields
      shell: bash
      env:
        ISSUE_NUMBER: ${{ inputs.issue_id }}
        REPOSITORY: ${{ inputs.repository }}
        ORGANIZATION: ${{ inputs.organization }}
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        chmod +x .github/python/utils/extract_test_fields.py
        # Run the script and let it output directly to GITHUB_OUTPUT
        .github/python/utils/extract_test_fields.py >> $GITHUB_OUTPUT

    - name: Check if test fields are empty
      id: check-test-fields
      shell: bash
      env:
        FAIL_TO_PASS: ${{ steps.extract-fields.outputs.fail_to_pass }}
        PASS_TO_PASS: ${{ steps.extract-fields.outputs.pass_to_pass }}
      run: |
        if [ "$FAIL_TO_PASS" == "[]" ] && [ "$PASS_TO_PASS" == "[]" ]; then
          echo "Both FAIL_TO_PASS and PASS_TO_PASS are empty. Skipping data generation."
          echo "empty_test_fields=true" >> $GITHUB_OUTPUT
        else
          echo "Test fields are not empty. Proceeding with data generation."
          echo "empty_test_fields=false" >> $GITHUB_OUTPUT
        fi

    - name: Generate data
      id: generate-data
      if: steps.check-test-fields.outputs.empty_test_fields != 'true'
      shell: bash
      env:
        ISSUE_NUMBER: ${{ inputs.issue_id }}
        REPOSITORY: ${{ inputs.repository }}
        ORGANIZATION: ${{ inputs.organization }}
        LATEST_COMMIT: ${{ steps.get-commits.outputs.commit_hash }}
        BASE_COMMIT: ${{ steps.get-commits.outputs.base_commit_hash || '' }}
        LINKED_COMMITS: ${{ steps.get-commits.outputs.commits }}
        GH_TOKEN: ${{ inputs.github_token }}
        FAIL_TO_PASS: ${{ steps.extract-fields.outputs.fail_to_pass }}
        PASS_TO_PASS: ${{ steps.extract-fields.outputs.pass_to_pass }}
      run: |
        chmod +x .github/python/${{ inputs.generator }}.py
        echo "data_value<<EOF" >> $GITHUB_OUTPUT
        .github/python/${{ inputs.generator }}.py >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Check for errors
      id: check-error
      shell: bash
      env:
        DATA_VALUE: ${{ steps.generate-data.outputs.data_value }}
        EXTRACT_ERROR: ${{ steps.extract-fields.outputs.has_error }}
        EMPTY_TEST_FIELDS: ${{ steps.check-test-fields.outputs.empty_test_fields }}
        FAIL_TO_PASS: ${{ steps.extract-fields.outputs.fail_to_pass }}
        PASS_TO_PASS: ${{ steps.extract-fields.outputs.pass_to_pass }}
      run: |
        if [ "$EXTRACT_ERROR" == "true" ] || [ "$EMPTY_TEST_FIELDS" == "true" ] || ([ -n "$DATA_VALUE" ] && echo "$DATA_VALUE" | jq -e '.has_error == true' > /dev/null 2>&1); then
          if [ "$EMPTY_TEST_FIELDS" == "true" ]; then
            echo "Both FAIL_TO_PASS and PASS_TO_PASS are empty."
          else
            echo "Error detected in data generation or test field extraction."
          fi
          echo "has_error=true" >> $GITHUB_OUTPUT
        else
          echo "Data generated successfully."
          echo "has_error=false" >> $GITHUB_OUTPUT
        fi

    - name: Generate commit message
      id: generate-commit-message
      if: steps.check-error.outputs.has_error != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        ISSUE_ID: ${{ inputs.issue_id }}
        REPOSITORY: ${{ inputs.repository }}
        ORGANIZATION: ${{ inputs.organization }}
        LATEST_COMMIT: ${{ steps.get-commits.outputs.commit_hash }}
        FAIL_TO_PASS: ${{ steps.extract-fields.outputs.fail_to_pass }}
        PASS_TO_PASS: ${{ steps.extract-fields.outputs.pass_to_pass }}
      run: |
        # Make the script executable
        chmod +x .github/python/utils/generate_commit_message.py

        # Generate the commit message and title using Python script
        # Run the script and let it output directly to GITHUB_OUTPUT
        .github/python/utils/generate_commit_message.py >> $GITHUB_OUTPUT      

        echo "✅ Commit message and title generated successfully!"

    - name: Create or update data file
      id: create-dataset-file
      if: steps.check-error.outputs.has_error != 'true'
      uses: ./.github/actions/update-data-file
      with:
        organization: ${{ inputs.organization }}
        repository: ${{ inputs.repository }}
        issue_id: ${{ inputs.issue_id }}
        data_value: ${{ steps.generate-data.outputs.data_value }}
        title: ${{ steps.generate-commit-message.outputs.title }}
        commit_message: ${{ steps.generate-commit-message.outputs.commit_message }}
        github_token: ${{ inputs.github_token }}
        dataset_repo: ${{ inputs.dataset_repo }}
        auto_merge: ${{ inputs.auto_merge }}

    - name: Update Data field
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        PROJECT_ID: ${{ steps.get-project-id.outputs.project_id }}
        ITEM_ID: ${{ steps.add-to-project.outputs.item_id }}
        DATA_FIELD_ID: ${{ steps.get-data-field-id.outputs.field_id }}
        FILE_URL: ${{ steps.create-dataset-file.outputs.file_url }}
        HAS_ERROR: ${{ steps.check-error.outputs.has_error }}
      run: |
        echo "Setting Data field value..."

        # Set the value based on whether there was an error
        if [ "$HAS_ERROR" == "true" ]; then
          echo "Error detected in data generation or test field extraction. Setting empty Data field."
          VALUE_TO_SET=""
        else
          echo "Using file URL: $FILE_URL"
          VALUE_TO_SET="$FILE_URL"
        fi

        gh api graphql -f query='
        mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $value:String!) {
          updateProjectV2ItemFieldValue(input: {
            projectId: $projectId,
            itemId: $itemId,
            fieldId: $fieldId,
            value: {
              text: $value
            }
          }) {
            projectV2Item {
              id
            }
          }
        }' -f projectId=$PROJECT_ID -f itemId=$ITEM_ID -f fieldId=$DATA_FIELD_ID -f value="$VALUE_TO_SET"

        if [ "$VALUE_TO_SET" == "" ]; then
          echo "✅ Data field updated with empty value due to error!"
        else
          echo "✅ Data field updated with URL: $VALUE_TO_SET"
        fi

    - name: Update Status field
      if: inputs.update_status == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        PROJECT_ID: ${{ steps.get-project-id.outputs.project_id }}
        ITEM_ID: ${{ steps.add-to-project.outputs.item_id }}
        STATUS_FIELD_ID: ${{ steps.get-status-field-id.outputs.field_id }}
        HAS_ERROR: ${{ steps.check-error.outputs.has_error }}
      run: |
        # Check if there was an error
        if [ "$HAS_ERROR" == "true" ]; then
          TARGET_STATUS="Failed"
          echo "Setting Status field to Failed due to error in workflow..."
        else
          TARGET_STATUS="Done"
          echo "Setting Status field to Done..."
        fi

        # First, we need to get the option ID for the target status in the Status field
        echo "Fetching option ID for '$TARGET_STATUS' status..."
        status_options=$(gh api graphql -f query='
        query($project:ID!) {
          node(id: $project) {
            ... on ProjectV2 {
              fields(first: 100) {
                nodes {
                  ... on ProjectV2SingleSelectField {
                    id
                    name
                    options {
                      id
                      name
                    }
                  }
                }
              }
            }
          }
        }' -f project=$PROJECT_ID)

        # Extract options for the Status field
        status_field_options=$(echo "$status_options" | jq -r '.data.node.fields.nodes[] | select(.id == "'$STATUS_FIELD_ID'") | .options')

        # Try to find the target status option
        target_option_id=$(echo "$status_field_options" | jq -r '.[] | select(.name == "'$TARGET_STATUS'") | .id')

        if [ -z "$target_option_id" ]; then
          echo "Warning: '$TARGET_STATUS' option not found in Status field. Available options:"
          echo "$status_field_options" | jq -r '.[].name'

          # If target was Failed but not found, try to find Error, Failed, or Failure
          if [ "$TARGET_STATUS" == "Failed" ]; then
            for fallback in "Error" "Failed" "Failure" "Bug"; do
              target_option_id=$(echo "$status_field_options" | jq -r '.[] | select(.name == "'$fallback'") | .id')
              if [ -n "$target_option_id" ]; then
                echo "Using '$fallback' as fallback for Failed status"
                break
              fi
            done
          fi

          # If still not found or target was Done, use first option
          if [ -z "$target_option_id" ]; then
            echo "Using first available option as fallback"
            target_option_id=$(echo "$status_field_options" | jq -r '.[0].id')
          fi
        fi

        echo "$TARGET_STATUS option ID: $target_option_id"

        # Update the Status field with the target option
        gh api graphql -f query='
        mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
          updateProjectV2ItemFieldValue(input: {
            projectId: $projectId,
            itemId: $itemId,
            fieldId: $fieldId,
            value: {
              singleSelectOptionId: $optionId
            }
          }) {
            projectV2Item {
              id
            }
          }
        }' -f projectId=$PROJECT_ID -f itemId=$ITEM_ID -f fieldId=$STATUS_FIELD_ID -f optionId="$target_option_id"

        echo "✅ Status field updated to $TARGET_STATUS!"

    - name: Update Commit field
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        PROJECT_ID: ${{ steps.get-project-id.outputs.project_id }}
        ITEM_ID: ${{ steps.add-to-project.outputs.item_id }}
        COMMIT_FIELD_ID: ${{ steps.get-commit-field-id.outputs.field_id }}
        LATEST_COMMIT: ${{ steps.get-commits.outputs.commit_hash }}
      run: |
        echo "Setting Commit field value..."
        gh api graphql -f query='
        mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $value:String!) {
          updateProjectV2ItemFieldValue(input: {
            projectId: $projectId,
            itemId: $itemId,
            fieldId: $fieldId,
            value: {
              text: $value
            }
          }) {
            projectV2Item {
              id
            }
          }
        }' -f projectId=$PROJECT_ID -f itemId=$ITEM_ID -f fieldId=$COMMIT_FIELD_ID -f value="$LATEST_COMMIT"

        echo "✅ Commit field updated with latest commit hash: $LATEST_COMMIT"