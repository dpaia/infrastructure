name: Sync Labels to Repositories

on:
  workflow_dispatch:
    inputs:
      labels_file:
        description: 'Path to the labels JSON file'
        required: true
        default: 'java-spring'
      topics:
        description: 'Comma-separated list of repository topics to filter by'
        required: true
        default: 'java'
      repositories:
        description: 'Comma-separated list of target repositories (repo1,repo2). If provided, topics will be ignored.'
        required: false
        default: ''

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install github-label-sync
        run: npm install -g github-label-sync

      - name: Fetch repositories by topics
        if: ${{ github.event.inputs.repositories == '' }}
        id: fetch-repos
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_LABEL_SYNC }}
        run: |
          echo "Input topics: ${{ github.event.inputs.topics }}"
          IFS=',' read -ra TOPICS <<< "${{ github.event.inputs.topics }}"
          echo "Number of topics to process: ${#TOPICS[@]}"
          REPOS=""

          # Build a single query for all topics with OR condition
          TOPIC_QUERY=""
          # Instead of combining queries, query each topic separately and collect results
          REPOS=""

          for TOPIC in "${TOPICS[@]}"; do
            echo "Processing topic: $TOPIC"
            TOPIC_REPOS=""

            # Initialize variables for pagination
            PAGE=1
            PER_PAGE=100

            # Loop through all pages of results for this topic
            while true; do
              echo "Fetching page $PAGE for topic $TOPIC..."

              # Use curl with a simple, well-formed query for a single topic
              PAGE_RESULT=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/search/repositories?q=org:jetbrains-eval-lab+topic:$TOPIC&per_page=$PER_PAGE&page=$PAGE")

              # Debug output
              echo "API response status for topic $TOPIC, page $PAGE:"
              echo "$PAGE_RESULT" | jq -r '.total_count // "Error - no total_count field"'

              # Check if we got an error in the response
              if echo "$PAGE_RESULT" | jq -e '.message' > /dev/null; then
                echo "Error from GitHub API: $(echo "$PAGE_RESULT" | jq -r '.message')"
                echo "Documentation URL: $(echo "$PAGE_RESULT" | jq -r '.documentation_url // "Not provided"')"
                break
              fi

              # Extract repository names and convert to comma-separated list
              PAGE_REPOS=$(echo "$PAGE_RESULT" | jq -r '.items[].name' | tr '\n' ',' | sed 's/,$//')

              # Check if we got any results on this page
              if [ -z "$PAGE_REPOS" ]; then
                echo "No repositories found for topic $TOPIC on page $PAGE."
                break
              fi

              echo "Found repositories for topic $TOPIC on page $PAGE: $PAGE_REPOS"

              # Add results to the topic list
              if [ -n "$TOPIC_REPOS" ]; then
                TOPIC_REPOS="$TOPIC_REPOS,$PAGE_REPOS"
              else
                TOPIC_REPOS="$PAGE_REPOS"
              fi

              # Check if we've reached the last page
              TOTAL_COUNT=$(echo "$PAGE_RESULT" | jq -r '.total_count')
              ITEMS_SO_FAR=$((PAGE * PER_PAGE))
              if [ $ITEMS_SO_FAR -ge $TOTAL_COUNT ]; then
                echo "Reached last page for topic $TOPIC"
                break
              fi

              # Move to the next page
              PAGE=$((PAGE + 1))
                          done

                          echo "All repositories found for topic $TOPIC: $TOPIC_REPOS"

                          # Add topic repos to the overall list
                          if [ -n "$TOPIC_REPOS" ]; then
              if [ -n "$REPOS" ]; then
                REPOS="$REPOS,$TOPIC_REPOS"
              else
                REPOS="$TOPIC_REPOS"
              fi
                          fi
                        done

                        # Remove duplicates
                        if [ -n "$REPOS" ]; then
                          UNIQUE_REPOS=$(echo "$REPOS" | tr ',' '\n' | sort -u | tr '\n' ',' | sed 's/,$//')
                          echo "Found repositories (total): $UNIQUE_REPOS"
                          echo "Number of unique repositories: $(echo "$UNIQUE_REPOS" | tr ',' '\n' | wc -l)"
                          echo "repos=$UNIQUE_REPOS" >> $GITHUB_OUTPUT
                        else
                          echo "No repositories found for any topic."
                          echo "repos=" >> $GITHUB_OUTPUT
                        fi

            # Debug response
            echo "DEBUG: API response for page $PAGE:"
            echo "$PAGE_RESULT" | jq '.total_count, .items | length'

            # Extract repository names and convert to comma-separated list
            PAGE_REPOS=$(echo "$PAGE_RESULT" | jq -r '.items[].name' | tr '\n' ',' | sed 's/,$//')

            # Check if we got any results on this page
            if [ -z "$PAGE_REPOS" ]; then
              break
            fi

            # Add results to the list
            if [ -n "$REPOS" ]; then
              REPOS="$REPOS,$PAGE_REPOS"
            else
              REPOS="$PAGE_REPOS"
            fi

            # Check if we've reached the last page
            TOTAL_COUNT=$(echo "$PAGE_RESULT" | jq -r '.total_count')
            ITEMS_SO_FAR=$((PAGE * PER_PAGE))
            if [ $ITEMS_SO_FAR -ge $TOTAL_COUNT ]; then
              break
            fi

            # Move to the next page
            PAGE=$((PAGE + 1))
          done

          echo "Found repositories with combined topics: $REPOS"
          
          # Remove duplicates
          UNIQUE_REPOS=$(echo "$REPOS" | tr ',' '\n' | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "Found repositories (total): $UNIQUE_REPOS"
          echo "Number of unique repositories: $(echo "$UNIQUE_REPOS" | tr ',' '\n' | wc -l)"
          echo "repos=$UNIQUE_REPOS" >> $GITHUB_OUTPUT

      - name: Sync labels (add / update only)
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_LABEL_SYNC }}
        run: |
          # Use provided repositories if available, otherwise use repositories fetched by topics
          if [ -n "${{ github.event.inputs.repositories }}" ]; then
            REPOS="${{ github.event.inputs.repositories }}"
          else
            REPOS="${{ steps.fetch-repos.outputs.repos }}"
          fi
          
          if [ -z "$REPOS" ]; then
            echo "No repositories found. Exiting."
            exit 0
          fi
          
          IFS=',' read -ra REPO_ARRAY <<< "$REPOS"
          for REPO in "${REPO_ARRAY[@]}"; do
            echo "➡️  Syncing labels to jetbrains-eval-lab/$REPO"
            github-label-sync \
              --access-token "$GITHUB_TOKEN" \
              --labels ".github/${{ github.event.inputs.labels_file }}-labels.json" \
              --allow-added-labels \
              "jetbrains-eval-lab/$REPO"
          done
