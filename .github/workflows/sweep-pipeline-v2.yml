name: Sweep Pipeline (v2)
run-name: "Pipeline sweep - detect and repair inconsistencies"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, detect inconsistencies but do not dispatch repairs'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v5

      - name: Load eval-projects config
        id: config
        shell: bash
        run: |
          CONFIG=$(cat .github/config/eval-projects.json)
          echo "EVAL_PROJECTS=$(echo "$CONFIG" | jq -c '.eval_projects')" >> $GITHUB_ENV
          echo "DATASET_PROJECT=$(echo "$CONFIG" | jq -r '.dataset_metadata_project')" >> $GITHUB_ENV
          echo "ORG=$(echo "$CONFIG" | jq -r '.organization')" >> $GITHUB_ENV

      - name: Query eval project items
        id: query-eval
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          EVAL_FILE="${RUNNER_TEMP}/eval-items.json"
          echo "[]" > "$EVAL_FILE"

          # Iterate over each eval project from config
          for eval_type in $(echo "$EVAL_PROJECTS" | jq -r 'keys[]'); do
            project_number=$(echo "$EVAL_PROJECTS" | jq -r --arg et "$eval_type" '.[$et]')
            echo "Querying eval project: $eval_type (#$project_number)..."

            # Use the query-project-items action output format — but we call inline to avoid
            # needing a dynamic number of action steps
            ITEMS_FILE="${RUNNER_TEMP}/eval-${eval_type}.json"
            echo "[]" > "$ITEMS_FILE"

            HAS_NEXT="true"
            CURSOR=""

            while [ "$HAS_NEXT" = "true" ]; do
              if [ -z "$CURSOR" ]; then
                CURSOR_ARG=""
              else
                CURSOR_ARG=", after: \"$CURSOR\""
              fi

              PAGE=$(gh api graphql -f query="
                query(\$org: String!, \$number: Int!) {
                  organization(login: \$org) {
                    projectV2(number: \$number) {
                      items(first: 100${CURSOR_ARG}) {
                        pageInfo { hasNextPage endCursor }
                        nodes {
                          id
                          content {
                            __typename
                            ... on PullRequest {
                              number title state url headRefOid
                              repository { owner { login } name }
                            }
                            ... on Issue {
                              number title state url
                              repository { owner { login } name }
                            }
                          }
                          fieldValues(first: 20) {
                            nodes {
                              ... on ProjectV2ItemFieldTextValue { text field { ... on ProjectV2Field { name } } }
                              ... on ProjectV2ItemFieldNumberValue { number field { ... on ProjectV2Field { name } } }
                              ... on ProjectV2ItemFieldSingleSelectValue { name field { ... on ProjectV2SingleSelectField { name } } }
                              ... on ProjectV2ItemFieldDateValue { date field { ... on ProjectV2Field { name } } }
                            }
                          }
                        }
                      }
                    }
                  }
                }" -f org="$ORG" -F number="$project_number")

              HAS_NEXT=$(echo "$PAGE" | jq -r '.data.organization.projectV2.items.pageInfo.hasNextPage')
              CURSOR=$(echo "$PAGE" | jq -r '.data.organization.projectV2.items.pageInfo.endCursor')

              FLAT_ITEMS=$(echo "$PAGE" | jq --arg et "$eval_type" --arg pn "$project_number" '[
                .data.organization.projectV2.items.nodes[] |
                {
                  item_id: .id,
                  content_type: (.content.__typename // "Unknown"),
                  number: .content.number,
                  title: .content.title,
                  state: .content.state,
                  url: .content.url,
                  head_sha: .content.headRefOid,
                  owner: .content.repository.owner.login,
                  repo: .content.repository.name,
                  eval_type: $et,
                  project_number: ($pn | tonumber),
                  fields: (
                    [.fieldValues.nodes[] | select(.field.name != null) |
                      { key: .field.name, value: (.text // .name // (if .number != null then (.number | tostring) else null end) // .date // null) }
                    ] | from_entries
                  )
                }
              ]')

              jq -s '.[0] + .[1]' "$ITEMS_FILE" <(echo "$FLAT_ITEMS") > "${ITEMS_FILE}.tmp"
              mv "${ITEMS_FILE}.tmp" "$ITEMS_FILE"
            done

            COUNT=$(jq 'length' "$ITEMS_FILE")
            echo "  Found $COUNT items for $eval_type"

            # Merge into combined file
            jq -s '.[0] + .[1]' "$EVAL_FILE" "$ITEMS_FILE" > "${EVAL_FILE}.tmp"
            mv "${EVAL_FILE}.tmp" "$EVAL_FILE"
          done

          TOTAL=$(jq 'length' "$EVAL_FILE")
          echo "Total eval items: $TOTAL"
          echo "eval_file=$EVAL_FILE" >> $GITHUB_OUTPUT

      - name: Query Dataset Metadata items
        id: query-dataset
        uses: ./.github/actions/query-project-items
        with:
          organization: ${{ env.ORG }}
          project_number: ${{ env.DATASET_PROJECT }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Detect and repair inconsistencies
        id: sweep
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          INFRA_REPO: "${{ env.ORG }}/infrastructure"
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          # query-project-items action writes result to $RUNNER_TEMP/query-result.json
          python3 .github/python/sweep_pipeline.py \
            --eval-items "${{ steps.query-eval.outputs.eval_file }}" \
            --dataset-items "${RUNNER_TEMP}/query-result.json" \
            --output "${RUNNER_TEMP}/sweep-result.json"

      - name: Upload sweep result
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: sweep-result
          path: ${{ runner.temp }}/sweep-result.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "# Pipeline Sweep Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Issues found:** ${{ steps.sweep.outputs.issues_found }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Repairs dispatched:** ${{ steps.sweep.outputs.repairs }}" >> $GITHUB_STEP_SUMMARY
          if [ -f "${RUNNER_TEMP}/sweep-result.json" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Details</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat "${RUNNER_TEMP}/sweep-result.json" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi
