name: On Datapoint Merged (v2)
run-name: "[dataset] Post-merge PR #${{ inputs.pr_number }} (key=${{ inputs.run_key }})"

on:
  workflow_dispatch:
    inputs:
      organization:
        description: 'GitHub organization (dataset repo owner)'
        required: true
        type: string
        default: 'dpaia'
      repository:
        description: 'Dataset repository name'
        required: true
        type: string
        default: 'dataset'
      pr_number:
        description: 'Merged dataset PR number'
        required: true
        type: string
      run_key:
        description: 'Unique run correlation key (UUID)'
        required: false
        type: string
        default: 'manual'

jobs:
  post-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v4

      - name: Read merged PR metadata
        id: metadata
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          DATASET_REPO: "${{ inputs.organization }}/${{ inputs.repository }}"
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$DATASET_REPO" --json body -q '.body')

          # Parse structured metadata from HTML comment
          INSTANCE_ID=$(echo "$PR_BODY" | grep -oP 'instance_id:\s*\K\S+' || echo "")
          EVAL_TYPE=$(echo "$PR_BODY" | grep -oP 'eval_type:\s*\K\S+' || echo "")
          SOURCE_PR=$(echo "$PR_BODY" | grep -oP 'source_pr:\s*\K\S+' || echo "")
          SOURCE_COMMIT=$(echo "$PR_BODY" | grep -oP 'source_commit:\s*\K\S+' || echo "")

          if [ -z "$INSTANCE_ID" ] || [ -z "$EVAL_TYPE" ]; then
            echo "Error: could not parse metadata from PR body" >&2
            echo "PR body:" >&2
            echo "$PR_BODY" >&2
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "eval_type=$EVAL_TYPE" >> $GITHUB_OUTPUT
          echo "source_pr=$SOURCE_PR" >> $GITHUB_OUTPUT
          echo "source_commit=$SOURCE_COMMIT" >> $GITHUB_OUTPUT

          # Build permalink to datapoint on main
          DATA_PERMALINK="https://github.com/${DATASET_REPO}/blob/main/${EVAL_TYPE}/${INSTANCE_ID}/datapoint.json"
          echo "data_permalink=$DATA_PERMALINK" >> $GITHUB_OUTPUT

      - name: Query Dataset Metadata project items
        id: dataset-items
        uses: ./.github/actions/query-project-items
        with:
          organization: dpaia
          project_number: '21'
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Find dataset PR item and update to Done
        id: find-item
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ITEMS_JSON: ${{ steps.dataset-items.outputs.items }}
          DATASET_REPO: "${{ inputs.organization }}/${{ inputs.repository }}"
          PR_NUMBER: ${{ inputs.pr_number }}
          DATA_PERMALINK: ${{ steps.metadata.outputs.data_permalink }}
        run: |
          ITEMS_FILE="${RUNNER_TEMP}/dataset-items.json"
          echo "$ITEMS_JSON" > "$ITEMS_FILE"

          # Find item by PR number and repo
          ITEM_ID=$(jq -r --arg num "$PR_NUMBER" --arg repo "${{ inputs.repository }}" \
            '.[] | select((.number | tostring) == $num and .repo == $repo) | .item_id' \
            "$ITEMS_FILE" | head -1)

          if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
            echo "Warning: dataset PR not found in Dataset Metadata project, skipping status update"
            exit 0
          fi

          echo "item_id=$ITEM_ID" >> $GITHUB_OUTPUT

          # Update Data field with permalink
          PROJECT_ID=$(gh api graphql -f query='
            query($org: String!, $number: Int!) {
              organization(login: $org) {
                projectV2(number: $number) { id }
              }
            }' -f org="dpaia" -F number=21 --jq '.data.organization.projectV2.id')

          FIELDS_JSON=$(gh api graphql -f query='
            query($project: ID!) {
              node(id: $project) {
                ... on ProjectV2 {
                  fields(first: 100) {
                    nodes {
                      ... on ProjectV2Field { id name }
                    }
                  }
                }
              }
            }' -f project="$PROJECT_ID")

          DATA_FIELD_ID=$(echo "$FIELDS_JSON" | jq -r '.data.node.fields.nodes[] | select(.name == "Data") | .id')
          if [ -n "$DATA_FIELD_ID" ] && [ "$DATA_FIELD_ID" != "null" ]; then
            gh api graphql -f query='
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String!) {
                updateProjectV2ItemFieldValue(
                  input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { text: $value } }
                ) { projectV2Item { id } }
              }' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$DATA_FIELD_ID" -f value="$DATA_PERMALINK"
            echo "Data field updated with permalink"
          fi

      - name: Set Dataset Metadata status to Done
        if: steps.find-item.outputs.item_id != ''
        uses: ./.github/actions/set-project-status
        with:
          organization: dpaia
          project_number: '21'
          item_id: ${{ steps.find-item.outputs.item_id }}
          value: 'Done'
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Resolve eval project for source PR
        id: resolve-eval
        if: steps.metadata.outputs.source_pr != ''
        shell: bash
        env:
          SOURCE_PR: ${{ steps.metadata.outputs.source_pr }}
          EVAL_TYPE: ${{ steps.metadata.outputs.eval_type }}
        run: |
          # Extract owner/repo/number from source PR URL
          PR_PARTS=$(echo "$SOURCE_PR" | sed -n 's|.*/\([^/]*\)/\([^/]*\)/pull/\([0-9]*\)|\1 \2 \3|p')
          if [ -z "$PR_PARTS" ]; then
            echo "Warning: could not parse source PR URL, skipping eval project update"
            exit 0
          fi
          read -r SRC_OWNER SRC_REPO SRC_NUMBER <<< "$PR_PARTS"

          # Determine eval project number from eval_type
          case "$EVAL_TYPE" in
            codegen) PROJECT_NUM=12 ;;
            debugging) PROJECT_NUM=13 ;;
            *) echo "Unknown eval_type for project mapping: $EVAL_TYPE"; exit 0 ;;
          esac

          echo "project_number=$PROJECT_NUM" >> $GITHUB_OUTPUT
          echo "src_repo=$SRC_REPO" >> $GITHUB_OUTPUT
          echo "src_number=$SRC_NUMBER" >> $GITHUB_OUTPUT

      - name: Query eval project items
        id: eval-items
        if: steps.resolve-eval.outputs.project_number != ''
        uses: ./.github/actions/query-project-items
        with:
          organization: dpaia
          project_number: ${{ steps.resolve-eval.outputs.project_number }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Find source PR in eval project
        id: find-eval-item
        if: steps.eval-items.outputs.count != '0'
        shell: bash
        env:
          ITEMS_JSON: ${{ steps.eval-items.outputs.items }}
          SRC_REPO: ${{ steps.resolve-eval.outputs.src_repo }}
          SRC_NUMBER: ${{ steps.resolve-eval.outputs.src_number }}
        run: |
          ITEM_ID=$(echo "$ITEMS_JSON" | jq -r --arg num "$SRC_NUMBER" --arg repo "$SRC_REPO" \
            '.[] | select((.number | tostring) == $num and .repo == $repo) | .item_id' | head -1)

          if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
            echo "Warning: source PR not found in eval project, skipping"
            exit 0
          fi
          echo "item_id=$ITEM_ID" >> $GITHUB_OUTPUT

      - name: Set source eval project status to Done
        if: steps.find-eval-item.outputs.item_id != ''
        uses: ./.github/actions/set-project-status
        with:
          organization: dpaia
          project_number: ${{ steps.resolve-eval.outputs.project_number }}
          item_id: ${{ steps.find-eval-item.outputs.item_id }}
          value: 'Done'
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "# Post-Merge Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Instance:** ${{ steps.metadata.outputs.instance_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Source PR:** ${{ steps.metadata.outputs.source_pr }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Data permalink:** ${{ steps.metadata.outputs.data_permalink }}" >> $GITHUB_STEP_SUMMARY
