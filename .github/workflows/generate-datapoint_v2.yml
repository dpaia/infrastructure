name: Generate Datapoint (v2)
run-name: "[${{ inputs.organization }}/${{ inputs.repository }}] Generate PR #${{ inputs.pr_number }} (key=${{ inputs.run_key }})"

on:
  workflow_dispatch:
    inputs:
      organization:
        description: 'GitHub organization name'
        required: true
        type: string
      repository:
        description: 'Repository name'
        required: true
        type: string
      pr_number:
        description: 'Pull request number'
        required: true
        type: string
      eval_type:
        description: 'Evaluation type (e.g., codegen, debugging)'
        required: true
        type: string
      run_key:
        description: 'Unique run correlation key (UUID)'
        required: false
        type: string
        default: 'manual'
      dataset_repo:
        description: 'Dataset repository (owner/name)'
        required: false
        type: string
        default: 'dpaia/dataset'
      export_script:
        description: 'Export script path relative to .github/scripts/, without .py extension'
        required: false
        type: string
        default: ''
      dataset_project_number:
        description: 'Dataset Metadata project number'
        required: false
        type: string
        default: '3'
      eval_project_number:
        description: 'Eval project number (for Verification field updates)'
        required: false
        type: string
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      instance_id: ${{ steps.generate.outputs.instance_id }}
      dataset_pr_number: ${{ steps.create-pr.outputs.pr_number }}
      dataset_pr_url: ${{ steps.create-pr.outputs.pr_url }}
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v5

      - name: Check rate limit
        uses: ./.github/actions/check-rate-limit
        with:
          github_token: ${{ secrets.PROJECT_TOKEN }}

      # --- Verification field: set Generating... before generation ---
      - name: Find PR in eval project
        id: find-eval-pr
        if: inputs.eval_project_number != ''
        continue-on-error: true
        uses: ./.github/actions/find-pr-in-project
        with:
          organization: ${{ inputs.organization }}
          repository: ${{ inputs.repository }}
          pr_number: ${{ inputs.pr_number }}
          project_number: ${{ inputs.eval_project_number }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Set Verification to Generating...
        if: inputs.eval_project_number != '' && steps.find-eval-pr.outcome == 'success'
        uses: ./.github/actions/update-project-field
        with:
          organization: ${{ inputs.organization }}
          project_number: ${{ inputs.eval_project_number }}
          item_id: ${{ steps.find-eval-pr.outputs.item_id }}
          field_name: Verification
          value: Generating...
          value_type: single_select
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Setup ee-dataset CLI
        uses: ./.github/actions/setup-ee-import

      - name: Get source PR head SHA
        id: source-pr
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          PR_DATA=$(gh api "repos/${{ inputs.organization }}/${{ inputs.repository }}/pulls/${{ inputs.pr_number }}" \
            --jq '{sha: .head.sha, title: .title, url: .html_url}')
          HEAD_SHA=$(echo "$PR_DATA" | jq -r '.sha')
          PR_URL=$(echo "$PR_DATA" | jq -r '.url')
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "Source PR head SHA: $HEAD_SHA"

      - name: Generate datapoint
        id: generate
        uses: ./.github/actions/run-export-script
        with:
          organization: ${{ inputs.organization }}
          repository: ${{ inputs.repository }}
          pr_number: ${{ inputs.pr_number }}
          eval_type: ${{ inputs.eval_type }}
          export_script: ${{ inputs.export_script }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Create datapoint PR
        id: create-pr
        uses: ./.github/actions/create-datapoint-pr
        with:
          instance_id: ${{ steps.generate.outputs.instance_id }}
          eval_type: ${{ inputs.eval_type }}
          source_repo_name: ${{ inputs.repository }}
          source_pr_url: ${{ steps.source-pr.outputs.pr_url }}
          source_commit: ${{ steps.source-pr.outputs.head_sha }}
          datapoint_path: ${{ steps.generate.outputs.instance_dir }}
          flat_json_path: ${{ steps.generate.outputs.flat_json }}
          dataset_repo: ${{ inputs.dataset_repo }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get source PR node ID
        id: pr-node
        uses: ./.github/actions/get-pr-node-id
        with:
          organization: ${{ inputs.organization }}
          repository: ${{ inputs.repository }}
          pr_number: ${{ inputs.pr_number }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get Dataset Metadata project ID
        id: project-id
        uses: ./.github/actions/get-project-id
        with:
          organization: ${{ inputs.organization }}
          project_number: ${{ inputs.dataset_project_number }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Add source PR to project
        id: add-to-project
        uses: ./.github/actions/add-issue-to-project
        with:
          project_id: ${{ steps.project-id.outputs.project_id }}
          issue_node_id: ${{ steps.pr-node.outputs.node_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Set project status to In progress
        uses: ./.github/actions/set-project-status
        with:
          organization: ${{ inputs.organization }}
          project_number: ${{ inputs.dataset_project_number }}
          item_id: ${{ steps.add-to-project.outputs.item_id }}
          value: 'In Progress'
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Read current Version and increment
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ITEM_ID: ${{ steps.add-to-project.outputs.item_id }}
          PROJECT_ID: ${{ steps.project-id.outputs.project_id }}
        run: |
          CURRENT=$(gh api graphql -f query='
            query($itemId: ID!) {
              node(id: $itemId) {
                ... on ProjectV2Item {
                  fieldValues(first: 20) {
                    nodes {
                      ... on ProjectV2ItemFieldNumberValue {
                        field { ... on ProjectV2FieldCommon { name } }
                        number
                      }
                    }
                  }
                }
              }
            }' -f itemId="$ITEM_ID" \
            --jq '.data.node.fieldValues.nodes[] | select(.field.name == "Version") | .number // empty')
          if [ -z "$CURRENT" ]; then
            NEXT=1
          else
            NEXT=$(echo "$CURRENT + 1" | bc)
          fi
          echo "value=$NEXT" >> $GITHUB_OUTPUT
          echo "Version: $CURRENT -> $NEXT"

      - name: Set Version field
        uses: ./.github/actions/update-project-field
        with:
          organization: ${{ inputs.organization }}
          project_number: ${{ inputs.dataset_project_number }}
          item_id: ${{ steps.add-to-project.outputs.item_id }}
          field_name: 'Version'
          value: ${{ steps.version.outputs.value }}
          value_type: number
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Set Commit field
        uses: ./.github/actions/update-project-field
        with:
          organization: ${{ inputs.organization }}
          project_number: ${{ inputs.dataset_project_number }}
          item_id: ${{ steps.add-to-project.outputs.item_id }}
          field_name: 'Commit'
          value: ${{ steps.source-pr.outputs.head_sha }}
          value_type: text
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Comment on source PR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          COMMENT_BODY="Datapoint generated successfully.

          **Instance:** \`${{ steps.generate.outputs.instance_id }}\`
          **Dataset PR:** ${{ steps.create-pr.outputs.pr_url }}"

          gh pr comment "${{ inputs.pr_number }}" \
            --repo "${{ inputs.organization }}/${{ inputs.repository }}" \
            --body "$COMMENT_BODY"

      # --- Verification field: set Generated/Valid after generation ---
      - name: Set Verification result
        if: always() && inputs.eval_project_number != '' && steps.find-eval-pr.outputs.item_id != ''
        uses: ./.github/actions/update-project-field
        with:
          organization: ${{ inputs.organization }}
          project_number: ${{ inputs.eval_project_number }}
          item_id: ${{ steps.find-eval-pr.outputs.item_id }}
          field_name: Verification
          value: ${{ job.status == 'success' && 'Generated' || 'Valid' }}
          value_type: single_select
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "# Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Source PR:** ${{ inputs.organization }}/${{ inputs.repository }}#${{ inputs.pr_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Instance:** ${{ steps.generate.outputs.instance_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dataset PR:** ${{ steps.create-pr.outputs.pr_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run key:** ${{ inputs.run_key }}" >> $GITHUB_STEP_SUMMARY
