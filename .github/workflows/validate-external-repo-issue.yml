name: Validate issue with external repository
run-name: "[${{ github.event.inputs.organization }}/${{ github.event.inputs.repository }}][${{ github.event.inputs.generator }}] Validate issue #${{ github.event.inputs.issue_id }} resolved in ${{ github.event.inputs.external_repo }}/${{ github.event.inputs.external_branch }}"

on:
  workflow_dispatch:
    inputs:
      generator:
        description: 'Profile'
        required: true
        default: 'java'
        type: choice
        options:
          - java
      organization:
        description: 'GitHub organization name'
        required: true
        default: 'dpaia'
        type: string
      repository:
        description: 'Repository name (repo)'
        required: true
        type: string
      issue_id:
        description: 'Issue number'
        required: true
        type: string
      external_org:
        description: 'External organization name'
        required: true
        type: string
      external_repo:
        description: 'External repository name'
        required: true
        type: string
      external_branch:
        description: 'External branch name'
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install generator dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install unidiff
      - name: Make script executable
        run: chmod +x ./.github/scripts/verify_dataset.sh

  get-issue-node-id:
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      issue_node_id: ${{ steps.issue-node.outputs.issue_node_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Get Issue Node ID
        id: issue-node
        uses: ./.github/actions/get-issue-node-id
        with:
          repository: ${{ github.event.inputs.repository }}
          organization: ${{ github.event.inputs.organization }}
          issue_number: ${{ github.event.inputs.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

  get-project-id:
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      project_id: ${{ steps.project-id.outputs.project_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Get Project ID
        id: project-id
        uses: ./.github/actions/get-project-id
        with:
          organization: ${{ github.event.inputs.organization }}
          project_number: '3'
          github_token: ${{ secrets.PROJECT_TOKEN }}

  get-data-field:
    runs-on: ubuntu-latest
    needs: [get-issue-node-id, get-project-id]
    outputs:
      field_value: ${{ steps.get-data-field.outputs.field_value }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Get Data field from Project
        id: get-data-field
        uses: ./.github/actions/get-project-field-value
        with:
          project_id: ${{ needs.get-project-id.outputs.project_id }}
          issue_node_id: ${{ needs.get-issue-node-id.outputs.issue_node_id }}
          field_name: Data
          github_token: ${{ secrets.PROJECT_TOKEN }}

  download-data-json:
    runs-on: ubuntu-latest
    needs: get-data-field
    if: needs.get-data-field.outputs.field_value != ''
    outputs:
      data_json_path: ${{ steps.download-data-json.outputs.data_json_path }}
      base_commit: ${{ steps.download-data-json.outputs.base_commit }}
    steps:
      - name: Download Data JSON
        id: download-data-json
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          DATA_URL: ${{ needs.get-data-field.outputs.field_value }}
        run: |
          if [ -z "$DATA_URL" ]; then
            echo "::error::Data field is empty"
            exit 1
          fi

          OUTPUT="data.json"

          # If the URL is a GitHub blob link, prefer GitHub API to fetch raw content
          if [[ "$DATA_URL" =~ ^https://github\.com/([^/]+)/([^/]+)/blob/([^/]+)/(.*)$ ]]; then
            ORG="${BASH_REMATCH[1]}"
            REPO="${BASH_REMATCH[2]}"
            BRANCH="${BASH_REMATCH[3]}"
            PATH_PART="${BASH_REMATCH[4]}"

            echo "Attempting GitHub API raw download: repos/$ORG/$REPO/contents/$PATH_PART?ref=$BRANCH"
            if gh api -H "Accept: application/vnd.github.raw" "repos/$ORG/$REPO/contents/$PATH_PART?ref=$BRANCH" > "$OUTPUT"; then
              echo "Downloaded using GitHub API."
            else
              echo "GitHub API download failed, falling back to raw.githubusercontent.com"
              RAW_URL="https://raw.githubusercontent.com/$ORG/$REPO/refs/heads/$BRANCH/$PATH_PART"
              if ! curl -L "$RAW_URL" -o "$OUTPUT"; then
                echo "curl failed, trying wget"
                if ! wget -qO "$OUTPUT" "$RAW_URL"; then
                  echo "::error::Failed to download Data JSON from $RAW_URL"
                  exit 1
                fi
              fi
            fi
          else
            echo "Downloading Data JSON from $DATA_URL"
            if ! curl -L "$DATA_URL" -o "$OUTPUT"; then
              echo "curl failed, trying wget"
              if ! wget -qO "$OUTPUT" "$DATA_URL"; then
                echo "::error::Failed to download Data JSON from $DATA_URL"
                exit 1
              fi
            fi
          fi

          echo "data_json_path=$PWD/$OUTPUT" >> $GITHUB_OUTPUT
          BASE_COMMIT=$(jq -r '.base_commit // empty' "$OUTPUT")
          echo "base_commit=$BASE_COMMIT" >> $GITHUB_OUTPUT

      - name: Upload Data JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-json
          path: data.json
          if-no-files-found: error
          retention-days: 7

  collect-commits:
    runs-on: ubuntu-latest
    needs: [download-data-json, get-data-field]
    if: needs.get-data-field.outputs.field_value != ''
    outputs:
      commits: ${{ steps.collect-commits.outputs.commits }}
    steps:
      - name: Collect commits from base_commit to external head
        id: collect-commits
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ORG: ${{ github.event.inputs.organization }}
          REPO: ${{ github.event.inputs.repository }}
          BASE_COMMIT: ${{ needs.download-data-json.outputs.base_commit }}
          EXTERNAL_ORG: ${{ github.event.inputs.external_org }}
          EXTERNAL_BRANCH: ${{ github.event.inputs.external_branch }}
        run: |
          if [ -z "$BASE_COMMIT" ]; then
            echo "::error::base_commit is empty in Data JSON"
            exit 1
          fi
          echo "Comparing $ORG/$REPO:$BASE_COMMIT...$EXTERNAL_ORG:$EXTERNAL_BRANCH"
          COMMITS=$(gh api repos/$ORG/$REPO/compare/$BASE_COMMIT...$EXTERNAL_ORG:$EXTERNAL_BRANCH --jq '.commits[].sha' || true)
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


  run-verification:
    runs-on: ubuntu-latest
    needs: [collect-commits, get-data-field, download-data-json]
    if: needs.get-data-field.outputs.field_value != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download Data JSON artifact
        uses: actions/download-artifact@v4
        with:
          name: data-json
          path: .
      - name: Generate data (modify JSON from Project Data)
        id: generate-data
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          EXT_GH_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
          DATA_JSON_PATH: ${{ github.workspace }}/data.json
          EXTERNAL_ORG: ${{ github.event.inputs.external_org }}
          EXTERNAL_REPO: ${{ github.event.inputs.external_repo }}
          EXTERNAL_BRANCH: ${{ github.event.inputs.external_branch }}
          COMMITS: ${{ needs.collect-commits.outputs.commits }}
        run: |
          chmod +x .github/python/java_verify_ext.py
          echo "data_value<<EOF" >> $GITHUB_OUTPUT
          .github/python/java_verify_ext.py >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Run verification
        id: run-verification
        shell: bash
        env:
          INSTANCE_JSON: ${{ steps.generate-data.outputs.data_value }}
        run: |
          set +e

          if [[ -z "$INSTANCE_JSON" ]]; then
            echo "::error::❌ Failed: No instance JSON generated."
            printf '{"result":"failed","message":"No instance JSON generated."}' > verification-result.json
          else
            # Stream verification script output in real-time and save logs
            stdbuf -oL -eL bash ./.github/scripts/verify_dataset.sh "$INSTANCE_JSON" 2>&1 | tee verify_output.txt
          fi

          # Read verification result JSON
          if [[ -f verification-result.json ]]; then
            RAW_RESULT=$(jq -r '.result' verification-result.json 2>/dev/null)
            RAW_MESSAGE=$(jq -r '.message // empty' verification-result.json 2>/dev/null)
          else
            RAW_RESULT="failed"
            RAW_MESSAGE="Verification result file not found"
            echo "::error::Verification result file not found (verification-result.json)"
          fi

          # Map to workflow outputs
          if [[ "$RAW_RESULT" == "ok" ]]; then
            echo "result=success" >> $GITHUB_OUTPUT
            if [[ -z "$RAW_MESSAGE" ]]; then RAW_MESSAGE="Validation passed"; fi
            echo "message=$RAW_MESSAGE" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            if [[ -z "$RAW_MESSAGE" ]]; then RAW_MESSAGE="Unknown failure"; fi
            echo "message=$RAW_MESSAGE" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Upload verification-result.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-result
          path: verification-result.json
          if-no-files-found: warn
          retention-days: 7
      - name: Summary
        if: always()
        run: |
          echo "# Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "Result: ${{ steps.run-verification.outputs.result }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.run-verification.outputs.message }}" != "" ]; then
            echo "${{ steps.run-verification.outputs.message }}" >> $GITHUB_STEP_SUMMARY
          fi        
