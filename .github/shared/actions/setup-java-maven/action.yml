name: 'Setup Java and Maven'
description: 'Sets up Java and Maven with caching'

inputs:
  java-version:
    description: 'Java version to set up'
    required: false
    default: '24'
  distribution:
    description: 'Java distribution to use'
    required: false
    default: 'temurin'
  cache:
    description: 'Cache type to use'
    required: false
    default: 'maven'

runs:
  using: 'composite'
  steps:
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.distribution }}
        cache: ${{ inputs.cache }}