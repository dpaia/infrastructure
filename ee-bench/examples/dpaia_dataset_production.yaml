# Production DPAIA Dataset Configuration
#
# This configuration is designed for generating evaluation datasets from
# JVM projects with verified bug fixes.
#
# Prerequisites:
#   - Set GITHUB_TOKEN environment variable
#   - PRs should have FAIL_TO_PASS and PASS_TO_PASS markers in the body
#
# Example PR body format:
#   ## Summary
#   Fixed null pointer exception in Parser.
#
#   ## FAIL_TO_PASS
#   ["org.example.ParserTest.testNullInput"]
#
#   ## PASS_TO_PASS
#   ["org.example.ParserTest.testValidInput", "org.example.ParserTest.testEmptyInput"]
#
# Usage:
#   export GITHUB_TOKEN=your_token
#   ee-dataset generate -p github_pull_requests -g dpaia_jvm \
#       -s examples/dpaia_dataset_production.yaml \
#       --out datasets/kafka_bugs.jsonl

resource: pull_requests

filters:
  # Target repository
  repo: ${TARGET_REPO:-apache/kafka}

  # Only process merged/closed PRs (typically contain complete fixes)
  state: closed

  # Filter by labels to get verified bug fixes
  labels:
    - bug
    - verified

# Limit for testing (remove or increase for full dataset)
limit: ${LIMIT:-100}
