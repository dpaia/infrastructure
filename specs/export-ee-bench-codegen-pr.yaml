# Export EE-bench codegen datapoints from dpaia PRs to JSONL
# Uses section extraction and auto metadata discovery
# Usage: ee-dataset --config specs/export-ee-bench-codegen-pr.yaml generate
# Test single PR: ee-dataset --config specs/export-ee-bench-codegen-pr.yaml \
#   -S REPO=dpaia/spring-boot-microshop -S 'PR_NUMBERS=[1]' generate

providers:
  - name: github
    type: github_pull_requests
    role: primary
    options:
      token: ${GITHUB_TOKEN}

  - name: sections
    type: markdown_sections
    item_mapping:
      text: "{{ providers.github.description }}"
    options:
      sections:
        problem_statement: "## Problem Statement"
        hints_text: "## Hints"
        requirements: "## Requirements"
        interface: "## Interface"

  - name: metadata
    type: metadata
    item_mapping:
      text: "{{ providers.github.description }}"
    options:
      fields: "auto"

  - name: patch_splitter
    type: patch_splitter
    item_mapping:
      patch: "{{ providers.github.patch }}"

  - name: maven
    type: maven
    item_mapping:
      test_patch: "{{ fields.test_patch }}"
      FAIL_TO_PASS: "{{ fields.FAIL_TO_PASS }}"
      PASS_TO_PASS: "{{ fields.PASS_TO_PASS }}"

  - name: gradle
    type: gradle
    item_mapping:
      test_patch: "{{ fields.test_patch }}"
      FAIL_TO_PASS: "{{ fields.FAIL_TO_PASS }}"
      PASS_TO_PASS: "{{ fields.PASS_TO_PASS }}"

generator:
  name: ee_bench_codegen
  options:
    version: "{{ VERSION | default('1.0') }}"
    tags:
      exclude:
        - "ee-bench-*"
        - Epic
        - Review
        - Invalid
        - Wontfix
        - Verified
        - Bugfix
        - Documentation

selection:
  resource: pull_requests
  filters:
    repo: "{{ REPO | default('dpaia/*') }}"
    labels: [ee-bench-codegen]
    pr_numbers: {{ PR_NUMBERS | default('[]') }}
    state: open

output:
  format: jsonl
  path: datasets/ee-bench-codegen_export.jsonl
