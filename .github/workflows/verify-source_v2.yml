name: Verify Source PR (v2)
run-name: "[${{ inputs.organization }}/${{ inputs.repository }}] Verify PR #${{ inputs.pr_number }} (key=${{ inputs.run_key }})"

on:
  workflow_dispatch:
    inputs:
      organization:
        description: 'GitHub organization name'
        required: true
        type: string
      repository:
        description: 'Repository name'
        required: true
        type: string
      pr_number:
        description: 'Pull request number'
        required: true
        type: string
      eval_type:
        description: 'Evaluation type (e.g., codegen, debugging)'
        required: true
        type: string
      run_key:
        description: 'Unique run correlation key (UUID)'
        required: false
        type: string
        default: 'manual'
      eval_project_number:
        description: 'Eval project number (for Verification field updates)'
        required: false
        type: string
        default: ''

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v5

      # --- Verification field: set Validating... before validation ---
      - name: Find PR in eval project
        id: find-pr
        if: inputs.eval_project_number != ''
        continue-on-error: true
        uses: ./.github/actions/find-pr-in-project
        with:
          organization: ${{ inputs.organization }}
          repository: ${{ inputs.repository }}
          pr_number: ${{ inputs.pr_number }}
          project_number: ${{ inputs.eval_project_number }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Set Verification to Validating...
        if: inputs.eval_project_number != '' && steps.find-pr.outcome == 'success'
        uses: ./.github/actions/update-project-field
        with:
          organization: ${{ inputs.organization }}
          project_number: ${{ inputs.eval_project_number }}
          item_id: ${{ steps.find-pr.outputs.item_id }}
          field_name: Verification
          value: Validating...
          value_type: single_select
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Setup ee-dataset CLI
        uses: ./.github/actions/setup-ee-import

      - name: Generate datapoint
        id: generate
        uses: ./.github/actions/run-export-script
        with:
          organization: ${{ inputs.organization }}
          repository: ${{ inputs.repository }}
          pr_number: ${{ inputs.pr_number }}
          eval_type: ${{ inputs.eval_type }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Run validation
        id: validate
        uses: ./.github/actions/run-validation
        with:
          instance_dir: ${{ steps.generate.outputs.instance_dir }}
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: "verification-logs-${{ inputs.run_key }}"
          path: ${{ steps.validate.outputs.log_path }}
          if-no-files-found: warn
          retention-days: 7

      - name: Upload validation result JSON
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: "verification-result-${{ inputs.run_key }}"
          path: ${{ steps.validate.outputs.result_json_path }}
          if-no-files-found: warn
          retention-days: 30

      - name: Comment on source PR
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          RESULT: ${{ steps.validate.outputs.result }}
          STATUS: ${{ steps.validate.outputs.status }}
          INSTANCE_ID: ${{ steps.generate.outputs.instance_id }}
          CRITERIA_SUMMARY: ${{ steps.validate.outputs.criteria_summary }}
          TEST_SUMMARY: ${{ steps.validate.outputs.test_summary }}
          FAIL_TO_PASS: ${{ steps.validate.outputs.fail_to_pass }}
          FAILED_CRITERIA: ${{ steps.validate.outputs.failed_criteria }}
          FAILED_TESTS: ${{ steps.validate.outputs.failed_tests }}
          FAILURE_DETAILS: ${{ steps.validate.outputs.failure_details }}
          DURATION: ${{ steps.validate.outputs.duration }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$RESULT" = "success" ]; then
            ICON="✅"
            MSG="Datapoint verification **passed**."
          else
            ICON="❌"
            MSG="Datapoint verification **failed**."
          fi

          COMMENT_BODY="${ICON} ${MSG}

          **Instance:** \`${INSTANCE_ID}\`
          **Duration:** ${DURATION:-(unknown)}s
          **Criteria:** ${CRITERIA_SUMMARY:-(unavailable)}"

          if [ -n "$TEST_SUMMARY" ]; then
            COMMENT_BODY="${COMMENT_BODY}
          **Tests:** ${TEST_SUMMARY}"
          fi

          if [ -n "$FAIL_TO_PASS" ]; then
            COMMENT_BODY="${COMMENT_BODY}
          **FAIL_TO_PASS:** ${FAIL_TO_PASS}"
          fi

          if [ "$RESULT" != "success" ] && [ -n "$FAILED_CRITERIA" ]; then
            COMMENT_BODY="${COMMENT_BODY}

          **Failed criteria:** ${FAILED_CRITERIA}"
          fi

          if [ -n "$FAILURE_DETAILS" ]; then
            COMMENT_BODY="${COMMENT_BODY}

          <details><summary>Error details</summary>

          \`\`\`
          ${FAILURE_DETAILS}
          \`\`\`
          </details>"
          fi

          if [ -n "$FAILED_TESTS" ]; then
            COMMENT_BODY="${COMMENT_BODY}

          <details><summary>Failed tests (up to 20)</summary>

          \`\`\`
          ${FAILED_TESTS}
          \`\`\`
          </details>"
          fi

          COMMENT_BODY="${COMMENT_BODY}

          **Details:** [Workflow run](${RUN_URL})"

          gh pr comment "${{ inputs.pr_number }}" \
            --repo "${{ inputs.organization }}/${{ inputs.repository }}" \
            --body "$COMMENT_BODY" || true

      # --- Verification field: set Valid/Invalid after validation ---
      - name: Set Verification result
        if: always() && inputs.eval_project_number != '' && steps.find-pr.outputs.item_id != ''
        uses: ./.github/actions/update-project-field
        with:
          organization: ${{ inputs.organization }}
          project_number: ${{ inputs.eval_project_number }}
          item_id: ${{ steps.find-pr.outputs.item_id }}
          field_name: Verification
          value: ${{ steps.validate.outputs.result == 'success' && 'Valid' || 'Invalid' }}
          value_type: single_select
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "# Verification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Source PR:** ${{ inputs.organization }}/${{ inputs.repository }}#${{ inputs.pr_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Eval type:** ${{ inputs.eval_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Instance:** ${{ steps.generate.outputs.instance_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Result:** ${{ steps.validate.outputs.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.validate.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration:** ${{ steps.validate.outputs.duration }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Criteria:** ${{ steps.validate.outputs.criteria_summary }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run key:** ${{ inputs.run_key }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.validate.outputs.failed_criteria }}" ]; then
            echo "- **Failed criteria:** ${{ steps.validate.outputs.failed_criteria }}" >> $GITHUB_STEP_SUMMARY
          fi
