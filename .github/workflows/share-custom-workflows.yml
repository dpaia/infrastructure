name: Share Custom Workflows for Repositories
run-name: "Share workflow: ${{ inputs.workflow_path || 'workflow' }} to ${{ inputs.organization || 'jetbrains-eval-lab' }} repos with topic: ${{ inputs.topic || 'all' }}"

on:
  workflow_dispatch:
    inputs:
      organization:
        description: 'GitHub organization name'
        required: true
        type: string
        default: 'jetbrains-eval-lab'
      topic:
        description: 'Repository topic filter'
        required: false
        type: string
        default: ''
      workflow_path:
        description: 'Path(s) to GitHub workflow file(s) to share (relative to shared/). Use comma to separate multiple paths.'
        required: true
        type: string

jobs:
  find-repositories:
    name: Find Repositories
    runs-on: ubuntu-latest
    outputs:
      repo-matrix: ${{ steps.find-repos.outputs.repo-matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find repositories by organization and topic
        id: find-repos
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ORGANIZATION: ${{ inputs.organization }}
          TOPIC: ${{ inputs.topic }}
        run: |
          # Build the search query
          SEARCH_QUERY="org:$ORGANIZATION"
          
          # Add topic filter if provided
          if [ -n "$TOPIC" ]; then
            SEARCH_QUERY="$SEARCH_QUERY topic:$TOPIC"
          fi
          
          echo "Search query: $SEARCH_QUERY"
          
          # Search for repositories
          if [ -n "$TOPIC" ]; then
            # If topic is specified, use it in the search
            # Get full JSON output first, then extract names properly with jq into an array
            REPOS_JSON=$(gh search repos --owner $ORGANIZATION --topic $TOPIC --json name,fullName --include-forks=true --limit 200)
            REPO_MATRIX=$(echo "$REPOS_JSON" | jq -c '[.[].fullName]')
          else
            # Otherwise, list all repos in the organization
            REPOS_JSON=$(gh search repos --owner $ORGANIZATION --json name,fullName --include-forks=true --limit 200)
            REPO_MATRIX=$(echo "$REPOS_JSON" | jq -c '[.[].fullName]')
          fi
          
          # Output the matrix
          echo "repo-matrix=$REPO_MATRIX" >> $GITHUB_OUTPUT
          
          # Log the number of repositories found
          REPO_COUNT=$(echo "$REPO_MATRIX" | jq '. | length')
          echo "Found $REPO_COUNT repositories matching the criteria"

  create-pull-requests:
    name: Create Pull Requests
    needs: find-repositories
    runs-on: ubuntu-latest
    if: ${{ needs.find-repositories.outputs.repo-matrix != '[]' && needs.find-repositories.outputs.repo-matrix != '' }}
    strategy:
      matrix:
        repo: ${{ fromJson(needs.find-repositories.outputs.repo-matrix) }}
      fail-fast: false
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          path: source-repo

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          path: target-repo
          token: ${{ secrets.PROJECT_TOKEN }}

      - name: Verify workflow file(s) exist
        id: verify-workflow
        run: |
          # Support multiple comma-separated paths
          RAW_PATHS="${{ inputs.workflow_path }}"
          IFS=',' read -ra PATHS <<< "$RAW_PATHS"
          FILES_TO_COPY=()
          BASENAMES=()
          for p in "${PATHS[@]}"; do
            # trim spaces
            p="$(echo "$p" | xargs)"
            if [ -z "$p" ]; then
              continue
            fi
            F="source-repo/shared/$p"
            if [ ! -f "$F" ]; then
              echo "Error: Workflow file not found at $F"
              exit 1
            fi
            FILES_TO_COPY+=("$F")
            BASENAMES+=("$(basename "$p")")
            echo "Workflow file found at $F"
          done
          COUNT=${#FILES_TO_COPY[@]}
          if [ "$COUNT" -eq 0 ]; then
            echo "Error: No valid workflow paths provided"
            exit 1
          fi
          # Export for subsequent steps
          echo "WORKFLOW_FILES=${FILES_TO_COPY[*]}" >> $GITHUB_ENV
          echo "WORKFLOW_BASENAMES=$(IFS=,; echo "${BASENAMES[*]}")" >> $GITHUB_ENV
          echo "WORKFLOW_COUNT=$COUNT" >> $GITHUB_ENV

      - name: Create branch for changes
        working-directory: target-repo
        run: |
          # Determine branch name based on single vs multiple files
          if [ "${WORKFLOW_COUNT}" = "1" ]; then
            IFS=',' read -r FIRST_NAME _ <<< "${WORKFLOW_BASENAMES}"
            BASE="${FIRST_NAME%.*}"
            BRANCH_NAME="add-workflow-${BASE}-$(date +%Y%m%d%H%M%S)"
          else
            BRANCH_NAME="add-workflows-multiple-${WORKFLOW_COUNT}-$(date +%Y%m%d%H%M%S)"
          fi
          git checkout -b $BRANCH_NAME
          
          # Set git config
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Copy workflow file(s)
        run: |
          # Create .github/workflows directory if it doesn't exist
          mkdir -p target-repo/.github/workflows
          
          # Copy each workflow file
          for F in ${WORKFLOW_FILES}; do
            cp "$F" "target-repo/.github/workflows/"
            echo "Copied $F to target repository"
          done

      - name: Commit and push changes
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        working-directory: target-repo
        run: |
          # Check if there are changes
          if git status --porcelain | grep -q .; then
            # Add changes
            git add .github/
            
            # Prepare messages
            if [ "${WORKFLOW_COUNT}" = "1" ]; then
              IFS=',' read -r FIRST_NAME _ <<< "${WORKFLOW_BASENAMES}"
              COMMIT_MSG="Add workflow: ${FIRST_NAME}"
              PR_TITLE="$COMMIT_MSG"
              PR_BODY="This PR adds the ${FIRST_NAME} workflow"
            else
              NAMES="${WORKFLOW_BASENAMES}"
              COMMIT_MSG="Add files (${WORKFLOW_COUNT}): ${NAMES}"
              PR_TITLE="Add files: ${NAMES}"
              PR_BODY="This PR adds ${WORKFLOW_COUNT} files: ${NAMES}"
            fi
            
            # Commit changes
            git commit -m "$COMMIT_MSG"
            
            # Push changes
            git push origin $BRANCH_NAME
            
            echo "Changes committed and pushed to branch $BRANCH_NAME"
          
            sleep 5
        
            # Create a pull request using the GitHub CLI
            echo "Creating pull request..."
            echo "Branch: $BRANCH_NAME"          
            PR_URL=$(gh pr create --base main --head "$BRANCH_NAME" --title "$PR_TITLE" --body "$PR_BODY" --repo "${{ matrix.repo }}")
            echo "Pull request created: $PR_URL"
            echo "pull_request_url=$PR_URL" >> $GITHUB_OUTPUT
          else
            echo "No changes to commit"
            exit 0
          fi