name: Sync Labels to Repositories
run-name: "[${{ github.event.inputs.profiles }}] Sync labels to repositories with topics ${{ github.event.inputs.topics }}"

on:
  workflow_dispatch:
    inputs:
      profiles:
        description: 'Comma-separated list of profiles (e.g., common,spring)'
        required: true
        default: 'common,spring'
      topics:
        description: 'Comma-separated list of repository topics to filter by'
        required: true
        default: 'java'
      repositories:
        description: 'Comma-separated list of target repositories (repo1,repo2). If provided, topics will be ignored.'
        required: false
        default: ''

jobs:
  search-repositories:
    runs-on: ubuntu-latest
    outputs:
      repositories: ${{ steps.get-repos.outputs.repos }}
      repositories_json: ${{ steps.get-repos.outputs.repos_json }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch repositories by topics
        if: ${{ github.event.inputs.repositories == '' }}
        id: fetch-repos
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_LABEL_SYNC }}
        run: |
          IFS=',' read -ra TOPICS <<< "${{ github.event.inputs.topics }}"
          REPOS=""
          
          for TOPIC in "${TOPICS[@]}"; do
            echo "Fetching repositories with topic: $TOPIC"
            
            # Initialize variables for pagination
            PAGE=1
            PER_PAGE=100
            ALL_REPOS_FOR_TOPIC=""
            
            # Loop through all pages of results
            while true; do
              echo "Fetching page $PAGE..."
              
              # Get repositories for current page using gh api command
              PAGE_RESULT=$(gh api \
                search/repositories \
                --method=GET \
                -H "Accept: application/vnd.github+json" \
                -f q="org:dpai-benchmark topic:$TOPIC fork:true" \
                -f per_page="$PER_PAGE" \
                -f page="$PAGE")
              
              # Extract repository names and convert to comma-separated list
              PAGE_REPOS=$(echo "$PAGE_RESULT" | jq -r '.items[].name' | tr '\n' ',' | sed 's/,$//')
              
              # Check if we got any results on this page
              if [ -z "$PAGE_REPOS" ]; then
                break
              fi
              
              # Add results to the list
              if [ -n "$ALL_REPOS_FOR_TOPIC" ]; then
                ALL_REPOS_FOR_TOPIC="$ALL_REPOS_FOR_TOPIC,$PAGE_REPOS"
              else
                ALL_REPOS_FOR_TOPIC="$PAGE_REPOS"
              fi
              
              # Check if we've reached the last page
              TOTAL_COUNT=$(echo "$PAGE_RESULT" | jq -r '.total_count')
              ITEMS_SO_FAR=$((PAGE * PER_PAGE))
              if [ $ITEMS_SO_FAR -ge $TOTAL_COUNT ]; then
                break
              fi
              
              # Move to the next page
              PAGE=$((PAGE + 1))
            done
            
            echo "Found repositories with topic $TOPIC: $ALL_REPOS_FOR_TOPIC"
            
            # Add to the overall list
            if [ -n "$ALL_REPOS_FOR_TOPIC" ]; then
              if [ -n "$REPOS" ]; then
                REPOS="$REPOS,$ALL_REPOS_FOR_TOPIC"
              else
                REPOS="$ALL_REPOS_FOR_TOPIC"
              fi
            fi
          done
          
          # Remove duplicates
          UNIQUE_REPOS=$(echo "$REPOS" | tr ',' '\n' | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "Found repositories (total): $UNIQUE_REPOS"
          echo "repos=$UNIQUE_REPOS" >> $GITHUB_OUTPUT

      - name: Get final repository list
        id: get-repos
        run: |
          if [ -n "${{ github.event.inputs.repositories }}" ]; then
            REPOS="${{ github.event.inputs.repositories }}"
          else
            REPOS="${{ steps.fetch-repos.outputs.repos }}"
          fi
          
          if [ -z "$REPOS" ]; then
            echo "No repositories found. Exiting."
            echo "repos=" >> $GITHUB_OUTPUT
            echo "repos_json=[]" >> $GITHUB_OUTPUT
          else
            echo "repos=$REPOS" >> $GITHUB_OUTPUT
            
            # Convert comma-separated list to JSON array with proper quoting
            REPOS_JSON="[\"$(echo $REPOS | sed 's/,/\",\"/g')\"]"
            echo "repos_json=$REPOS_JSON" >> $GITHUB_OUTPUT
            echo "Repositories JSON: $REPOS_JSON"
          fi

  # Dynamic jobs for each profile
  sync-labels-setup:
    needs: search-repositories
    if: ${{ needs.search-repositories.outputs.repositories != '' }}
    runs-on: ubuntu-latest
    outputs:
      profiles: ${{ steps.get-profiles.outputs.profiles_json }}
    steps:
      - name: Get profiles
        id: get-profiles
        run: |
          # Convert comma-separated list to JSON array
          PROFILES="${{ github.event.inputs.profiles }}"
          # Replace commas with double-quotes,"," and double-quotes
          PROFILES_JSON="[\"$(echo $PROFILES | sed 's/,/\",\"/g')\"]"
          echo "profiles_json=$PROFILES_JSON" >> $GITHUB_OUTPUT
          echo "Profiles to process: $PROFILES"
          echo "Profiles JSON: $PROFILES_JSON"

  # This is a template job that will be created for each profile
  sync-labels-profile:
    needs: [search-repositories, sync-labels-setup]
    if: ${{ needs.search-repositories.outputs.repositories != '' }}
    strategy:
      matrix:
        profile: ${{ fromJson(needs.sync-labels-setup.outputs.profiles) }}
        repository: ${{ fromJson(needs.search-repositories.outputs.repositories_json) }}
      fail-fast: false
    name: sync-labels-${{ matrix.repository }}-${{ matrix.profile }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install github-label-sync
        run: npm install -g github-label-sync

      - name: Sync labels for ${{ matrix.repository }} using profile ${{ matrix.profile }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_LABEL_SYNC }}
        run: |
          echo "➡️  Syncing labels to dpai-benchmark/${{ matrix.repository }} using profile ${{ matrix.profile }}"
          echo "  🏷️  Applying labels from profile: ${{ matrix.profile }}"
          github-label-sync \
            --access-token "$GITHUB_TOKEN" \
            --labels ".github/labels/${{ matrix.profile }}.json" \
            --allow-added-labels \
            "dpai-benchmark/${{ matrix.repository }}"
