name: Export SWE Dataset
run-name: "Export SWE Dataset: ${{ inputs.search_query }} -> ${{ inputs.output_file }}"

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: >
          GitHub issue search
          (example: '-label:Epic label:Security assignee:@me is:open')
        required: true
      output_file:
        description: "Export file name"
        default: "dataset.json"
      update:
        description: "Update mode for existing data"
        type: choice
        options:
          - none
          - update
          - force-update
        default: "none"

jobs:
  get-project-data:
    runs-on: ubuntu-latest
    outputs:
      project_id: ${{ steps.get-project-data.outputs.project_id }}
      commit_field_id: ${{ steps.get-project-data.outputs.commit_field_id }}
      data_field_id: ${{ steps.get-project-data.outputs.data_field_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Get project data
        id: get-project-data
        uses: ./.github/actions/get-project-data
        with:
          organization: ${{ github.repository_owner }}
          project_number: 3
          github_token: ${{ secrets.PROJECT_TOKEN }}
          fetch_status_field: 'false'

  find-issues:
    needs: get-project-data
    runs-on: ubuntu-latest
    outputs:
      issue-matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get -y install jq

      - name: Find issues by query
        id: find-issues
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ORG:  ${{ github.repository_owner }}
          QRAW: ${{ inputs.search_query }}
        shell: bash
        run: |
          ME="${{ github.actor }}"
          QFIXED=$(echo "$QRAW" | sed "s/@me/$ME/g")
          QUERY="(project:$ORG/2 OR project:$ORG/3) is:issue $QFIXED"

          echo "🔎 GitHub search query: $QUERY"

          PAGE=100
          
          # Get issue IDs and repository info for the matrix
          gh api --paginate -X GET search/issues \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -f q="$QUERY" -f per_page="$PAGE" -f advanced_search=true |
          jq -c '.items[] | {issue_id: .number | tostring, repo_name: .repository_url | split("/") | .[-1], org_name: .repository_url | split("/") | .[-2]}' |
          jq -s '.' > issue_ids.json
          
          echo "Found $(jq length issue_ids.json) issues"

      - name: Set matrix output
        id: set-matrix
        run: |
          # Ensure the JSON is properly formatted for GitHub Actions output
          MATRIX_JSON=$(jq -c '.' issue_ids.json)
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  get-data-field:
    needs: [get-project-data, find-issues, collect-exists-data, update-issue-swe-data]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      has_gist: ${{ steps.check_gist_links.outputs.has_gist }}
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Get GitHub issue ID
        id: get-issue-node-id
        uses: ./.github/actions/get-issue-node-id
        with:
          repository: ${{ matrix.issue.repo_name }}
          organization: ${{ matrix.issue.org_name }}
          issue_number: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get Data field value
        id: get-data-value
        uses: ./.github/actions/get-project-field-value
        with:
          project_id: ${{ needs.get-project-data.outputs.project_id }}
          issue_node_id: ${{ steps.get-issue-node-id.outputs.issue_node_id }}
          field_name: "Data"
          github_token: ${{ secrets.PROJECT_TOKEN }}
          
      - name: Check for GIST links
        id: check_gist_links
        env:
          DATA_VALUE: ${{ steps.get-data-value.outputs.field_value }}
        run: |
          # Check if DATA_VALUE is null, empty, or doesn't exist
          if [ -z "$DATA_VALUE" ] || [ "$DATA_VALUE" = "null" ]; then
            echo "DATA_VALUE is empty or null, no GIST links found"
            echo "has_gist=false" >> $GITHUB_OUTPUT
          else
            # Check if DATA_VALUE contains any GIST links
            GIST_LINKS=$(echo "$DATA_VALUE" | grep -o 'https://gist\.github\.com/[a-zA-Z0-9/]*')
            if [ -n "$GIST_LINKS" ]; then
              echo "GIST links found in DATA_VALUE"
              echo "has_gist=true" >> $GITHUB_OUTPUT
            else
              echo "No GIST links found in DATA_VALUE"
              echo "has_gist=false" >> $GITHUB_OUTPUT
            fi
          fi
          
      - name: Process gist data immediately
        if: steps.check_gist_links.outputs.has_gist == 'true'
        env:
          ISSUE_ID: ${{ matrix.issue.issue_id }}
          REPO_NAME: ${{ matrix.issue.repo_name }}
          ORG_NAME: ${{ matrix.issue.org_name }}
          DATA_VALUE: ${{ steps.get-data-value.outputs.field_value }}
        run: |
          # Install required tools
          sudo apt-get update && sudo apt-get -y install jq curl
          
          # Extract GIST links directly from DATA_VALUE
          GIST_LINKS=$(echo "$DATA_VALUE" | grep -o 'https://gist\.github\.com/[a-zA-Z0-9/]*')
          
          # Get the first GIST URL from the extracted links
          GIST_URL=$(echo "$GIST_LINKS" | head -n 1)
          echo "GIST URL: $GIST_URL"
          
          if [ -n "$GIST_URL" ] && [ "$GIST_URL" != "null" ]; then
            # Extract GIST ID from URL
            GIST_ID=$(echo "$GIST_URL" | sed -E 's|.*/([a-f0-9]+)$|\1|')
            
            if [ -n "$GIST_ID" ]; then
              echo "Fetching GIST content for ID: $GIST_ID"
              
              # Fetch the raw GIST content
              mkdir -p ./gist_content
              RAW_URL="https://gist.githubusercontent.com/raw/$GIST_ID"
              curl -s "$RAW_URL" > "./gist_content/${ORG_NAME}_${REPO_NAME}_${ISSUE_ID}.json"
              
              # Upload GIST content as artifact immediately
              echo "gist_processed=true" >> $GITHUB_OUTPUT
            else
              echo "Could not extract GIST ID from URL: $GIST_URL"
              echo "gist_processed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "No valid GIST URL found for issue #$ISSUE_ID"
            echo "gist_processed=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Upload processed gist content
        if: steps.check_gist_links.outputs.has_gist == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gist-content-${{ matrix.issue.org_name }}-${{ matrix.issue.repo_name }}-${{ matrix.issue.issue_id }}
          path: ./gist_content/${{ matrix.issue.org_name }}_${{ matrix.issue.repo_name }}_${{ matrix.issue.issue_id }}.json
          retention-days: 1

  collect-exists-data:
    needs: [find-issues]
    if: inputs.update == 'none'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Get GitHub issue ID
        id: get-issue-node-id
        uses: ./.github/actions/get-issue-node-id
        with:
          repository: ${{ matrix.issue.repo_name }}
          organization: ${{ matrix.issue.org_name }}
          issue_number: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

  compare-commits:
    needs: [find-issues, get-project-data]
    if: inputs.update == 'update'
    runs-on: ubuntu-latest
    outputs:
      commits-match: ${{ steps.set-matrix-output.outputs.commits-match-matrix }}
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Get GitHub issue ID
        id: get-issue-node-id
        uses: ./.github/actions/get-issue-node-id
        with:
          repository: ${{ matrix.issue.repo_name }}
          organization: ${{ matrix.issue.org_name }}
          issue_number: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get Commit field value
        id: get-commit-value
        uses: ./.github/actions/get-project-field-value
        with:
          project_id: ${{ needs.get-project-data.outputs.project_id }}
          issue_node_id: ${{ steps.get-issue-node-id.outputs.issue_node_id }}
          field_name: "Commit"
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get latest commit
        id: get-latest-commit
        uses: ./.github/actions/get-latest-commit
        with:
          organization: ${{ matrix.issue.org_name }}
          repository: ${{ matrix.issue.repo_name }}
          issue_id: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Compare commits
        id: compare-commits
        env:
          COMMIT_FIELD_VALUE: ${{ steps.get-commit-value.outputs.field_value }}
          LATEST_COMMIT: ${{ steps.get-latest-commit.outputs.commit_hash }}
        run: |
          echo "Commit field value: $COMMIT_FIELD_VALUE"
          echo "Latest commit: $LATEST_COMMIT"

          if [ -z "$COMMIT_FIELD_VALUE" ] || [ "$COMMIT_FIELD_VALUE" = "null" ] || [ "$COMMIT_FIELD_VALUE" != "$LATEST_COMMIT" ]; then
            echo "Commits don't match or Commit field is empty"
            echo "match=false" >> $GITHUB_OUTPUT
          else
            echo "Commits match"
            echo "match=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Create result file
        env:
          ISSUE_ID: ${{ matrix.issue.issue_id }}
          REPO_NAME: ${{ matrix.issue.repo_name }}
          ORG_NAME: ${{ matrix.issue.org_name }}
          MATCH_RESULT: ${{ steps.compare-commits.outputs.match }}
        run: |
          mkdir -p ./commit_results
          echo "{\"issue_id\": \"$ISSUE_ID\", \"repo_name\": \"$REPO_NAME\", \"org_name\": \"$ORG_NAME\", \"match\": \"$MATCH_RESULT\"}" > ./commit_results/${ORG_NAME}_${REPO_NAME}_${ISSUE_ID}.json

      - name: Upload commit comparison result
        uses: actions/upload-artifact@v4
        with:
          name: commit-result-${{ matrix.issue.org_name }}-${{ matrix.issue.repo_name }}-${{ matrix.issue.issue_id }}
          path: ./commit_results/${{ matrix.issue.org_name }}_${{ matrix.issue.repo_name }}_${{ matrix.issue.issue_id }}.json
          retention-days: 1
          
      - name: Set matrix output
        id: set-matrix-output
        run: |
          # Collect all results into a matrix format
          find ./commit_results -name "*.json" -exec cat {} \; | jq -s '.' > commit_results_matrix.json
          MATRIX_JSON=$(jq -c '.' commit_results_matrix.json)
          echo "commits-match-matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  update-issue-swe-data:
    needs: [find-issues, compare-commits]
    if: inputs.update == 'force-update' || inputs.update == 'update'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Download commit comparison result
        if: inputs.update == 'update'
        uses: actions/download-artifact@v4
        with:
          name: commit-result-${{ matrix.issue.org_name }}-${{ matrix.issue.repo_name }}-${{ matrix.issue.issue_id }}
          path: ./commit_results
          
      - name: Check if update is needed
        if: inputs.update == 'update'
        id: check-update
        env:
          ISSUE_ID: ${{ matrix.issue.issue_id }}
          REPO_NAME: ${{ matrix.issue.repo_name }}
          ORG_NAME: ${{ matrix.issue.org_name }}
        run: |
          RESULT_FILE="./commit_results/${ORG_NAME}_${REPO_NAME}_${ISSUE_ID}.json"
          if [ -f "$RESULT_FILE" ]; then
            MATCH_RESULT=$(jq -r '.match' "$RESULT_FILE")
            echo "match=$MATCH_RESULT" >> $GITHUB_OUTPUT
          else
            echo "Result file not found, skipping update"
            echo "match=true" >> $GITHUB_OUTPUT
          fi

      - name: Update Issue SWE Data
        if: inputs.update == 'force-update' || (inputs.update == 'update' && steps.check-update.outputs.match == 'true')
        uses: ./.github/actions/update-issue-swe-data
        with:
          generator: 'java'
          organization: ${{ matrix.issue.org_name }}
          repository: ${{ matrix.issue.repo_name }}
          issue_id: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}
          gist_token: ${{ secrets.GIST_TOKEN }}
          update_status: 'false'


  # The fetch-gist-data job has been integrated directly into the get-data-field job
  # to ensure immediate processing of gist URLs when they are found

  aggregate-results:
    needs: get-data-field
    runs-on: ubuntu-latest
    steps:
      - name: Download all GIST content
        uses: actions/download-artifact@v4
        with:
          pattern: gist-content-*-*-*
          path: ./all_gists
          merge-multiple: true

      - name: Install jq
        run: sudo apt-get update && sudo apt-get -y install jq

      - name: Combine issue data
        env:
          OUT: ${{ inputs.output_file }}
        run: |
          # Combine all individual GIST content files into one JSON array
          find ./all_gists -name "*.json" -exec cat {} \; | jq -s '.' > "$OUT"
          echo "Combined $(jq length "$OUT") issues into $OUT"
      
      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-tasks
          path: ${{ inputs.output_file }}
