name: Update Issue SWE Data
run-name: "[${{ github.event.inputs.organization }}/${{ github.event.inputs.repository }}][${{ github.event.inputs.generator }}] Update SWE Data for issue #${{ github.event.inputs.issue_id }}"

on:
  workflow_dispatch:
    inputs:
      generator:
        description: 'Profile'
        required: true
        default: 'java'
        type: string
      organization:
        description: 'GitHub organization name'
        required: true
        default: 'jetbrains-eval-lab'
        type: string
      repository:
        description: 'Repository name (repo)'
        required: true
        type: string
      issue_id:
        description: 'Issue number'
        required: true
        type: string

jobs:
  get-latest-commit:
    runs-on: ubuntu-latest
    outputs:
      commit_hash: ${{ steps.get-commit.outputs.commit_hash }}
      base_commit_hash: ${{ steps.get-commit.outputs.base_commit_hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest commit
        id: get-commit
        uses: ./.github/actions/get-latest-commit
        with:
          organization: ${{ github.event.inputs.organization }}
          repository: ${{ github.event.inputs.repository }}
          issue_id: ${{ github.event.inputs.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

  get-issue-id:
    runs-on: ubuntu-latest
    outputs:
      issue_id: ${{ steps.fetch-issue-id.outputs.issue_id }}
    steps:
      - name: Fetch GitHub issue ID
        id: fetch-issue-id
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          repo="${{ github.event.inputs.organization }}/${{ github.event.inputs.repository }}"
          issue_number="${{ github.event.inputs.issue_id }}"
          owner="${repo%/*}"
          repo_name="${repo##*/}"

          echo "Fetching Issue ID..."
          issue_id=$(gh api graphql -f query='
          query($repo:String!, $owner:String!, $number:Int!) {
            repository(name: $repo, owner: $owner) {
              issue(number: $number) {
                id
              }
            }
          }' -f repo="$repo_name" -f owner="$owner" -F number=$issue_number --jq '.data.repository.issue.id')

          echo "Issue ID: $issue_id"
          echo "issue_id=$issue_id" >> $GITHUB_OUTPUT

  get-project-data:
    runs-on: ubuntu-latest
    outputs:
      project_id: ${{ steps.get-project-data.outputs.project_id }}
      commit_field_id: ${{ steps.get-project-data.outputs.commit_field_id }}
      data_field_id: ${{ steps.get-project-data.outputs.data_field_id }}
      status_field_id: ${{ steps.get-project-data.outputs.status_field_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get project data
        id: get-project-data
        uses: ./.github/actions/get-project-data
        with:
          organization: ${{ github.event.inputs.organization }}
          project_number: 3
          github_token: ${{ secrets.PROJECT_TOKEN }}
          fetch_status_field: 'true'

  add-to-project:
    needs: [get-issue-id, get-project-data]
    runs-on: ubuntu-latest
    outputs:
      item_id: ${{ steps.add-to-project.outputs.item_id }}
    steps:
      - name: Add Issue to Project
        id: add-to-project
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PROJECT_ID: ${{ needs.get-project-data.outputs.project_id }}
          ISSUE_ID: ${{ needs.get-issue-id.outputs.issue_id }}
        run: |
          echo "Adding Issue to Project..."
          item_id=$(gh api graphql -f query='
          mutation($projectId:ID!, $contentId:ID!) {
            addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
              item {
                id
              }
            }
          }' -f projectId=$PROJECT_ID -f contentId=$ISSUE_ID --jq '.data.addProjectV2ItemById.item.id')

          echo "Item ID: $item_id"
          echo "item_id=$item_id" >> $GITHUB_OUTPUT

          echo "✅ Issue added to project!"

  extract-test-fields:
    needs: [get-latest-commit]
    runs-on: ubuntu-latest
    outputs:
      fail_to_pass: ${{ steps.extract-fields.outputs.fail_to_pass }}
      pass_to_pass: ${{ steps.extract-fields.outputs.pass_to_pass }}
      has_error: ${{ steps.extract-fields.outputs.has_error }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Make Python script executable
        run: chmod +x .github/generator/utils/extract_test_fields.py

      - name: Extract FAIL_TO_PASS and PASS_TO_PASS
        id: extract-fields
        env:
          ISSUE_NUMBER: ${{ github.event.inputs.issue_id }}
          REPOSITORY: ${{ github.event.inputs.repository }}
          ORGANIZATION: ${{ github.event.inputs.organization }}
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          echo "data_value<<EOF" >> $GITHUB_OUTPUT
          .github/generator/utils/extract_test_fields.py >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT      

  generate-data:
    needs: [get-latest-commit, extract-test-fields]
    runs-on: ubuntu-latest
    outputs:
      data_value: ${{ steps.generate-data.outputs.data_value }}
      has_error: ${{ steps.check-error.outputs.has_error }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make Python script executable
        run: chmod +x .github/generator/${{ github.event.inputs.generator }}.py

      - name: Generate data value with Python script
        id: generate-data
        env:
          ISSUE_NUMBER: ${{ github.event.inputs.issue_id }}
          REPOSITORY: ${{ github.event.inputs.repository }}
          ORGANIZATION: ${{ github.event.inputs.organization }}
          LATEST_COMMIT: ${{ needs.get-latest-commit.outputs.commit_hash }}
          BASE_COMMIT: ${{ needs.get-latest-commit.outputs.base_commit_hash || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_FAIL_TO_PASS: ${{ needs.extract-test-fields.outputs.fail_to_pass }}
          TEST_PASS_TO_PASS: ${{ needs.extract-test-fields.outputs.pass_to_pass }}
        run: |
          echo "data_value<<EOF" >> $GITHUB_OUTPUT
          .github/generator/${{ github.event.inputs.generator }}.py >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check for errors
        id: check-error
        env:
          DATA_VALUE: ${{ steps.generate-data.outputs.data_value }}
          EXTRACT_ERROR: ${{ needs.extract-test-fields.outputs.has_error }}
        run: |
          if [ "$EXTRACT_ERROR" == "true" ] || echo "$DATA_VALUE" | jq -e '.has_error == true' > /dev/null 2>&1; then
            echo "Error detected in data generation or test field extraction."
            echo "has_error=true" >> $GITHUB_OUTPUT
          else
            echo "Data generated successfully."
            echo "has_error=false" >> $GITHUB_OUTPUT
          fi

  create-gist:
    needs: [generate-data]
    runs-on: ubuntu-latest
    outputs:
      gist_url: ${{ steps.create-update-gist.outputs.gist_url }}
      has_error: ${{ needs.generate-data.outputs.has_error }}
    steps:
      - name: Create or update gist
        id: create-update-gist
        if: needs.generate-data.outputs.has_error != 'true'
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          DATA_VALUE: ${{ needs.generate-data.outputs.data_value }}
          ISSUE_ID: ${{ github.event.inputs.issue_id }}
        run: |
          echo "Creating or updating gist with JSON data..."
          
          # Extract instance_id from the JSON data
          INSTANCE_ID=$(echo "$DATA_VALUE" | jq -r '.instance_id')
          
          # Create a temporary file with the JSON data
          GIST_FILENAME="${INSTANCE_ID}.json"
          
          # Replace slashes with underscores for the local filename to avoid directory issues
          LOCAL_FILENAME="${GIST_FILENAME//\//__}"
          echo "$DATA_VALUE" > "$LOCAL_FILENAME"
          
          echo "Creating or updating secret gist with filename: $GIST_FILENAME"
          
          # Check if gist already exists for this issue
          echo "Running command: gh gist list --filter \"$GIST_FILENAME\""
          EXISTING_GISTS=$(gh gist list --filter "$GIST_FILENAME" || true)
          
          if [ -n "$EXISTING_GISTS" ]; then
            # Extract gist ID from the list
            GIST_ID=$(echo "$EXISTING_GISTS" | awk '{print $1}')
            echo "Found existing gist with ID: $GIST_ID, updating it..."
            
            # Update the existing gist
            GIST_RESULT=$(gh gist edit "$GIST_ID" -f "$GIST_FILENAME" "$LOCAL_FILENAME")
            
            # Get the owner of the GIST_TOKEN
            GIST_OWNER=$(gh api user --jq '.login')
            
            # Construct the URL in the required format
            GIST_URL="https://gist.github.com/$GIST_OWNER/$GIST_ID"
          else
            echo "No existing gist found, creating a new one..."
            
            # Create a new secret gist
            GIST_RESULT=$(gh gist create "$LOCAL_FILENAME" --filename="$GIST_FILENAME")
            GIST_URL=$(echo "$GIST_RESULT" | grep -o 'https://gist.github.com/[^ ]*')
          fi
          
          echo "Gist URL: $GIST_URL"
          echo "gist_url=$GIST_URL" >> $GITHUB_OUTPUT
          
          # Clean up temporary file
          rm "$LOCAL_FILENAME"

  update-data-field:
    needs: [get-project-data, add-to-project, create-gist]
    runs-on: ubuntu-latest
    outputs:
      has_error: ${{ needs.create-gist.outputs.has_error }}
    steps:
      - name: Update Data field
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PROJECT_ID: ${{ needs.get-project-data.outputs.project_id }}
          ITEM_ID: ${{ needs.add-to-project.outputs.item_id }}
          DATA_FIELD_ID: ${{ needs.get-project-data.outputs.data_field_id }}
          GIST_URL: ${{ needs.create-gist.outputs.gist_url }}
          HAS_ERROR: ${{ needs.create-gist.outputs.has_error }}
        run: |
          echo "Setting Data field value..."

          # Set the value based on whether there was an error
          if [ "$HAS_ERROR" == "true" ]; then
            echo "Error detected in data generation or test field extraction. Setting empty Data field."
            VALUE_TO_SET=""
          else
            echo "Using gist URL: $GIST_URL"
            VALUE_TO_SET="$GIST_URL"
          fi

          gh api graphql -f query='
          mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $value:String!) {
            updateProjectV2ItemFieldValue(input: {
              projectId: $projectId,
              itemId: $itemId,
              fieldId: $fieldId,
              value: {
                text: $value
              }
            }) {
              projectV2Item {
                id
              }
            }
          }' -f projectId=$PROJECT_ID -f itemId=$ITEM_ID -f fieldId=$DATA_FIELD_ID -f value="$VALUE_TO_SET"

          if [ "$VALUE_TO_SET" == "" ]; then
            echo "✅ Data field updated with empty value due to error!"
          else
            echo "✅ Data field updated with gist URL: $VALUE_TO_SET"
          fi

  update-status-field:
    needs: [get-project-data, add-to-project, create-gist, extract-test-fields, generate-data]
    runs-on: ubuntu-latest
    if: always()  # Run this job even if previous jobs fail
    steps:
      - name: Update Status field based on result
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PROJECT_ID: ${{ needs.get-project-data.outputs.project_id }}
          ITEM_ID: ${{ needs.add-to-project.outputs.item_id }}
          STATUS_FIELD_ID: ${{ needs.get-project-data.outputs.status_field_id }}
          HAS_ERROR: ${{ needs.create-gist.outputs.has_error }}
          GET_PROJECT_DATA_RESULT: ${{ needs.get-project-data.result }}
          ADD_TO_PROJECT_RESULT: ${{ needs.add-to-project.result }}
          CREATE_GIST_RESULT: ${{ needs.create-gist.result }}
          EXTRACT_TEST_FIELDS_RESULT: ${{ needs.extract-test-fields.result }}
          GENERATE_DATA_RESULT: ${{ needs.generate-data.result }}
        run: |
          # Check if any job failed
          if [ "$GET_PROJECT_DATA_RESULT" == "failure" ] || \
             [ "$ADD_TO_PROJECT_RESULT" == "failure" ] || \
             [ "$CREATE_GIST_RESULT" == "failure" ] || \
             [ "$EXTRACT_TEST_FIELDS_RESULT" == "failure" ] || \
             [ "$GENERATE_DATA_RESULT" == "failure" ] || \
             [ "$HAS_ERROR" == "true" ]; then
            TARGET_STATUS="Failed"
            echo "Setting Status field to Failed due to error in workflow..."
          else
            TARGET_STATUS="Done"
            echo "Setting Status field to Done..."
          fi

          # First, we need to get the option ID for the target status in the Status field
          echo "Fetching option ID for '$TARGET_STATUS' status..."
          status_options=$(gh api graphql -f query='
          query($project:ID!) {
            node(id: $project) {
              ... on ProjectV2 {
                fields(first: 100) {
                  nodes {
                    ... on ProjectV2SingleSelectField {
                      id
                      name
                      options {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }
          }' -f project=$PROJECT_ID)

          # Extract options for the Status field
          status_field_options=$(echo "$status_options" | jq -r '.data.node.fields.nodes[] | select(.id == "'$STATUS_FIELD_ID'") | .options')

          # Try to find the target status option
          target_option_id=$(echo "$status_field_options" | jq -r '.[] | select(.name == "'$TARGET_STATUS'") | .id')

          if [ -z "$target_option_id" ]; then
            echo "Warning: '$TARGET_STATUS' option not found in Status field. Available options:"
            echo "$status_field_options" | jq -r '.[].name'

            # If target was Failed but not found, try to find Error, Failed, or Failure
            if [ "$TARGET_STATUS" == "Failed" ]; then
              for fallback in "Error" "Failed" "Failure" "Bug"; do
                target_option_id=$(echo "$status_field_options" | jq -r '.[] | select(.name == "'$fallback'") | .id')
                if [ -n "$target_option_id" ]; then
                  echo "Using '$fallback' as fallback for Failed status"
                  break
                fi
              done
            fi

            # If still not found or target was Done, use first option
            if [ -z "$target_option_id" ]; then
              echo "Using first available option as fallback"
              target_option_id=$(echo "$status_field_options" | jq -r '.[0].id')
            fi
          fi

          echo "$TARGET_STATUS option ID: $target_option_id"

          # Update the Status field with the target option
          gh api graphql -f query='
          mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
            updateProjectV2ItemFieldValue(input: {
              projectId: $projectId,
              itemId: $itemId,
              fieldId: $fieldId,
              value: {
                singleSelectOptionId: $optionId
              }
            }) {
              projectV2Item {
                id
              }
            }
          }' -f projectId=$PROJECT_ID -f itemId=$ITEM_ID -f fieldId=$STATUS_FIELD_ID -f optionId="$target_option_id"

          echo "✅ Status field updated to $TARGET_STATUS!"

  update-commit-field:
    needs: [get-latest-commit, get-project-data, add-to-project]
    runs-on: ubuntu-latest
    if: always()  # Run this job even if previous jobs fail
    steps:
      - name: Update Commit field
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PROJECT_ID: ${{ needs.get-project-data.outputs.project_id }}
          ITEM_ID: ${{ needs.add-to-project.outputs.item_id }}
          COMMIT_FIELD_ID: ${{ needs.get-project-data.outputs.commit_field_id }}
          LATEST_COMMIT: ${{ needs.get-latest-commit.outputs.commit_hash }}
        run: |
          echo "Setting Commit field value..."
          gh api graphql -f query='
          mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $value:String!) {
            updateProjectV2ItemFieldValue(input: {
              projectId: $projectId,
              itemId: $itemId,
              fieldId: $fieldId,
              value: {
                text: $value
              }
            }) {
              projectV2Item {
                id
              }
            }
          }' -f projectId=$PROJECT_ID -f itemId=$ITEM_ID -f fieldId=$COMMIT_FIELD_ID -f value="$LATEST_COMMIT"

          echo "✅ Commit field updated with latest commit hash: $LATEST_COMMIT"