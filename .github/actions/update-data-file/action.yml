name: 'Update Repository File'
description: 'Creates or updates a file in a GitHub repository with provided data'
author: 'JetBrains'

inputs:
  organization:
    description: 'GitHub organization name'
    required: true
  repository:
    description: 'Repository name'
    required: true
  issue_id:
    description: 'Issue number'
    required: true
  data_value:
    description: 'JSON data to be written to the file'
    required: true
  commit_message:
    description: 'Commit message for the file update'
    required: true
  title:
    description: 'Title for the pull request'
    required: true
  github_token:
    description: 'GitHub token for API access'
    required: true
  dataset_repo:
    description: 'Repository for storing dataset files'
    required: true
  auto_merge:
    description: 'Automatically merge the pull request'
    required: false
    default: 'false'
  git_user_email:
    description: 'Git user email for commit'
    required: false
    default: 'action@github.com'
  git_user_name:
    description: 'Git user name for commit'
    required: false
    default: 'GitHub Action'

outputs:
  file_url:
    description: 'The URL of the created or updated file in the repository'
    value: ${{ steps.create-file.outputs.file_url }}

runs:
  using: 'composite'
  steps:
    - name: Create or update repository file
      id: create-file
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        DATA_VALUE: ${{ inputs.data_value }}
        ISSUE_ID: ${{ inputs.issue_id }}
        REPOSITORY: ${{ inputs.repository }}
        DATASET_REPO: ${{ inputs.dataset_repo }}
        ORGANIZATION: ${{ inputs.organization }}
        TITLE: ${{ inputs.title }}
        COMMIT_MESSAGE: ${{ inputs.commit_message }}
        AUTO_MERGE: ${{ inputs.auto_merge }}
        GIT_USER_EMAIL: ${{ inputs.git_user_email }}
        GIT_USER_NAME: ${{ inputs.git_user_name }}
      run: |
        echo "Creating or updating repository file with JSON data..."

        # Extract instance_id from the JSON data
        INSTANCE_ID=$(echo "$DATA_VALUE" | jq -r '.instance_id')

        # Create a temporary file with the JSON data
        FILE_PATH="${REPOSITORY}/${INSTANCE_ID}.json"

        # Replace slashes with underscores for the local filename to avoid directory issues
        LOCAL_FILENAME="${FILE_PATH//\//__}"
        echo "$DATA_VALUE" > "$LOCAL_FILENAME"

        # Create a temporary directory for the repository
        TEMP_DIR=$(mktemp -d)
        cd "$TEMP_DIR"

        # Clone the repository
        echo "Cloning repository: $DATASET_REPO"
        git clone "https://x-access-token:${GH_TOKEN}@github.com/${ORGANIZATION}/${DATASET_REPO}.git" .

        # Create directory structure if it doesn't exist
        mkdir -p "$(dirname "$FILE_PATH")"

        # Copy the file to the repository
        cp "$GITHUB_WORKSPACE/$LOCAL_FILENAME" "$FILE_PATH"
        
        # Add, commit, and create a pull request
        git add "$FILE_PATH"
        git config --local user.email "$GIT_USER_EMAIL"
        git config --local user.name "$GIT_USER_NAME"
        
        git commit -m "$COMMIT_MESSAGE"
        
        # Create a new branch with a unique name
        BRANCH_NAME="update-data-file-${ISSUE_ID}-$(date +%s)"
        git checkout -b "$BRANCH_NAME"
        
        # Push to the new branch
        git push origin "$BRANCH_NAME"
        
        # Create a pull request using the GitHub CLI
        echo "Creating pull request..."
        PR_URL=$(gh pr create --base main --head "$BRANCH_NAME" --title "$TITLE" --body "$COMMIT_MESSAGE" --repo "${ORGANIZATION}/${DATASET_REPO}")
        echo "Pull request created: $PR_URL"
        
        # Auto-merge the pull request if requested
        if [ "$AUTO_MERGE" = "true" ]; then
          echo "Auto-merging pull request with rebase..."
          gh pr merge "$PR_URL" --rebase --auto
  
          # Wait for merge to complete
          echo "Waiting for merge to complete..."
          sleep 5
  
          # Delete the branch after successful merge
          echo "Removing branch after merge..."
          git push origin --delete "$BRANCH_NAME"
        fi
        
        # Get the URL to the file in the repository
        REPO_PARTS=(${DATASET_REPO//\// })
        REPO_OWNER=${REPO_PARTS[0]}
        REPO_NAME=${REPO_PARTS[1]}
        # Use main branch for the file URL since the PR will eventually be merged to main
        FILE_URL="https://github.com/${ORGANIZATION}/${DATASET_REPO}/blob/main/${FILE_PATH}"
        
        echo "File URL: $FILE_URL"
        echo "file_url=$FILE_URL" >> $GITHUB_OUTPUT
        
        # Clean up temporary files and directory
        cd "$GITHUB_WORKSPACE"
        rm "$LOCAL_FILENAME"
        rm -rf "$TEMP_DIR"