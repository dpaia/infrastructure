name: Sync Labels to Repositories

on:
  workflow_dispatch:
    inputs:
      labels_file:
        description: 'Path to the labels JSON file'
        required: true
        default: 'java-spring'
      topics:
        description: 'Comma-separated list of repository topics to filter by'
        required: true
        default: 'java'
      repositories:
        description: 'Comma-separated list of target repositories (repo1,repo2). If provided, topics will be ignored.'
        required: false
        default: ''

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install github-label-sync
        run: npm install -g github-label-sync

      - name: Fetch repositories by topics
        if: ${{ github.event.inputs.repositories == '' }}
        id: fetch-repos
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_LABEL_SYNC }}
        run: |
          echo "Input topics: ${{ github.event.inputs.topics }}"
          IFS=',' read -ra TOPICS <<< "${{ github.event.inputs.topics }}"
          echo "Number of topics to process: ${#TOPICS[@]}"
          REPOS=""

          # Build a single query for all topics with OR condition
          TOPIC_QUERY=""
          for TOPIC in "${TOPICS[@]}"; do
            echo "Adding topic to query: $TOPIC"
            if [ -n "$TOPIC_QUERY" ]; then
              TOPIC_QUERY="$TOPIC_QUERY+OR+topic:$TOPIC"
            else
              TOPIC_QUERY="topic:$TOPIC"
            fi
          done

          echo "Using combined topic query: $TOPIC_QUERY"

          # Initialize variables for pagination
          PAGE=1
          PER_PAGE=100
          REPOS=""

          # Loop through all pages of results
          while true; do
            echo "Fetching page $PAGE..."

            # Get repositories for current page using gh api command
            PAGE_RESULT=$(gh api \
              search/repositories \
              --method=GET \
              -H "Accept: application/vnd.github+json" \
              -f q="org:jetbrains-eval-lab+($TOPIC_QUERY)" \
              -f per_page="$PER_PAGE" \
              -f page="$PAGE")

            # Debug response
            echo "DEBUG: API response for page $PAGE:"
            echo "$PAGE_RESULT" | jq '.total_count, .items | length'

            # Extract repository names and convert to comma-separated list
            PAGE_REPOS=$(echo "$PAGE_RESULT" | jq -r '.items[].name' | tr '\n' ',' | sed 's/,$//')

            # Check if we got any results on this page
            if [ -z "$PAGE_REPOS" ]; then
              break
            fi

            # Add results to the list
            if [ -n "$REPOS" ]; then
              REPOS="$REPOS,$PAGE_REPOS"
            else
              REPOS="$PAGE_REPOS"
            fi

            # Check if we've reached the last page
            TOTAL_COUNT=$(echo "$PAGE_RESULT" | jq -r '.total_count')
            ITEMS_SO_FAR=$((PAGE * PER_PAGE))
            if [ $ITEMS_SO_FAR -ge $TOTAL_COUNT ]; then
              break
            fi

            # Move to the next page
            PAGE=$((PAGE + 1))
          done

          echo "Found repositories with combined topics: $REPOS"
          
          # Remove duplicates
          UNIQUE_REPOS=$(echo "$REPOS" | tr ',' '\n' | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "Found repositories (total): $UNIQUE_REPOS"
          echo "Number of unique repositories: $(echo "$UNIQUE_REPOS" | tr ',' '\n' | wc -l)"
          echo "repos=$UNIQUE_REPOS" >> $GITHUB_OUTPUT

      - name: Sync labels (add / update only)
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_LABEL_SYNC }}
        run: |
          # Use provided repositories if available, otherwise use repositories fetched by topics
          if [ -n "${{ github.event.inputs.repositories }}" ]; then
            REPOS="${{ github.event.inputs.repositories }}"
          else
            REPOS="${{ steps.fetch-repos.outputs.repos }}"
          fi
          
          if [ -z "$REPOS" ]; then
            echo "No repositories found. Exiting."
            exit 0
          fi
          
          IFS=',' read -ra REPO_ARRAY <<< "$REPOS"
          for REPO in "${REPO_ARRAY[@]}"; do
            echo "➡️  Syncing labels to jetbrains-eval-lab/$REPO"
            github-label-sync \
              --access-token "$GITHUB_TOKEN" \
              --labels ".github/${{ github.event.inputs.labels_file }}-labels.json" \
              --allow-added-labels \
              "jetbrains-eval-lab/$REPO"
          done
