[project]
name = "ee_bench_gradle"
version = "0.1.0"
description = "Gradle build-system provider for ee_bench - enriches test names with module prefix"
requires-python = ">=3.11"
dependencies = [
    "ee_bench_generator",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[project.entry-points."ee_bench_generator.providers"]
gradle = "ee_bench_gradle:GradleProvider"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ee_bench_gradle"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
