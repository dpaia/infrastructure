name: Run Tests

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to set up'
        required: false
        type: string
        default: '8'
      distribution:
        description: 'Java distribution to use'
        required: false
        type: string
        default: 'temurin'
      pom-file:
        description: 'Path to the pom.xml file'
        required: false
        type: string
        default: 'pom.xml'
      issue-number:
        description: 'Issue number to extract test names from'
        required: false
        type: string
        default: ''
    secrets:
      github-token:
        description: 'GitHub token for API access'
        required: true

jobs:
  # ──────────── 1. collect and process tests ────────────
  collect-process-tests:
    uses: ./.github/workflows/shared-collect-process-tests.yml
    with:
      issue-number: ${{ inputs.issue-number }}
    secrets:
      github-token: ${{ secrets.github-token }}

  # ──────────── 2. post placeholder comment (EARLY) ────────────
  placeholder-comment:
    needs: collect-process-tests
    runs-on: ubuntu-latest
    permissions:
      issues: write
    if: ${{ github.event_name == 'push' || github.event_name == 'issue_comment' }}
    outputs:
      comment_id: ${{ steps.create_comment.outputs.comment_id }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Create placeholder issue comment
        id: create_comment
        uses: ./.github/actions/placeholder-comment
        with:
          github-token: ${{ secrets.github-token }}
          fail-to-pass: ${{ needs.collect-process-tests.outputs.fail_to_pass }}
          pass-to-pass: ${{ needs.collect-process-tests.outputs.pass_to_pass }}
          comment-id: ${{ needs.collect-process-tests.outputs.comment_id }}

  # ──────────── 3. Java / Maven setup and run tests ────────────
  run-tests:
    needs: [collect-process-tests, placeholder-comment]
    if: ${{ always() && (github.event_name != 'pull_request' || needs.collect-process-tests.outputs.fail_to_pass != '' || needs.collect-process-tests.outputs.pass_to_pass != '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      status: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Maven tests
        uses: ./.github/actions/run-maven-tests
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.distribution }}
          tests: ${{ needs.collect-process-tests.outputs.tests }}
          pom-file: ${{ inputs.pom-file }}

  # ──────────── 4. update the same comment (FINAL) ────────────
  update-comment:
    needs: [collect-process-tests, placeholder-comment, run-tests]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    if: ${{ always() && (github.event_name == 'push' || github.event_name == 'issue_comment') }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Update issue comment with final status
        uses: ./.github/actions/update-issue-comment
        with:
          github-token: ${{ secrets.github-token }}
          comment-id: ${{ needs.placeholder-comment.outputs.comment_id }}
          job-status: ${{ needs.run-tests.outputs.status }}
          fail-to-pass: ${{ needs.collect-process-tests.outputs.fail_to_pass }}
          pass-to-pass: ${{ needs.collect-process-tests.outputs.pass_to_pass }}
