[project]
name = "ee_bench_dpaia"
version = "0.1.0"
description = "DPAIA (Data Patcher AI Agent) generator for ee_bench"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "ee_bench_generator",
]

[project.entry-points."ee_bench_generator.generators"]
dpaia_jvm = "ee_bench_dpaia:DpaiaJvmGenerator"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ee_bench_dpaia"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
