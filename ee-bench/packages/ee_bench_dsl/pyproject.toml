[project]
name = "ee_bench_dsl"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "ee_bench_generator",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ee_bench_dsl"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
