name: Validate SWE Issue
run-name: "[${{ github.event.inputs.organization }}/${{ github.event.inputs.repository }}][${{ github.event.inputs.generator }}] Validate issue #${{ github.event.inputs.issue_id }}"

on:
  workflow_dispatch:
    inputs:
      generator:
        description: 'Profile'
        required: true
        default: 'java'
        type: choice
        options:
          - java
      organization:
        description: 'GitHub organization name'
        required: true
        default: 'jetbrains-eval-lab'
        type: string
      repository:
        description: 'Repository name (repo)'
        required: true
        type: string
      issue_id:
        description: 'Issue number'
        required: true
        type: string

jobs:
  validate-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest commit
        id: get-commits
        uses: ./.github/actions/get-commits
        with:
          organization: ${{ github.event.inputs.organization }}
          repository: ${{ github.event.inputs.repository }}
          issue_id: ${{ github.event.inputs.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Extract FAIL_TO_PASS and PASS_TO_PASS
        id: extract-fields
        uses: ./.github/actions/extract-test-names
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          issue-number: ${{ github.event.inputs.issue_id }}
          repository: ${{ github.event.inputs.repository }}
          organization: ${{ github.event.inputs.organization }}

      - name: Check if test fields are empty
        id: check-test-fields
        shell: bash
        env:
          FAIL_TO_PASS: ${{ steps.extract-fields.outputs.fail_to_pass }}
          PASS_TO_PASS: ${{ steps.extract-fields.outputs.pass_to_pass }}
        run: |
          if [ "$FAIL_TO_PASS" == "[]" ] && [ "$PASS_TO_PASS" == "[]" ]; then
            echo "Both FAIL_TO_PASS and PASS_TO_PASS are empty. Skipping data generation."
            echo "empty_test_fields=true" >> $GITHUB_OUTPUT
          else
            echo "Test fields are not empty. Proceeding with data generation."
            echo "empty_test_fields=false" >> $GITHUB_OUTPUT
          fi

      - name: Install generator dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install unidiff

      - name: Make script executable
        run: chmod +x ./.github/scripts/apply-swe-benchmark-docker.sh

      - name: Generate data
        id: generate-data
        if: steps.check-test-fields.outputs.empty_test_fields != 'true'
        shell: bash
        env:
          ISSUE_NUMBER: ${{ github.event.inputs.issue_id }}
          REPOSITORY: ${{ github.event.inputs.repository }}
          ORGANIZATION: ${{ github.event.inputs.organization }}
          LATEST_COMMIT: ${{ steps.get-commits.outputs.commit_hash }}
          BASE_COMMIT: ${{ steps.get-commits.outputs.base_commit_hash }}
          LINKED_COMMITS: ${{ steps.get-commits.outputs.commits }}
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          FAIL_TO_PASS: ${{ steps.extract-fields.outputs.fail_to_pass }}
          PASS_TO_PASS: ${{ steps.extract-fields.outputs.pass_to_pass }}
          METADATA: ${{ steps.extract-fields.outputs.metadata }}
          VERSION: '1'
        run: |
          chmod +x .github/python/${{ github.event.inputs.generator }}.py
          echo "data_value<<EOF" >> $GITHUB_OUTPUT
          .github/python/${{ github.event.inputs.generator }}.py >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run verification
        id: run-verification
        shell: bash
        env:
          INSTANCE_JSON: ${{ steps.generate-data.outputs.data_value }}
          EMPTY_TEST_FIELDS: ${{ steps.check-test-fields.outputs.empty_test_fields }}
        run: |
          set -e

          if [[ "$EMPTY_TEST_FIELDS" == "true" ]]; then
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "message=Both FAIL_TO_PASS and PASS_TO_PASS are empty. Nothing to validate." >> $GITHUB_OUTPUT
            echo "::error::Both FAIL_TO_PASS and PASS_TO_PASS are empty. Nothing to validate."
            exit 1
          fi

          if [[ -z "$INSTANCE_JSON" ]]; then
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "message=No instance JSON generated." >> $GITHUB_OUTPUT
            echo "::error::No instance JSON generated."
            exit 1
          fi
      
          # Stream verification script output in real-time and capture the last line
          LAST_LINE=""
          while IFS= read -r line; do
            echo "$line"
            LAST_LINE="$line"
          done < <(stdbuf -oL -eL bash ./.github/scripts/apply-swe-benchmark-docker.sh "$INSTANCE_JSON" 2>&1)

          echo "Last line: $LAST_LINE"

          if [[ "$LAST_LINE" == "✅" ]]; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "message=Validation passed" >> $GITHUB_OUTPUT
            exit 0
          fi

          if echo "$LAST_LINE" | grep -q "Failed:"; then
            REASON=$(echo "$LAST_LINE" | sed 's/^.*Failed: //')
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "message=$REASON" >> $GITHUB_OUTPUT
            echo "::error::Validation failed: $REASON"
            exit 1
          fi

          echo "result=unknown" >> $GITHUB_OUTPUT
          echo "message=Unknown outcome. See logs." >> $GITHUB_OUTPUT
          echo "::error::Unknown outcome. Expected final line '✅' or 'Failed: <reason>' but got: $LAST_LINE"
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "# Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "Result: ${{ steps.run-verification.outputs.result }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.run-verification.outputs.message }}" != "" ]; then
            echo "Message: ${{ steps.run-verification.outputs.message }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "<details><summary>Raw last line</summary>`${{ steps.run-verification.outputs.message }}\`</details>" >> $GITHUB_STEP_SUMMARY
