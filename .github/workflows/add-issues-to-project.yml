name: Add Issues to Project

on:
  workflow_dispatch:
    inputs:
      organization:
        description: 'GitHub organization name'
        required: true
        type: string
        default: 'dpai-benchmark'
      project_number:
        description: 'Project number'
        required: true
        default: 2
        type: number
      search_query:
        description: >
          GitHub issue search
          (example: '-label:Epic label:Security assignee:@me is:open')
        required: true
        type: string
        default: '-label:Epic is:issue'
  schedule:
    # Run every night at midnight UTC
    - cron: '0 0 * * *'

# Define default values to be used by scheduled runs
env:
  DEFAULT_ORGANIZATION: 'dpai-benchmark'
  DEFAULT_PROJECT_NUMBER: '2'
  DEFAULT_SEARCH_QUERY: '-label:Epic is:issue'

jobs:

  set-defaults:
    runs-on: ubuntu-latest
    outputs:
      organization: ${{ steps.set-defaults.outputs.organization }}
      project_number: ${{ steps.set-defaults.outputs.project_number }}
      search_query: ${{ steps.set-defaults.outputs.search_query }}
    steps:
      - id: set-defaults
        run: |
          # Set default values for scheduled runs
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "organization=$DEFAULT_ORGANIZATION" >> $GITHUB_OUTPUT
            echo "project_number=$DEFAULT_PROJECT_NUMBER" >> $GITHUB_OUTPUT            
            echo "search_query=$DEFAULT_SEARCH_QUERY" >> $GITHUB_OUTPUT          
          else
            echo "organization=${{ inputs.organization }}" >> $GITHUB_OUTPUT
            echo "project_number=${{ inputs.project_number }}" >> $GITHUB_OUTPUT            
            echo "search_query=${{ inputs.search_query }}" >> $GITHUB_OUTPUT            
          fi

  find-issues:
    needs: [ set-defaults ]
    runs-on: ubuntu-latest
    outputs:
      issue-matrix: ${{ steps.find-issues.outputs.issue-matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Find issues by query
        id: find-issues
        uses: ./.github/actions/find-issues
        with:
          search_query: "org:${{ needs.set-defaults.outputs.organization }} -project:${{ needs.set-defaults.outputs.organization }}/${{ needs.set-defaults.outputs.project_number }} ${{ needs.set-defaults.outputs.search_query }}"
          github_token: ${{ secrets.PROJECT_TOKEN }}

  get-project-data:
    needs: set-defaults
    name: Get Project ID
    runs-on: ubuntu-latest
    outputs:
      project_id: ${{ steps.get-project-data.outputs.project_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Get project ID
        id: get-project-data
        uses: ./.github/actions/get-project-id
        with:
          organization: ${{ github.event_name == 'schedule' && env.DEFAULT_ORGANIZATION || github.event.inputs.organization }}
          project_number: ${{ github.event_name == 'schedule' && env.DEFAULT_PROJECT_NUMBER || github.event.inputs.project_number }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

  add-issues-to-project:
    name: Add Issues to Project
    needs: [set-defaults, find-issues, get-project-data]
    runs-on: ubuntu-latest
    if: ${{ needs.find-issues.outputs.issue-matrix != '[]' && needs.find-issues.outputs.issue-matrix != '' }}
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Get issue node ID
        id: get-issue-node-id
        uses: ./.github/actions/get-issue-node-id
        with:
          organization: ${{ matrix.issue.org_name }}
          repository: ${{ matrix.issue.repo_name }}
          issue_number: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Add issue to project
        id: add-to-project
        uses: ./.github/actions/add-issue-to-project
        with:
          project_id: ${{ needs.get-project-data.outputs.project_id }}
          issue_node_id: ${{ steps.get-issue-node-id.outputs.issue_node_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}