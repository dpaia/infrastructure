name: 'Run Validation'
description: 'Runs datapoint validation and extracts structured results'

inputs:
  instance_dir:
    description: 'Path to the instance directory to validate'
    required: true

outputs:
  result:
    description: 'Validation result (success/failure)'
    value: ${{ steps.validate.outputs.result }}
  status:
    description: 'Validation status from JSON output'
    value: ${{ steps.validate.outputs.status }}
  duration:
    description: 'Validation duration in seconds'
    value: ${{ steps.validate.outputs.duration }}
  criteria_summary:
    description: 'All criteria with status (generic, works for any eval type)'
    value: ${{ steps.validate.outputs.criteria_summary }}
  test_summary:
    description: 'Test summary string (codegen only, empty for other types)'
    value: ${{ steps.validate.outputs.test_summary }}
  fail_to_pass:
    description: 'FAIL_TO_PASS summary (codegen only, empty for other types)'
    value: ${{ steps.validate.outputs.fail_to_pass }}
  failed_criteria:
    description: 'Comma-separated list of failed criteria'
    value: ${{ steps.validate.outputs.failed_criteria }}
  failed_tests:
    description: 'Formatted list of failed test names'
    value: ${{ steps.validate.outputs.failed_tests }}
  failure_details:
    description: 'Detail text from failed criteria (criterion: detail, one per line)'
    value: ${{ steps.validate.outputs.failure_details }}
  result_json_path:
    description: 'Path to the validation result JSON file'
    value: ${{ steps.validate.outputs.result_json_path }}
  log_path:
    description: 'Path to the validation log file'
    value: ${{ steps.validate.outputs.log_path }}

runs:
  using: 'composite'
  steps:
    - name: Run validation
      id: validate
      shell: bash
      env:
        INSTANCE_DIR: ${{ inputs.instance_dir }}
      run: |
        set +e
        chmod +x .github/scripts/validate.sh

        LOG_FILE="${RUNNER_TEMP}/validation-output.txt"
        echo "log_path=$LOG_FILE" >> $GITHUB_OUTPUT

        echo "Validating: $INSTANCE_DIR"
        bash .github/scripts/validate.sh "$INSTANCE_DIR" 2>&1 | tee "$LOG_FILE"
        EXIT_CODE=$?

        # Extract exactly one JSON object from validation output. The validator may
        # print human-readable diagnostics after the JSON when status=failure.
        RESULT_JSON_FILE="${RUNNER_TEMP}/validation-result.json"
        python3 - "$LOG_FILE" "$RESULT_JSON_FILE" <<'PY'
        import json
        import sys
        from pathlib import Path

        log_path = Path(sys.argv[1])
        result_path = Path(sys.argv[2])
        marker = "JSON output:"
        text = log_path.read_text(errors="replace")
        index = text.rfind(marker)
        if index == -1:
            result_path.write_text("")
            sys.exit(0)

        payload = text[index + len(marker):].lstrip()
        try:
            obj, _ = json.JSONDecoder().raw_decode(payload)
        except json.JSONDecodeError:
            result_path.write_text("")
            sys.exit(0)

        result_path.write_text(json.dumps(obj, indent=2) + "\n")
        PY

        # Ensure file exists for artifact upload even if empty
        echo "result_json_path=$RESULT_JSON_FILE" >> $GITHUB_OUTPUT

        # Parse structured results from JSON (eval-type-agnostic)
        STATUS=""
        if [ -s "$RESULT_JSON_FILE" ] && jq empty "$RESULT_JSON_FILE" 2>/dev/null; then
          STATUS=$(jq -r '.status' "$RESULT_JSON_FILE")
          DURATION=$(jq -r '.duration_seconds' "$RESULT_JSON_FILE")

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT

          # Generic criteria summary: list all criteria with their status
          CRITERIA_SUMMARY=$(jq -r '[.criteria[] | "\(.criterion): \(.status)"] | join(", ")' "$RESULT_JSON_FILE" 2>/dev/null || echo "")
          echo "criteria_summary=$CRITERIA_SUMMARY" >> $GITHUB_OUTPUT

          # Codegen-specific: test summary (only if "tests" criterion exists)
          TEST_SUMMARY=$(jq -r '(.criteria // []) | map(select(.criterion == "tests")) | first // null | if . then .summary | "Total: \(.total), Passed: \(.passed), Failed: \(.failed), Skipped: \(.skipped)" else "" end' "$RESULT_JSON_FILE" 2>/dev/null || echo "")
          echo "test_summary=$TEST_SUMMARY" >> $GITHUB_OUTPUT

          # Codegen-specific: fail_to_pass (only if criterion exists)
          F2P_STATUS=$(jq -r '(.criteria // []) | map(select(.criterion == "fail_to_pass")) | first // null | if . then "\(.status): \(.detail // "")" else "" end' "$RESULT_JSON_FILE" 2>/dev/null || echo "")
          echo "fail_to_pass=$F2P_STATUS" >> $GITHUB_OUTPUT

          if [ "$STATUS" != "success" ]; then
            FAILED_CRITERIA=$(jq -r '[.criteria[] | select(.status == "fail")] | map("\(.criterion): \(.status)") | join(", ")' "$RESULT_JSON_FILE" 2>/dev/null || echo "unknown")
            echo "failed_criteria=$FAILED_CRITERIA" >> $GITHUB_OUTPUT

            # Extract detail text from failed criteria for error reporting
            FAILURE_DETAILS=$(jq -r '[.criteria[] | select(.status == "fail" and .detail != null) | "\(.criterion): \(.detail)"] | join("\n")' "$RESULT_JSON_FILE" 2>/dev/null || echo "")
            if [ -n "$FAILURE_DETAILS" ]; then
              echo "failure_details<<FDETAILS_EOF" >> $GITHUB_OUTPUT
              echo "$FAILURE_DETAILS" >> $GITHUB_OUTPUT
              echo "FDETAILS_EOF" >> $GITHUB_OUTPUT
            fi

            FAILED_TESTS=$(jq -r '(.criteria // []) | map(select(.criterion == "tests")) | first // null | if . then (.failed_tests // []) | .[0:20] | map("- \(.name)") | join("\n") else "" end' "$RESULT_JSON_FILE" 2>/dev/null || echo "")
            if [ -n "$FAILED_TESTS" ]; then
              echo "failed_tests<<FTESTS_EOF" >> $GITHUB_OUTPUT
              echo "$FAILED_TESTS" >> $GITHUB_OUTPUT
              echo "FTESTS_EOF" >> $GITHUB_OUTPUT
            fi
          fi
        else
          echo "Warning: could not extract valid JSON from validation output"
          echo "status=unknown" >> $GITHUB_OUTPUT

          # Extract last meaningful error lines from the log so the PR comment is useful
          if [ -s "$LOG_FILE" ]; then
            LOG_ERROR=$(grep -iE "error|FAIL|could not find|failed to" "$LOG_FILE" | tail -10 | head -c 2000)
            if [ -z "$LOG_ERROR" ]; then
              LOG_ERROR=$(tail -20 "$LOG_FILE" | head -c 2000)
            fi
            if [ -n "$LOG_ERROR" ]; then
              echo "failure_details<<FDETAILS_EOF" >> $GITHUB_OUTPUT
              echo "$LOG_ERROR" >> $GITHUB_OUTPUT
              echo "FDETAILS_EOF" >> $GITHUB_OUTPUT
            fi
          fi
        fi

        if [ "$STATUS" = "success" ]; then
          echo "result=success" >> $GITHUB_OUTPUT
          exit 0
        elif [ -n "$STATUS" ]; then
          echo "result=failure" >> $GITHUB_OUTPUT
          exit 1
        elif [ $EXIT_CODE -eq 0 ]; then
          echo "result=success" >> $GITHUB_OUTPUT
        else
          echo "result=failure" >> $GITHUB_OUTPUT
        fi
        exit $EXIT_CODE
