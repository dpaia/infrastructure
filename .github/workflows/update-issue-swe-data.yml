name: Update Issue SWE Data

on:
  workflow_dispatch:
    inputs:
      organization:
        description: 'GitHub organization name'
        required: false
        default: 'jetbrains-eval-lab'
        type: string
      repository:
        description: 'Repository name (repo)'
        required: true
        type: string
      issue_id:
        description: 'Issue number'
        required: true
        type: string

jobs:
  get-latest-commit:
    runs-on: ubuntu-latest
    outputs:
      commit_hash: ${{ steps.fetch-commit.outputs.commit_hash }}
      base_commit_hash: ${{ steps.fetch-commit.outputs.base_commit_hash }}
    steps:
      - name: Fetch latest commit related to issue
        id: fetch-commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo="${{ github.event.inputs.organization }}/${{ github.event.inputs.repository }}"
          issue_number="${{ github.event.inputs.issue_id }}"
          owner="${repo%/*}"
          repo_name="${repo##*/}"

          echo "Fetching commits linked to issue #${issue_number}..."

          # Use GitHub's Timeline API to find linked commits
          linked_commits=$(gh api repos/${owner}/${repo_name}/issues/${issue_number}/timeline \
            --jq '.[] | select(.event == "referenced" and .commit_id != null) | .commit_id')

          # Get the most recent linked commit
          if [ -n "$linked_commits" ]; then
            latest_commit=$(echo "$linked_commits" | head -n 1)
            echo "Found linked commits: $linked_commits"
            echo "Using most recent linked commit: $latest_commit"
          else
            echo "No commits found linked to issue #${issue_number} through GitHub references"

            # Try to check for cross-referenced PRs that might contain commits
            echo "Checking for related pull requests..."
            related_prs=$(gh api repos/${owner}/${repo_name}/issues/${issue_number}/timeline \
              --jq '.[] | select(.event == "cross-referenced" and .source.issue.pull_request != null) | .source.issue.number')

            if [ -n "$related_prs" ]; then
              echo "Found related PRs: $related_prs"
              # Get the most recent PR
              recent_pr=$(echo "$related_prs" | head -n 1)
              echo "Checking commits from PR #${recent_pr}..."

              pr_commits=$(gh api repos/${owner}/${repo_name}/pulls/${recent_pr}/commits --jq '.[].sha')
              if [ -n "$pr_commits" ]; then
                latest_commit=$(echo "$pr_commits" | tail -n 1)
                echo "Using most recent commit from PR #${recent_pr}: $latest_commit"
              fi
            fi

            # If still no commit found, use the latest repository commit
            if [ -z "$latest_commit" ]; then
              echo "Falling back to latest repository commit"
              latest_commit=$(gh api repos/${owner}/${repo_name}/commits --jq '.[0].sha')
              echo "Using latest repository commit: $latest_commit"
            fi
          fi

          echo "commit_hash=$latest_commit" >> $GITHUB_OUTPUT

          # Get the commit before the latest commit (base commit)
          if [ -n "$latest_commit" ]; then
            echo "Fetching base commit (parent of latest commit)..."
            base_commit=$(gh api repos/${owner}/${repo_name}/commits/${latest_commit} --jq '.parents[0].sha')
            if [ -n "$base_commit" ]; then
              echo "Base commit: $base_commit"
              echo "base_commit_hash=$base_commit" >> $GITHUB_OUTPUT
            else
              echo "No parent commit found, using older repository commit"
              base_commit=$(gh api repos/${owner}/${repo_name}/commits --jq '.[1].sha')
              echo "Older repository commit: $base_commit"
              echo "base_commit_hash=$base_commit" >> $GITHUB_OUTPUT
            fi
          fi

  get-issue-id:
    runs-on: ubuntu-latest
    outputs:
      issue_id: ${{ steps.fetch-issue-id.outputs.issue_id }}
    steps:
      - name: Fetch GitHub issue ID
        id: fetch-issue-id
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo="${{ github.event.inputs.organization }}/${{ github.event.inputs.repository }}"
          issue_number="${{ github.event.inputs.issue_id }}"
          owner="${repo%/*}"
          repo_name="${repo##*/}"

          echo "Fetching Issue ID..."
          issue_id=$(gh api graphql -f query='
          query($repo:String!, $owner:String!, $number:Int!) {
            repository(name: $repo, owner: $owner) {
              issue(number: $number) {
                id
              }
            }
          }' -f repo="$repo_name" -f owner="$owner" -F number=$issue_number --jq '.data.repository.issue.id')

          echo "Issue ID: $issue_id"
          echo "issue_id=$issue_id" >> $GITHUB_OUTPUT

  get-project-data:
    runs-on: ubuntu-latest
    outputs:
      project_id: ${{ steps.fetch-project-data.outputs.project_id }}
      commit_field_id: ${{ steps.fetch-project-data.outputs.commit_field_id }}
      data_field_id: ${{ steps.fetch-project-data.outputs.data_field_id }}
      status_field_id: ${{ steps.fetch-project-data.outputs.status_field_id }}
    steps:
      - name: Fetch project and field IDs
        id: fetch-project-data
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PROJECT_NUMBER: 3
          ORG_NAME: ${{ github.event.inputs.organization }}
        run: |
          gh auth status

          echo "Fetching project ID..."
          project_id=$(gh api graphql -f query='
          query($org:String!, $number:Int!) {
            organization(login: $org) {
              projectV2(number: $number) {
                id
              }
            }
          }' -f org="$ORG_NAME" -F number=$PROJECT_NUMBER --jq '.data.organization.projectV2.id')

          echo "Project ID: $project_id"
          echo "project_id=$project_id" >> $GITHUB_OUTPUT

          echo "Fetching Field IDs..."
          fields_query=$(gh api graphql -f query='
          query($project:ID!) {
            node(id: $project) {
              ... on ProjectV2 {
                fields(first: 100) {
                  nodes {
                    ... on ProjectV2FieldCommon {
                      id
                      name
                    }
                  }
                }
              }
            }
          }' -f project=$project_id)

          commit_field_id=$(echo "$fields_query" | jq -r '.data.node.fields.nodes[] | select(.name == "Commit") | .id')
          data_field_id=$(echo "$fields_query" | jq -r '.data.node.fields.nodes[] | select(.name == "Data") | .id')
          status_field_id=$(echo "$fields_query" | jq -r '.data.node.fields.nodes[] | select(.name == "Status") | .id')

          echo "Commit Field ID: $commit_field_id"
          echo "Data Field ID: $data_field_id"
          echo "Status Field ID: $status_field_id"

          echo "commit_field_id=$commit_field_id" >> $GITHUB_OUTPUT
          echo "data_field_id=$data_field_id" >> $GITHUB_OUTPUT
          echo "status_field_id=$status_field_id" >> $GITHUB_OUTPUT

  add-to-project:
    needs: [get-issue-id, get-project-data]
    runs-on: ubuntu-latest
    outputs:
      item_id: ${{ steps.add-to-project.outputs.item_id }}
    steps:
      - name: Add Issue to Project
        id: add-to-project
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PROJECT_ID: ${{ needs.get-project-data.outputs.project_id }}
          ISSUE_ID: ${{ needs.get-issue-id.outputs.issue_id }}
        run: |
          echo "Adding Issue to Project..."
          item_id=$(gh api graphql -f query='
          mutation($projectId:ID!, $contentId:ID!) {
            addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
              item {
                id
              }
            }
          }' -f projectId=$PROJECT_ID -f contentId=$ISSUE_ID --jq '.data.addProjectV2ItemById.item.id')

          echo "Item ID: $item_id"
          echo "item_id=$item_id" >> $GITHUB_OUTPUT

          echo "✅ Issue added to project!"

  update-commit-field:
    needs: [get-latest-commit, get-project-data, add-to-project]
    runs-on: ubuntu-latest
    steps:
      - name: Update Commit field
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PROJECT_ID: ${{ needs.get-project-data.outputs.project_id }}
          ITEM_ID: ${{ needs.add-to-project.outputs.item_id }}
          COMMIT_FIELD_ID: ${{ needs.get-project-data.outputs.commit_field_id }}
          LATEST_COMMIT: ${{ needs.get-latest-commit.outputs.commit_hash }}
        run: |
          echo "Setting Commit field value..."
          gh api graphql -f query='
          mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $value:String!) {
            updateProjectV2ItemFieldValue(input: {
              projectId: $projectId,
              itemId: $itemId,
              fieldId: $fieldId,
              value: {
                text: $value
              }
            }) {
              projectV2Item {
                id
              }
            }
          }' -f projectId=$PROJECT_ID -f itemId=$ITEM_ID -f fieldId=$COMMIT_FIELD_ID -f value="$LATEST_COMMIT"

          echo "✅ Commit field updated with latest commit hash: $LATEST_COMMIT"

  update-data-field:
    needs: [get-project-data, add-to-project, get-latest-commit]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make Python script executable
        run: chmod +x .github/scripts/generate_data_value.py

      - name: Generate data value with Python script
        id: generate-data
        env:
          ISSUE_NUMBER: ${{ github.event.inputs.issue_id }}
          REPOSITORY: ${{ github.event.inputs.repository }}
          ORGANIZATION: ${{ github.event.inputs.organization }}
          LATEST_COMMIT: ${{ needs.get-latest-commit.outputs.commit_hash }}
          BASE_COMMIT: ${{ needs.get-latest-commit.outputs.base_commit_hash || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "data_value<<EOF" >> $GITHUB_OUTPUT
          .github/scripts/generate_data_value.py >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update Data field
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PROJECT_ID: ${{ needs.get-project-data.outputs.project_id }}
          ITEM_ID: ${{ needs.add-to-project.outputs.item_id }}
          DATA_FIELD_ID: ${{ needs.get-project-data.outputs.data_field_id }}
          DATA_VALUE: ${{ steps.generate-data.outputs.data_value }}
        run: |
          echo "Setting Data field value from Python script..."
          echo "Data value: $DATA_VALUE"

          gh api graphql -f query='
          mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $value:String!) {
            updateProjectV2ItemFieldValue(input: {
              projectId: $projectId,
              itemId: $itemId,
              fieldId: $fieldId,
              value: {
                text: $value
              }
            }) {
              projectV2Item {
                id
              }
            }
          }' -f projectId=$PROJECT_ID -f itemId=$ITEM_ID -f fieldId=$DATA_FIELD_ID -f value="$DATA_VALUE"

          echo "✅ Data field updated with Python-generated value!"

  update-status-field:
    needs: [get-project-data, add-to-project]
    runs-on: ubuntu-latest
    steps:
      - name: Update Status field to Done
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PROJECT_ID: ${{ needs.get-project-data.outputs.project_id }}
          ITEM_ID: ${{ needs.add-to-project.outputs.item_id }}
          STATUS_FIELD_ID: ${{ needs.get-project-data.outputs.status_field_id }}
        run: |
          echo "Setting Status field to Done..."

          # First, we need to get the option ID for "Done" in the Status field
          echo "Fetching option ID for 'Done' status..."
          status_options=$(gh api graphql -f query='
          query($project:ID!) {
            node(id: $project) {
              ... on ProjectV2 {
                fields(first: 100) {
                  nodes {
                    ... on ProjectV2SingleSelectField {
                      id
                      name
                      options {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }
          }' -f project=$PROJECT_ID)

          # Extract options for the Status field
          status_field_options=$(echo "$status_options" | jq -r '.data.node.fields.nodes[] | select(.id == "'$STATUS_FIELD_ID'") | .options')

          done_option_id=$(echo "$status_field_options" | jq -r '.[] | select(.name == "Done") | .id')

          if [ -z "$done_option_id" ]; then
            echo "Warning: 'Done' option not found in Status field. Available options:"
            echo "$status_field_options" | jq -r '.[].name'
            echo "Using first available option as fallback"
            done_option_id=$(echo "$status_field_options" | jq -r '.[0].id')
          fi

          echo "Done option ID: $done_option_id"

          # Update the Status field with the "Done" option
          gh api graphql -f query='
          mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
            updateProjectV2ItemFieldValue(input: {
              projectId: $projectId,
              itemId: $itemId,
              fieldId: $fieldId,
              value: {
                singleSelectOptionId: $optionId
              }
            }) {
              projectV2Item {
                id
              }
            }
          }' -f projectId=$PROJECT_ID -f itemId=$ITEM_ID -f fieldId=$STATUS_FIELD_ID -f optionId="$done_option_id"

          echo "✅ Status field updated to Done!"