# Export EE-bench codegen datapoints from dpaia issues to JSONL
# Uses auto metadata discovery for issues with embedded METADATA blocks
# Usage: ee-dataset --config specs/export-ee-bench-codegen-issues.yaml generate
# Test single issue: ee-dataset --config specs/export-ee-bench-codegen-issues.yaml \
#   -S REPO=dpaia/spring-boot-microshop -S 'ISSUE_NUMBERS=[1]' generate

providers:
  - name: github
    type: github_issues
    role: primary
    options:
      token: ${GITHUB_TOKEN}
      fetch_commits: true
      parse_comments: true

  - name: sections
    type: markdown_sections
    item_mapping:
      text: "{{ providers.github.description }}"
    options:
      sections:
        problem_statement: "## Problem Statement"
        hints_text: "## Hints"
        requirements: "## Requirements"
        interface: "## Interface"

  - name: metadata
    type: metadata
    item_mapping:
      text: "{{ providers.github.description }}"
    options:
      fields: "auto"

  - name: patch_splitter
    type: patch_splitter
    item_mapping:
      patch: "{{ providers.github.patch }}"

  - name: maven
    type: maven
    item_mapping:
      test_patch: "{{ fields.test_patch }}"
      FAIL_TO_PASS: "{{ fields.FAIL_TO_PASS }}"
      PASS_TO_PASS: "{{ fields.PASS_TO_PASS }}"

  - name: gradle
    type: gradle
    item_mapping:
      test_patch: "{{ fields.test_patch }}"
      FAIL_TO_PASS: "{{ fields.FAIL_TO_PASS }}"
      PASS_TO_PASS: "{{ fields.PASS_TO_PASS }}"

generator:
  name: ee_bench_codegen
  options:
    version: "{{ VERSION | default('1.0') }}"
    tags:
      exclude:
        - "ee-bench-*"
        - Epic
        - Review
        - Invalid
        - Wontfix
        - Verified
        - Bugfix
        - Documentation

selection:
  resource: issues
  filters:
    repo: "{{ REPO | default('dpaia/*') }}"
    labels: [ee-bench-codegen]
    issue_numbers: {{ ISSUE_NUMBERS | default('[]') }}
    state: open

output:
  format: jsonl
  path: datasets/ee-bench-codegen-issues_export.jsonl
