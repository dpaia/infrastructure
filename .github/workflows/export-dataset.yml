name: Export SWE Dataset
run-name: "Export SWE Dataset: ${{ inputs.search_query }} -> ${{ inputs.output_file }}"

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: >
          GitHub issue search
          (example: '-label:Epic label:Security assignee:@me is:open')
        required: true
      output_file:
        description: "Export file name"
        default: "dataset.json"
      update:
        description: "Update mode for existing data"
        type: choice
        options:
          - none
          - update
          - force-update
        default: "none"

jobs:
  get-project-data:
    runs-on: ubuntu-latest
    outputs:
      project_id: ${{ steps.get-project-data.outputs.project_id }}
      commit_field_id: ${{ steps.get-project-data.outputs.commit_field_id }}
      data_field_id: ${{ steps.get-project-data.outputs.data_field_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Get project data
        id: get-project-data
        uses: ./.github/actions/get-project-data
        with:
          organization: ${{ github.repository_owner }}
          project_number: 3
          github_token: ${{ secrets.PROJECT_TOKEN }}
          fetch_status_field: 'false'

  find-issues:
    needs: get-project-data
    runs-on: ubuntu-latest
    outputs:
      issue-matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get -y install jq

      - name: Find issues by query
        id: find-issues
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ORG:  ${{ github.repository_owner }}
          QRAW: ${{ inputs.search_query }}
        shell: bash
        run: |
          ME="${{ github.actor }}"
          QFIXED=$(echo "$QRAW" | sed "s/@me/$ME/g")
          QUERY="(project:$ORG/2 OR project:$ORG/3) is:issue $QFIXED"

          echo "🔎 GitHub search query: $QUERY"

          PAGE=100
          
          # Get issue IDs and repository info for the matrix
          gh api --paginate -X GET search/issues \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -f q="$QUERY" -f per_page="$PAGE" -f advanced_search=true |
          jq -c '.items[] | {issue_id: .number | tostring, repo_name: .repository_url | split("/") | .[-1], org_name: .repository_url | split("/") | .[-2]}' |
          jq -s '.' > issue_ids.json
          
          echo "Found $(jq length issue_ids.json) issues"

      - name: Set matrix output
        id: set-matrix
        run: |
          # Ensure the JSON is properly formatted for GitHub Actions output
          MATRIX_JSON=$(jq -c '.' issue_ids.json)
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  get-data-field:
    needs: [get-project-data, find-issues, collect-exists-data, update-data, check-commit, update-issue-swe-data]
    if: always()
    runs-on: ubuntu-latest
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Get GitHub issue ID
        id: get-issue-node-id
        uses: ./.github/actions/get-issue-node-id
        with:
          repository: ${{ matrix.issue.repo_name }}
          organization: ${{ matrix.issue.org_name }}
          issue_number: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get Data field value
        id: get-data-value
        uses: ./.github/actions/get-project-field-value
        with:
          project_id: ${{ needs.get-project-data.outputs.project_id }}
          issue_node_id: ${{ steps.get-issue-node-id.outputs.issue_node_id }}
          field_name: "Data"
          github_token: ${{ secrets.PROJECT_TOKEN }}

      - name: Create data value file
        id: create_data_file
        env:
          ISSUE_ID: ${{ matrix.issue.issue_id }}
          REPO_NAME: ${{ matrix.issue.repo_name }}
          ORG_NAME: ${{ matrix.issue.org_name }}
          DATA_VALUE: ${{ steps.get-data-value.outputs.field_value }}
        run: |
          # Create a JSON file with the issue info and data value only if DATA_VALUE is not empty
          mkdir -p ./data_values
          
          # Check if DATA_VALUE is null, empty, or doesn't exist
          if [ -z "$DATA_VALUE" ] || [ "$DATA_VALUE" = "null" ]; then
            echo "DATA_VALUE is empty or null, skipping file creation"
            echo "file_created=false" >> $GITHUB_OUTPUT
          else
            echo "{\"issue_id\": \"$ISSUE_ID\", \"repo_name\": \"$REPO_NAME\", \"org_name\": \"$ORG_NAME\", \"data_value\": \"$DATA_VALUE\"}" > ./data_values/${ORG_NAME}_${REPO_NAME}_${ISSUE_ID}.json
            echo "file_created=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload data value
        if: steps.create_data_file.outputs.file_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: data-value-${{ matrix.issue.org_name }}-${{ matrix.issue.repo_name }}-${{ matrix.issue.issue_id }}
          path: ./data_values/${{ matrix.issue.org_name }}_${{ matrix.issue.repo_name }}_${{ matrix.issue.issue_id }}.json
          retention-days: 1

  collect-exists-data:
    needs: [find-issues]
    if: inputs.update == 'none'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false

  update-data:
    needs: [find-issues]
    if: inputs.update == 'update'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false

  check-commit:
    needs: [get-project-data, find-issues, update-data]
    if: inputs.update == 'update'
    runs-on: ubuntu-latest
    outputs:
      commits-match: ${{ steps.check-all-commits.outputs.all_match }}
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Get GitHub issue ID
        id: get-issue-node-id
        uses: ./.github/actions/get-issue-node-id
        with:
          repository: ${{ matrix.issue.repo_name }}
          organization: ${{ matrix.issue.org_name }}
          issue_number: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}
      
      - name: Get Commit field value
        id: get-commit-value
        uses: ./.github/actions/get-project-field-value
        with:
          project_id: ${{ needs.get-project-data.outputs.project_id }}
          issue_node_id: ${{ steps.get-issue-node-id.outputs.issue_node_id }}
          field_name: "Commit"
          github_token: ${{ secrets.PROJECT_TOKEN }}
      
      - name: Get latest commit
        id: get-latest-commit
        uses: ./.github/actions/get-latest-commit
        with:
          organization: ${{ matrix.issue.org_name }}
          repository: ${{ matrix.issue.repo_name }}
          issue_id: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}
      
      - name: Compare commits
        id: compare-commits
        env:
          COMMIT_FIELD_VALUE: ${{ steps.get-commit-value.outputs.field_value }}
          LATEST_COMMIT: ${{ steps.get-latest-commit.outputs.commit_hash }}
        run: |
          echo "Commit field value: $COMMIT_FIELD_VALUE"
          echo "Latest commit: $LATEST_COMMIT"
          
          if [ -z "$COMMIT_FIELD_VALUE" ] || [ "$COMMIT_FIELD_VALUE" = "null" ] || [ "$COMMIT_FIELD_VALUE" != "$LATEST_COMMIT" ]; then
            echo "Commits don't match or Commit field is empty"
            echo "match=false" >> $GITHUB_OUTPUT
          else
            echo "Commits match"
            echo "match=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Check all commits
        id: check-all-commits
        if: always()
        run: |
          if [ "${{ steps.compare-commits.outputs.match }}" == "false" ]; then
            echo "all_match=false" >> $GITHUB_OUTPUT
          else
            echo "all_match=true" >> $GITHUB_OUTPUT
          fi

  force-update-data:
    needs: find-issues
    if: inputs.update == 'force-update'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false

  update-issue-swe-data:
    needs: [find-issues, force-update-data, check-commit]
    if: |
      inputs.update == 'force-update' || 
      (inputs.update == 'update' && needs.check-commit.outputs.commits-match == 'false')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Update Issue SWE Data
        uses: ./.github/actions/update-issue-swe-data
        with:
          generator: 'java'
          organization: ${{ matrix.issue.org_name }}
          repository: ${{ matrix.issue.repo_name }}
          issue_id: ${{ matrix.issue.issue_id }}
          github_token: ${{ secrets.PROJECT_TOKEN }}
          gist_token: ${{ secrets.GIST_TOKEN }}
          update_status: 'false'

  fetch-gist-data:
    needs: [get-data-field, find-issues]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        issue: ${{ fromJson(needs.find-issues.outputs.issue-matrix) }}
      fail-fast: false
    steps:
      - name: Download data value artifact
        uses: actions/download-artifact@v4
        with:
          name: data-value-${{ matrix.issue.org_name }}-${{ matrix.issue.repo_name }}-${{ matrix.issue.issue_id }}
          path: ./data_values

      - name: Install jq and curl
        run: sudo apt-get update && sudo apt-get -y install jq curl

      - name: Fetch GIST JSON content
        env:
          ISSUE_ID: ${{ matrix.issue.issue_id }}
          REPO_NAME: ${{ matrix.issue.repo_name }}
          ORG_NAME: ${{ matrix.issue.org_name }}
        run: |
          # Extract GIST URL from the data value file
          DATA_FILE="./data_values/${ORG_NAME}_${REPO_NAME}_${ISSUE_ID}.json"
          if [ -f "$DATA_FILE" ]; then
            GIST_URL=$(jq -r '.data_value' "$DATA_FILE")
            echo "GIST URL: $GIST_URL"
            
            if [ -n "$GIST_URL" ]; then
              # Extract GIST ID from URL
              GIST_ID=$(echo "$GIST_URL" | sed -E 's|.*/([a-f0-9]+)$|\1|')
              
              if [ -n "$GIST_ID" ]; then
                echo "Fetching GIST content for ID: $GIST_ID"
                
                # Fetch the raw GIST content
                mkdir -p ./gist_content
                RAW_URL="https://gist.githubusercontent.com/raw/$GIST_ID"
                curl -s "$RAW_URL" > "./gist_content/${ORG_NAME}_${REPO_NAME}_${ISSUE_ID}_gist.json"
                
                # Create a combined JSON with issue info and GIST content
                GIST_CONTENT=$(cat "./gist_content/${ORG_NAME}_${REPO_NAME}_${ISSUE_ID}_gist.json")
                echo "{\"issue_id\": \"$ISSUE_ID\", \"repo_name\": \"$REPO_NAME\", \"org_name\": \"$ORG_NAME\", \"gist_url\": \"$GIST_URL\", \"gist_content\": $GIST_CONTENT}" > "./gist_content/${ORG_NAME}_${REPO_NAME}_${ISSUE_ID}_combined.json"
              else
                echo "Could not extract GIST ID from URL: $GIST_URL"
                echo "{\"issue_id\": \"$ISSUE_ID\", \"repo_name\": \"$REPO_NAME\", \"org_name\": \"$ORG_NAME\", \"gist_url\": \"$GIST_URL\", \"error\": \"Could not extract GIST ID\"}" > "./gist_content/${ORG_NAME}_${REPO_NAME}_${ISSUE_ID}_combined.json"
              fi
            else
              echo "No valid GIST URL found for issue #$ISSUE_ID"
              echo "{\"issue_id\": \"$ISSUE_ID\", \"repo_name\": \"$REPO_NAME\", \"org_name\": \"$ORG_NAME\", \"error\": \"No valid GIST URL found\"}" > "./gist_content/${ORG_NAME}_${REPO_NAME}_${ISSUE_ID}_combined.json"
            fi
          else
            echo "Data file not found for issue #$ISSUE_ID"
            mkdir -p ./gist_content
            echo "{\"issue_id\": \"$ISSUE_ID\", \"repo_name\": \"$REPO_NAME\", \"org_name\": \"$ORG_NAME\", \"error\": \"Data file not found\"}" > "./gist_content/${ORG_NAME}_${REPO_NAME}_${ISSUE_ID}_combined.json"
          fi

      - name: Upload GIST content
        uses: actions/upload-artifact@v4
        with:
          name: gist-content-${{ matrix.issue.org_name }}-${{ matrix.issue.repo_name }}-${{ matrix.issue.issue_id }}
          path: ./gist_content/${{ matrix.issue.org_name }}_${{ matrix.issue.repo_name }}_${{ matrix.issue.issue_id }}_combined.json
          retention-days: 1

  aggregate-results:
    needs: fetch-gist-data
    runs-on: ubuntu-latest
    steps:
      - name: Download all GIST content
        uses: actions/download-artifact@v4
        with:
          pattern: gist-content-*-*-*
          path: ./all_gists
          merge-multiple: true

      - name: Install jq
        run: sudo apt-get update && sudo apt-get -y install jq

      - name: Combine issue data
        env:
          OUT: ${{ inputs.output_file }}
        run: |
          # Combine all individual GIST content files into one JSON array
          find ./all_gists -name "*.json" -exec cat {} \; | jq -s '.' > "$OUT"
          echo "Combined $(jq length "$OUT") issues into $OUT"
      
      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-tasks
          path: ${{ inputs.output_file }}
